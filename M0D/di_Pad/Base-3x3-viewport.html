<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>500 Receitas de Sobremesas para Diabéticos</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="500 Receitas para Diabéticos" />
  <meta name="application-name" content="500 Receitas para Diabéticos" />

  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">

  <style>
    :root{
      --bg:#ffffff;
      --bg-soft:#f7f7f7;
      --card:#ffffff;
      --line:#e7e7e7;
      --text:#151515;
      --muted:#6b6b6b;
      --accent:#111111;
      --shadow:0 16px 40px rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at top left, rgba(0,0,0,.04), transparent 25%),
        radial-gradient(circle at top right, rgba(0,0,0,.03), transparent 20%),
        linear-gradient(180deg, #ffffff, #fbfbfb);
      color:var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
      overscroll-behavior:none;
    }

    body{
      position:fixed;
      inset:0;
    }

    a{ color:inherit; text-decoration:none; }
    button{ font:inherit; }

    .hint{
      position:fixed;
      top:16px;
      right:16px;
      z-index:60;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(0,0,0,.34);
      user-select:none;
      pointer-events:none;
    }

    .grid{
      position:fixed;
      inset:0;
      width:300%;
      height:300%;
      display:grid;
      grid-template-columns:repeat(3, 33.3333%);
      grid-template-rows:repeat(3, 33.3333%);
      transition:transform .55s cubic-bezier(.25,.85,.35,1);
      will-change:transform;
    }

    .screen{
      width:100vw;
      height:100vh;
      overflow-y:auto;
      overflow-x:hidden;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.98)),
        radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 18%);
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior-y:contain;
    }

    .screen::-webkit-scrollbar{ width:5px; }
    .screen::-webkit-scrollbar-track{ background:transparent; }
    .screen::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.18); border-radius:999px; }

    .inner{
      min-height:100%;
      padding:30px 18px 110px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{
      width:100%;
      max-width:1080px;
      margin:0 auto;
    }

    .stack{
      display:grid;
      gap:18px;
    }

    .hero{
      text-align:center;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.04);
      border:1px solid rgba(0,0,0,.08);
      color:#444;
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    h1,h2{
      line-height:.94;
      letter-spacing:-.04em;
    }

    .title{
      font-size:clamp(2.4rem, 7vw, 6.8rem);
      font-weight:900;
      margin-top:18px;
    }

    .subtitle{
      font-size:clamp(1.7rem, 4.5vw, 3.6rem);
      font-weight:900;
    }

    .lead, .tagline, .mini, .note, .box p, .box li{
      color:var(--muted);
      line-height:1.75;
      font-size:.98rem;
    }

    .lead, .tagline{
      font-size:clamp(1rem, 2.8vw, 1.15rem);
      max-width:820px;
      margin:0 auto;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .box{
      padding:22px;
      border-radius:22px;
      background:#fff;
      border:1px solid #ececec;
      box-shadow:0 10px 24px rgba(0,0,0,.04);
    }

    .box h3{
      font-size:1.04rem;
      margin-bottom:10px;
      color:var(--text);
    }

    .grid-2, .grid-3{
      display:grid;
      gap:16px;
    }

    @media (min-width: 768px){
      .grid-2{ grid-template-columns:repeat(2, 1fr); }
      .grid-3{ grid-template-columns:repeat(3, 1fr); }
    }

    .list{
      padding-left:18px;
      display:grid;
      gap:8px;
    }

    .callout{
      padding:22px;
      border-radius:24px;
      background:linear-gradient(180deg, #fff, #fbfbfb);
      border:1px solid #ededed;
      box-shadow:0 14px 30px rgba(0,0,0,.04);
    }

    .accent-bg{
      background:linear-gradient(180deg, rgba(0,0,0,.03), rgba(0,0,0,.015));
      border:1px solid rgba(0,0,0,.08);
    }

    .muted-topline{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(0,0,0,.42);
      font-weight:800;
    }

    .small-strong{
      font-weight:800;
      color:var(--text);
    }

    .recipe-step{
      padding:16px 18px;
      border-radius:18px;
      border:1px solid #ececec;
      background:#fff;
    }

    .blank-slot{
      min-height:180px;
      border:1px dashed #d9d9d9;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(250,250,250,.95));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#8a8a8a;
      font-size:.92rem;
      text-align:center;
      padding:20px;
    }

    .nav-matrix{
      position:fixed;
      left:50%;
      bottom:calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(0,0,0,.08);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      z-index:50;
      box-shadow:0 14px 30px rgba(0,0,0,.06);
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(0,0,0,.20);
      transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
      cursor:pointer;
    }

    .dot.active{
      background:var(--accent);
      transform:scale(1.5);
      box-shadow:0 0 12px rgba(0,0,0,.18);
    }

    @media (max-width:720px){
      .inner{ padding:22px 14px 116px; }
      .nav-matrix{ gap:8px; padding:9px 12px; }
      .dot{ width:9px; height:9px; }
    }
  </style>
</head>

<body>
  <div class="hint">SWIPE • SETAS • TOQUE</div>

  <div class="grid" id="grid"></div>
  <div class="nav-matrix" id="navMatrix"></div>

  <script>
    const ROWS = 3;
    const COLS = 3;

    const screensData = [
      [
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 1 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 2 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 3 · cole seu HTML aqui</div></div></div>` }
      ],
      [
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 4 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 5 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 6 · cole seu HTML aqui</div></div></div>` }
      ],
      [
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 7 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 8 · cole seu HTML aqui</div></div></div>` },
        { html: `<div class="inner"><div class="wrap stack"><div class="blank-slot">Seção 9 · cole seu HTML aqui</div></div></div>` }
      ]
    ];

    let currentRow = 1;
    let currentCol = 1;
    let isAnimating = false;

    const grid = document.getElementById("grid");

    function buildGrid() {
      grid.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const screen = document.createElement("div");
          screen.className = "screen";
          screen.dataset.row = r;
          screen.dataset.col = c;
          screen.innerHTML = screensData[r][c].html;
          grid.appendChild(screen);
        }
      }
    }

    function buildNav() {
      const nav = document.getElementById("navMatrix");
      nav.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        const r = Math.floor(i / 3);
        const c = i % 3;
        dot.addEventListener("click", () => navigateTo(r, c));
        nav.appendChild(dot);
      }
    }

    function updateView() {
      const tx = -currentCol * (100 / 3);
      const ty = -currentRow * (100 / 3);
      grid.style.transform = `translate(${tx}%, ${ty}%)`;

      document.querySelectorAll(".dot").forEach((dot, i) => {
        dot.classList.toggle("active", Math.floor(i / 3) === currentRow && i % 3 === currentCol);
      });
    }

    window.navigateTo = function(row, col) {
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
      if (row === currentRow && col === currentCol) return;
      if (isAnimating) return;

      isAnimating = true;
      currentRow = row;
      currentCol = col;
      updateView();

      setTimeout(() => {
        isAnimating = false;
      }, 560);
    };

    function handleSwipe(dx, dy) {
      const ax = Math.abs(dx);
      const ay = Math.abs(dy);
      const SWIPE_DIST = 45;

      if (ax > ay && ax > SWIPE_DIST) {
        dx < 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      } else if (ay > ax && ay > SWIPE_DIST) {
        dy < 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      }
    }

    const drag = { x: 0, y: 0, t: 0, active: false };
    const SWIPE_TIME = 350;

    document.addEventListener("touchstart", e => {
      drag.x = e.touches[0].clientX;
      drag.y = e.touches[0].clientY;
      drag.t = Date.now();
      drag.active = true;
    }, { passive: true });

    document.addEventListener("touchend", e => {
      if (!drag.active) return;
      const dx = e.changedTouches[0].clientX - drag.x;
      const dy = e.changedTouches[0].clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME) return;
      handleSwipe(dx, dy);
    }, { passive: true });

    document.addEventListener("mousedown", e => {
      drag.x = e.clientX;
      drag.y = e.clientY;
      drag.t = Date.now();
      drag.active = true;
    });

    document.addEventListener("mouseup", e => {
      if (!drag.active) return;
      const dx = e.clientX - drag.x;
      const dy = e.clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME || (Math.abs(dx) < 45 && Math.abs(dy) < 45)) return;
      handleSwipe(dx, dy);
    });

    document.addEventListener("keydown", e => {
      switch (e.key) {
        case "ArrowRight": navigateTo(currentRow, currentCol + 1); break;
        case "ArrowLeft": navigateTo(currentRow, currentCol - 1); break;
        case "ArrowDown": navigateTo(currentRow + 1, currentCol); break;
        case "ArrowUp": navigateTo(currentRow - 1, currentCol); break;
        case "Home": navigateTo(1, 1); break;
      }
    });

    let wheelCooldown = false;
    document.addEventListener("wheel", e => {
      if (wheelCooldown) return;
      wheelCooldown = true;
      setTimeout(() => { wheelCooldown = false; }, 700);

      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.deltaY > 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      } else {
        e.deltaX > 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      }
    }, { passive: true });

    buildGrid();
    buildNav();
    updateView();
  </script>
</body>
</html>
