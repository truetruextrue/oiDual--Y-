<script>

const dock = document.querySelector('.kob-tts-dock');

let idleTimer;

function resetIdle(){
  dock.classList.remove('idle');

  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{
    dock.classList.add('idle');
  }, 1870); // 1870  mili segundos parado
}

/* eventos que despertam o dock */
['pointerdown','pointermove','touchstart','mousemove']
.forEach(ev=>{
  document.addEventListener(ev, resetIdle, {passive:true});
});

resetIdle();
</script>

<script>
(() => {

  const toggle = document.getElementById('dualExtractorToggle');
  const panel  = document.getElementById('dualExtractorPanel');
  const close  = document.querySelector('.dual-close');
  const list   = document.getElementById('dualExtractorList');

  toggle.onclick = () => {
    panel.classList.toggle('active');
    renderExtractor();
  };

  close.onclick = () => {
    panel.classList.remove('active');
  };

  function getSmartSelector(el){
    if(el.id) return '#' + el.id;

    let cls = [...el.classList].slice(0,3).join('.');
    return el.tagName.toLowerCase() + (cls ? '.' + cls : '');
  }

  function extractSections(){

    const selectors = [
      '.screen',
      '.media-grid',
      '.video-wrap',
      '.feed-card',
      '.glass-card',
      'section',
      '[class*="hero"]',
      '[class*="grid"]'
    ];

    const found = [];

    selectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => {
        if(found.includes(el)) return;
        found.push(el);
      });
    });

    return found;
  }

  function copy(txt){
    navigator.clipboard.writeText(txt);

    const toast = document.createElement('div');
    toast.innerText = 'COPIADO';
    toast.style.cssText = `
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#000;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      z-index:9999999;
      font-family:monospace;
      border:1px solid rgba(255,255,255,.15);
    `;
    document.body.appendChild(toast);

    setTimeout(()=>toast.remove(),1500);
  }

  function renderExtractor(){

    const blocks = extractSections();

    list.innerHTML = '';

    blocks.forEach((el, index) => {

      const card = document.createElement('div');
      card.className = 'dual-card';

      const selector = getSmartSelector(el);

      const btn = document.createElement('button');
      btn.innerHTML = `
        <div style="font-size:13px;color:#c5a059;margin-bottom:6px;">
          BLOCO ${index + 1}
        </div>

        <div>${selector}</div>
      `;

      btn.onclick = () => {

        document.querySelectorAll('.dual-highlight')
          .forEach(e => e.classList.remove('dual-highlight'));

        el.classList.add('dual-highlight');

        el.scrollIntoView({
          behavior:'smooth',
          block:'center'
        });
      };

      const textarea = document.createElement('textarea');
      textarea.value = el.outerHTML.trim();

      const actions = document.createElement('div');
      actions.className = 'dual-actions';

      const copyBtn = document.createElement('button');
      copyBtn.innerText = 'Copiar HTML';

      copyBtn.onclick = () => {
        copy(textarea.value);
      };

      const replaceBtn = document.createElement('button');
      replaceBtn.innerText = 'Aplicar Alteração';

      replaceBtn.onclick = () => {

        try{

          const temp = document.createElement('div');
          temp.innerHTML = textarea.value.trim();

          const newEl = temp.firstElementChild;

          if(!newEl) return;

          el.replaceWith(newEl);

          renderExtractor();

        }catch(err){
          alert('Erro no HTML');
        }

      };

      actions.append(copyBtn, replaceBtn);

      card.append(btn, textarea, actions);

      list.appendChild(card);

    });

  }

})();
</script>
