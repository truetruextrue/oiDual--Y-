<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Infodose • Texture Engine</title>
<style>
  body {
    background: #f5f7fa;
    font-family: -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .card {
    width: 420px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 20px;
  }

  canvas {
    width: 100%;
    border-radius: 14px;
    background: #eee;
  }

  .controls {
    margin-top: 15px;
    display: grid;
    gap: 10px;
  }

  button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #111;
    color: white;
  }

  input[type="range"] {
    width: 100%;
  }

</style>
</head>
<body>

<div class="card">
  <input type="file" id="upload">

  <canvas id="canvas"></canvas>

  <div class="controls">
    <button onclick="setMode('texture')">Textura</button>
    <button onclick="setMode('liquid')">Líquido</button>
    <button onclick="setMode('paint')">Tinta</button>

    <label>Blur</label>
    <input type="range" id="blur" min="0" max="20" value="4">

    <label>Intensidade</label>
    <input type="range" id="intensity" min="0" max="100" value="50">
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let mode = "texture";

document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  render();
};

function setMode(m) {
  mode = m;
  render();
}

document.getElementById("blur").oninput = render;
document.getElementById("intensity").oninput = render;

function render() {
  if (!img.src) return;

  const blur = document.getElementById("blur").value;
  const intensity = document.getElementById("intensity").value / 100;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BASE
  ctx.filter = `blur(${blur}px)`;
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  if (mode === "texture") {
    for (let i = 0; i < data.length; i += 4) {
      let noise = (Math.random() - 0.5) * 60 * intensity;
      data[i] += noise;
      data[i+1] += noise;
      data[i+2] += noise;
    }
  }

  if (mode === "liquid") {
    for (let i = 0; i < data.length; i += 4) {
      let wave = Math.sin(i * 0.01) * 20 * intensity;
      data[i] += wave;
      data[i+1] += wave;
    }
  }

  if (mode === "paint") {
    for (let i = 0; i < data.length; i += 4) {
      let avg = (data[i] + data[i+1] + data[i+2]) / 3;
      avg = Math.round(avg / 30) * 30;
      data[i] = data[i+1] = data[i+2] = avg;
    }
  }

  ctx.putImageData(imageData, 0, 0);
}
</script>

</body>
</html>
