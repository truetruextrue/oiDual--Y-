<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Infodose · 78Frames Solar Monolito</title>
  <meta name="color-scheme" content="light">
  <style>
    :root {
      --kob-voice-primary: #ff4fa3;
      --kob-voice-secondary: #2ab7ff;
      --kob-voice-accent: #6b7cff;

      --bg-page: #f6f8fc;
      --bg-panel: #ffffff;
      --bg-panel-soft: rgba(255, 255, 255, 0.78);

      --ink: #141824;
      --text: #1f2430;
      --text-soft: #64708a;
      --text-muted: #7c88a0;
      --line: rgba(20, 24, 36, 0.09);

      --shadow: 0 18px 50px rgba(20, 24, 36, 0.08);
      --shadow-soft: 0 10px 30px rgba(20, 24, 36, 0.06);

      --radius: 24px;
      --radius-sm: 16px;
      --chip: #f3f6fb;
      --chip-ink: #42506c;
      --max: 1260px;
      --glass: blur(16px) saturate(170%);
      --drawer-width: 420px;

      --bg-opacity: 0.15;
      --bg-blend: overlay;

      --z-base: 0;
      --z-content: 100;
      --z-widget: 500;
      --z-overlay: 1000;
      --z-system: 5000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    #bg-layer-fixed {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--bg-opacity);
      mix-blend-mode: var(--bg-blend);
      transition: opacity 0.35s ease, background-image 0.45s ease, mix-blend-mode 0.35s ease;
      filter: saturate(1.05) contrast(1.02);
      pointer-events: none;
    }

    .bg-gradient-base {
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(circle at top left, rgba(255,79,163,.06), transparent 28%),
        radial-gradient(circle at 92% 10%, rgba(42,183,255,.06), transparent 22%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg-page) 100%);
      pointer-events: none;
    }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 22px 18px 64px; position: relative; z-index: 1; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
      position: sticky; top: 10px; z-index: 50; margin-bottom: 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 20px;
      box-shadow: var(--shadow-soft);
    }
    .pill-logo {
      width: 44px; height: 44px; flex: none; border-radius: 999px; position: relative; overflow: hidden;
      background: linear-gradient(180deg, #fefefe, #f1f5ff); border: 1px solid rgba(20,24,36,.08);
    }
    .pill-logo:before, .pill-logo:after { content: ""; position: absolute; inset: 7px; border-radius: 999px; transform: rotate(-45deg); }
    .pill-logo:before { background: linear-gradient(135deg, var(--kob-voice-primary), #ffb1d1 50%, #fff 50%, var(--kob-voice-secondary)); clip-path: polygon(0 0, 56% 0, 100% 44%, 100% 100%, 44% 100%, 0 56%); }
    .brand h1 { margin: 0; font-size: 13px; letter-spacing: .34em; text-transform: uppercase; font-weight: 900; }
    .brand p { margin: 3px 0 0; font-size: 12px; color: var(--text-soft); letter-spacing: .08em; }

    .nav-group { display: flex; gap: 10px; align-items: center; }
    .nav-count {
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 18px;
      font-size: 13px; font-weight: 800; letter-spacing: .05em; box-shadow: var(--shadow-soft);
    }
    .drawer-toggle {
      width: 48px; height: 48px; border-radius: 50%; background: var(--bg-panel-soft);
      backdrop-filter: var(--glass); border: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; box-shadow: var(--shadow-soft); transition: 0.2s;
    }
    .drawer-toggle:hover { border-color: var(--kob-voice-primary); transform: scale(1.05); }

    #drawerOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.2); backdrop-filter: blur(4px);
      z-index: 100; opacity: 0; visibility: hidden; transition: 0.3s ease;
    }
    #drawerOverlay.active { opacity: 1; visibility: visible; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--drawer-width); max-width: 94vw;
      background: rgba(255,255,255,.95); backdrop-filter: blur(20px); border-left: 1px solid var(--line);
      box-shadow: -10px 0 40px rgba(0,0,0,.08); z-index: 101;
      transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1);
      display: flex; flex-direction: column;
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header {
      padding: 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }
    .drawer-header h2 { font-size: 16px; letter-spacing: .14em; text-transform: uppercase; font-weight: 900; }
    .drawer-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-soft); }
    .drawer-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 22px; }

    .panel-section {
      background: rgba(255,255,255,.68);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .panel-section label.section-label { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 11px; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; color: var(--text-muted); letter-spacing: .12em; }
    .panel-section input[type="range"] { width: 100%; cursor: pointer; }
    .panel-section select {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--line);
      background: #fff; font-size: 14px; outline: none; cursor: pointer;
    }

    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .preset-btn {
      padding: 12px 8px; font-size: 11px; border: 1px solid var(--line); border-radius: 12px;
      background: #fff; cursor: pointer; font-weight: 800; transition: 0.2s; text-align: center;
    }
    .preset-btn:hover, .preset-btn.active { border-color: var(--kob-voice-primary); color: var(--kob-voice-primary); transform: translateY(-1px); }

    .bg-thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding-right: 4px; }
    .thumb-item {
      height: 70px; border-radius: 12px; background-size: cover; background-position: center;
      cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,.05);
    }
    .thumb-item:hover { transform: scale(1.04); }
    .thumb-item.active { border-color: var(--kob-voice-primary); }

    .btn-upload, .btn-mini, .btn-action, .btn-download {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 999px; cursor: pointer; font-weight: 800; transition: 0.2s;
      border: 1px solid var(--line); background: #fff; color: var(--text);
    }
    .btn-upload {
      width: 100%; padding: 14px; text-align: center; border-style: dashed;
      font-size: 12px; color: var(--text-soft); margin-top: 10px;
    }
    .btn-upload:hover, .btn-mini:hover, .btn-download:hover { border-color: var(--kob-voice-primary); color: var(--kob-voice-primary); transform: translateY(-1px); }
    .btn-mini, .btn-download {
      padding: 11px 14px;
      font-size: 12px;
      background: #fff;
    }
    .btn-action {
      padding: 16px 28px; background: var(--ink); color: #fff; border: none;
      border-radius: 999px; align-self: flex-start;
    }
    .btn-action:hover { transform: translateY(-2px); background: var(--kob-voice-accent); box-shadow: 0 10px 20px rgba(107,124,255,.3); }

    #app-root { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .hero-media {
      position: relative; background: #000; border-radius: var(--radius); overflow: hidden;
      min-height: 600px; border: 1px solid var(--line); box-shadow: var(--shadow);
      cursor: grab; user-select: none;
    }
    .hero-media:active { cursor: grabbing; }
    .hero-media img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .badge {
      position: absolute; left: 18px; top: 18px; display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,.8);
      border: 1px solid var(--line); font-size: 11px; font-weight: 900; letter-spacing: .12em;
      text-transform: uppercase; backdrop-filter: var(--glass);
    }
    .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--kob-voice-primary), var(--kob-voice-secondary)); }
    .swipe-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: white; padding: 8px 16px;
      border-radius: 99px; font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; backdrop-filter: blur(8px); pointer-events: none; opacity: 0.8;
    }

    .hero-content {
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border-radius: var(--radius); border: 1px solid var(--line); padding: 40px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .kicker { font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 900; color: var(--text-soft); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .kicker .line { height: 1px; flex: 1; background: linear-gradient(90deg, var(--line), transparent); }
    .hero-title { font-size: clamp(38px, 4vw, 56px); line-height: 1.05; font-weight: 900; margin: 0 0 20px; letter-spacing: -0.04em; }
    .hero-title span { background: linear-gradient(90deg, var(--kob-voice-primary), var(--kob-voice-secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero-desc { font-size: 18px; color: var(--text-soft); line-height: 1.6; margin-bottom: 30px; }

    .accordion-group { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    details { background: var(--bg-panel-soft); backdrop-filter: var(--glass); border: 1px solid var(--line); border-radius: 18px; transition: all 0.3s ease; }
    details[open] { border-color: rgba(42,183,255,.3); box-shadow: 0 10px 30px rgba(42,183,255,.05); }
    summary { padding: 22px 24px; cursor: pointer; font-weight: 800; font-size: 15px; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 0.05em; list-style: none; }
    summary::-webkit-details-marker { display: none; }
    summary span.icon { transition: transform 0.3s; color: var(--kob-voice-primary); }
    details[open] summary span.icon { transform: rotate(180deg); }
    .acc-content { padding: 0 24px 24px; color: var(--text-soft); line-height: 1.7; font-size: 16px; }

    .catalog-nav { display: flex; gap: 16px; margin-top: 30px; }
    .nav-btn {
      flex: 1; padding: 20px; border-radius: 20px; border: 1px solid var(--line);
      background: var(--bg-panel-soft); backdrop-filter: var(--glass); font-weight: 900;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s;
    }
    .nav-btn:hover:not(:disabled) { background: #fff; border-color: var(--kob-voice-secondary); color: var(--kob-voice-secondary); transform: translateY(-2px); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .footer-quote {
      margin-top: 24px; padding: 24px; text-align: center; border-radius: 24px;
      background: linear-gradient(180deg, #fff, #f8fbff);
      border: 1px solid rgba(42,183,255,.18); font-size: 15px; color: #20283b; box-shadow: var(--shadow-soft);
    }
    .footer-quote b { background: linear-gradient(90deg, var(--kob-voice-primary), var(--kob-voice-secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .fx-stage { display: grid; gap: 14px; }
    .fx-canvas-wrap {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f7f9fd);
      box-shadow: var(--shadow-soft);
    }
    canvas#fxCanvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 260px;
      background: #e9edf5;
    }
    .fx-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .fx-actions .btn-mini, .fx-actions .btn-download { width: 100%; }
    .tiny-note { font-size: 12px; line-height: 1.45; color: var(--text-soft); }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .hero-media { min-height: 450px; }
      .catalog-nav { flex-direction: column; }
      .drawer { width: min(94vw, 420px); }
    }
    @media (max-width: 600px) {
      .wrap { padding: 14px 12px 46px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .nav-group { justify-content: space-between; }
      .hero-title { font-size: 32px; }
      .btn-action { width: 100%; }
      .fx-actions { grid-template-columns: 1fr; }
      .preset-grid, .bg-thumbs { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="bg-gradient-base"></div>
  <div id="bg-layer-fixed"></div>

  <div id="drawerOverlay" onclick="toggleDrawer()"></div>
  <aside class="drawer" id="drawerPanel">
    <div class="drawer-header">
      <h2>⚙️ Background Engine</h2>
      <button class="drawer-close" onclick="toggleDrawer()" title="Fechar">×</button>
    </div>

    <div class="drawer-body">
      <div class="panel-section">
        <label class="section-label"><span>Background</span><span id="bgStatusText">Nenhum</span></label>
        <div class="tiny-note">Ajuste a camada fixa do app e sincronize com localStorage.</div>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Opacidade</span><span id="val-op">15%</span></label>
        <input id="bgOpacity" type="range" min="0" max="100" value="15" oninput="updateBgAttr('opacity', this.value)">
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Mix Blend Mode</span><span>CSS</span></label>
        <select id="bgBlend" onchange="updateBgAttr('blend', this.value)">
          <option value="normal">Normal</option>
          <option value="multiply">Multiply (Escurecer)</option>
          <option value="screen">Screen (Clarear)</option>
          <option value="overlay" selected>Overlay (Realçar)</option>
          <option value="soft-light">Soft Light (Suave)</option>
          <option value="luminosity">Luminosity (Fantasma)</option>
        </select>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Presets de Estilo</span><span>BG</span></label>
        <div class="preset-grid">
          <button class="preset-btn" data-bg-preset="ghost" onclick="applyPreset('ghost')">Fantasma</button>
          <button class="preset-btn active" data-bg-preset="vivid" onclick="applyPreset('vivid')">Vívido</button>
          <button class="preset-btn" data-bg-preset="deep" onclick="applyPreset('deep')">Profundo</button>
        </div>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Biblioteca Local</span><span id="libCount">0</span></label>
        <div class="bg-thumbs" id="thumb-list"></div>
        <label class="btn-upload">
          + Fazer Upload de Imagem
          <input type="file" id="file-upload" accept="image/*" hidden onchange="handleUpload(this)">
        </label>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>FX Lab</span><span>Upload / Frame</span></label>
        <div class="fx-stage">
          <div class="fx-actions">
            <button class="btn-mini" onclick="loadCurrentFrameToFX()">Carregar quadro atual</button>
            <label class="btn-mini" style="justify-content:center;">
              Upload imagem
              <input type="file" id="fx-upload" accept="image/*" hidden>
            </label>
            <button class="btn-download" onclick="downloadFX()">Download PNG</button>
          </div>

          <div class="fx-canvas-wrap">
            <canvas id="fxCanvas" width="1200" height="800"></canvas>
          </div>

          <div class="preset-grid">
            <button class="preset-btn active" data-fx-mode="texture" onclick="setFXMode('texture')">Textura</button>
            <button class="preset-btn" data-fx-mode="liquid" onclick="setFXMode('liquid')">Líquido</button>
            <button class="preset-btn" data-fx-mode="paint" onclick="setFXMode('paint')">Tinta</button>
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Blur gaussiano</span><span id="fxBlurVal">4</span></label>
            <input id="fxBlur" type="range" min="0" max="24" value="4">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Intensidade</span><span id="fxIntensityVal">55</span></label>
            <input id="fxIntensity" type="range" min="0" max="100" value="55">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Liquify</span><span id="fxLiquifyVal">0</span></label>
            <input id="fxLiquify" type="range" min="0" max="100" value="0">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Grain / textura</span><span id="fxGrainVal">35</span></label>
            <input id="fxGrain" type="range" min="0" max="100" value="35">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Contraste</span><span id="fxContrastVal">108</span></label>
            <input id="fxContrast" type="range" min="80" max="140" value="108">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Saturação</span><span id="fxSaturationVal">102</span></label>
            <input id="fxSaturation" type="range" min="60" max="150" value="102">
          </div>

          <button class="btn-action" onclick="applyFXToBackground()">Aplicar FX no Background</button>
          <div class="tiny-note">Se a imagem for muito grande, o motor reduz a área para manter o render leve.</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="pill-logo"></div>
        <div>
          <h1>INFODOSE</h1>
          <p>Catálogo Premium • 78Frames</p>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-count" id="ui-catalog-counter">CARREGANDO...</div>
        <div class="drawer-toggle" onclick="toggleDrawer()" title="Abrir Engine de Background">🎛️</div>
      </div>
    </header>

    <div id="app-root"></div>

    <div class="catalog-nav">
      <button class="nav-btn" id="btn-prev" onclick="changeFrame(-1)">← Quadro Anterior</button>
      <button class="nav-btn" id="btn-next" onclick="changeFrame(1)">Próximo Quadro →</button>
    </div>

    <div class="footer-quote">
      <b>Infodose</b> • “A arte é um código. O silêncio é o sistema. E você é a obra.”
    </div>
  </div>

        kicker: "Infodose High",
        tituloNormal: "Cume ",

      {
        id: "hero-5",
        imagemSrc: "https://kodux78k.github.io/oiDual--Y-/M0D/78FFD/media/hero/hero4.jpg",
        badge: "omega",
        kicker: "Final Code",
        tituloNormal: "Última ",
        tituloDestaque: "Frequência",
        lead: "O fechamento do ciclo cromático. Uma imersão profunda e definitiva, onde observador e obra se fundem.",
        versoes: [
          { titulo: "A Síntese Final", texto: "Cores densas que puxam o olhar para um núcleo infinito, onde o limite entre o espaço físico e a arte digital desaparece." },
          { titulo: "Conexão Profunda", texto: "Um peso visual ancorador que traz foco absoluto ao presente. A liberação final das tensões acumuladas em puro silêncio." }
        ]
      }
    ];

    const KEYS = {
      images: 'di_bgImages',
      opacity: 'di_bg_opacity',
      blend: 'di_bg_blend',
      active: 'di_bg_active',
      auto: 'di_bg_auto'
    };

    let currentIndex = 0;

    function el(id) { return document.getElementById(id); }

    function safeParse(raw, fallback) {
      try { return raw ? JSON.parse(raw) : fallback; }
      catch { return fallback; }
    }

    function emitBgStorageChange(key) {
      window.dispatchEvent(new CustomEvent('di:storage', {
        detail: { key }
      }));
    }

    function getBgList() {
      return safeParse(localStorage.getItem(KEYS.images), []);
    }

    function setBgList(list) {
      localStorage.setItem(KEYS.images, JSON.stringify(list));
      emitBgStorageChange(KEYS.images);
    }

    function upsertBg(url, name = 'background') {
      if (!url) return;

      const list = getBgList();
      const idx = list.findIndex(item => item && item.data === url);

      if (idx === -1) {
        list.unshift({
          id: `bg_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`,
          name,
          data: url,
          active: true
        });
      } else {
        list.forEach((item, i) => item.active = i === idx);
        list[idx].name = name || list[idx].name || 'background';
      }

      setBgList(list);
      const activeIndex = list.findIndex(item => item.active);
      localStorage.setItem(KEYS.active, activeIndex >= 0 ? String(activeIndex) : '');
      emitBgStorageChange(KEYS.active);
      renderLibrary();
    }

    function setActiveBgByUrl(url) {
      const list = getBgList();
      const idx = list.findIndex(item => item && item.data === url);
      if (idx === -1) return;

      list.forEach((item, i) => item.active = i === idx);
      setBgList(list);
      localStorage.setItem(KEYS.active, String(idx));
      emitBgStorageChange(KEYS.active);
      syncFromStorage();
      renderLibrary();
    }

    function getActiveBg() {
      const list = getBgList();
      const activeIndexRaw = localStorage.getItem(KEYS.active);

      if (activeIndexRaw !== null && activeIndexRaw !== '') {
        const idx = Number(activeIndexRaw);
        if (Number.isFinite(idx) && list[idx]?.data) {
          return {
            url: list[idx].data,
            label: list[idx].name || list[idx].id || 'background',
            opacity: localStorage.getItem(KEYS.opacity),
            blend: localStorage.getItem(KEYS.blend),
            auto: localStorage.getItem(KEYS.auto)
          };
        }
      }

      const activeItem = list.find(item => item && item.active && item.data);
      if (activeItem) {
        return {
          url: activeItem.data,
          label: activeItem.name || activeItem.id || 'background',
          opacity: localStorage.getItem(KEYS.opacity),
          blend: localStorage.getItem(KEYS.blend),
          auto: localStorage.getItem(KEYS.auto)
        };
      }

      return {
        url: '',
        label: 'Nenhum',
        opacity: localStorage.getItem(KEYS.opacity),
        blend: localStorage.getItem(KEYS.blend),
        auto: localStorage.getItem(KEYS.auto)
      };
    }

    function applyStateToUI(state) {
      const layer = el('bg-layer-fixed');
      if (layer) {
        const opacity = state.opacity !== null && state.opacity !== undefined ? Number(state.opacity) : 18;
        const blend = state.blend || 'overlay';
        layer.style.opacity = String(Math.max(0, Math.min(1, opacity / 100)));
        layer.style.mixBlendMode = blend;
        layer.style.backgroundImage = state.url ? `url("${state.url}")` : 'none';
      }

      const status = el('bgStatusText');
      if (status) status.textContent = state.label || (state.url ? 'Ativo' : 'Nenhum');

      const opacityLabel = el('val-op');
      if (opacityLabel) {
        const op = state.opacity !== null && state.opacity !== undefined ? Number(state.opacity) : 18;
        opacityLabel.textContent = `${op}%`;
      }

      const opacityInput = el('bgOpacity');
      if (opacityInput) {
        const op = state.opacity !== null && state.opacity !== undefined ? String(state.opacity) : '18';
        if (opacityInput.value !== op) opacityInput.value = op;
      }

      const blendSelect = el('bgBlend');
      if (blendSelect) {
        const blend = state.blend || 'overlay';
        if (blendSelect.value !== blend) blendSelect.value = blend;
      }

      const count = el('libCount');
      if (count) count.textContent = String(getBgList().length);

      renderLibrary();
    }

    function syncFromStorage() {
      const state = getActiveBg();
      applyStateToUI(state);
      window.dispatchEvent(new CustomEvent('di:bg:sync', { detail: state }));
    }

    function startPollingFallback() {
      let last = [
        localStorage.getItem(KEYS.images) || '',
        localStorage.getItem(KEYS.opacity) || '',
        localStorage.getItem(KEYS.blend) || '',
        localStorage.getItem(KEYS.active) || '',
        localStorage.getItem(KEYS.auto) || ''
      ].join('||');

      setInterval(() => {
        const now = [
          localStorage.getItem(KEYS.images) || '',
          localStorage.getItem(KEYS.opacity) || '',
          localStorage.getItem(KEYS.blend) || '',
          localStorage.getItem(KEYS.active) || '',
          localStorage.getItem(KEYS.auto) || ''
        ].join('||');

        if (now !== last) {
          last = now;
          syncFromStorage();
        }
      }, 800);
    }

    function bindEvents() {
      window.addEventListener('storage', (e) => {
        if (!e || !Object.values(KEYS).includes(e.key)) return;
        syncFromStorage();
      });

      window.addEventListener('di:storage', (e) => {
        const key = e?.detail?.key;
        if (key && !Object.values(KEYS).includes(key)) return;
        syncFromStorage();
      });

      window.addEventListener('di:bg:requestSync', syncFromStorage);
    }

    window.toggleDrawer = function() {
      el('drawerOverlay').classList.toggle('active');
      el('drawerPanel').classList.toggle('active');
    };

    window.updateBgAttr = function(type, val) {
      if (type === 'opacity') {
        localStorage.setItem(KEYS.opacity, String(val));
        emitBgStorageChange(KEYS.opacity);
      } else if (type === 'blend') {
        localStorage.setItem(KEYS.blend, String(val));
        emitBgStorageChange(KEYS.blend);
      }
      syncFromStorage();
    };

    window.applyPreset = function(mode) {
      const bgOpacity = el('bgOpacity');
      const bgBlend = el('bgBlend');

      let newOp = 15;
      let newBlend = 'overlay';

      if (mode === 'ghost') {
        newOp = 10;
        newBlend = 'luminosity';
      } else if (mode === 'vivid') {
        newOp = 35;
        newBlend = 'overlay';
      } else if (mode === 'deep') {
        newOp = 50;
        newBlend = 'multiply';
      }

      if (bgOpacity) bgOpacity.value = newOp;
      if (bgBlend) bgBlend.value = newBlend;

      updateBgAttr('opacity', newOp);
      updateBgAttr('blend', newBlend);

      document.querySelectorAll('[data-bg-preset]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.bgPreset === mode);
      });
    };

    function applyBg(url, label = 'background', persist = true) {
      if (!url) return;

      if (persist) {
        upsertBg(url, label);
      } else {
        const list = getBgList();
        const idx = list.findIndex(item => item && item.data === url);
        if (idx >= 0) {
          list.forEach((item, i) => item.active = i === idx);
          setBgList(list);
          localStorage.setItem(KEYS.active, String(idx));
          emitBgStorageChange(KEYS.active);
        } else {
          upsertBg(url, label);
        }
      }

      syncFromStorage();
      renderLibrary();
    }

    window.setAsBg = function() {
      const currentImg = catalogo78Frames[currentIndex].imagemSrc;
      applyBg(currentImg, catalogo78Frames[currentIndex].tituloNormal.trim() + catalogo78Frames[currentIndex].tituloDestaque, true);
    };

    window.handleUpload = function(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const url = e.target.result;
          applyBg(url, input.files[0].name || 'upload', true);
        };
        reader.readAsDataURL(input.files[0]);
      }
    };

    function saveCurrentFrameToLibrary() {
      catalogo78Frames.forEach(f => upsertBg(f.imagemSrc, f.tituloNormal.trim() + f.tituloDestaque));
    }

    function renderLibrary() {
      const items = getBgList();
      const activeUrl = getActiveBg().url;
      const container = el('thumb-list');
      if (!container) return;

      el('libCount').textContent = String(items.length);

      container.innerHTML = items.map(item => `
        <div class="thumb-item ${item.data === activeUrl ? 'active' : ''}"
             style="background-image:url('${item.data}')"
             title="${(item.name || 'background').replace(/"/g,'&quot;')}"
             data-url="${encodeURIComponent(item.data)}">
        </div>
      `).join('');

      container.querySelectorAll('.thumb-item').forEach(node => {
        node.onclick = () => {
          const url = decodeURIComponent(node.dataset.url || '');
          setActiveBgByUrl(url);
        };
      });
    }

    function initSwipe() {
      const area = document.getElementById('swipe-area');
      if (!area || area.__diSwipeBound) return;
      area.__diSwipeBound = true;

      let startX = 0;
      let isDown = false;

      area.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
      area.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        handleGesture(startX, endX);
      });

      area.addEventListener('mousedown', e => { startX = e.clientX; isDown = true; });
      area.addEventListener('mouseup', e => {
        if (!isDown) return;
        handleGesture(startX, e.clientX);
        isDown = false;
      });
      area.addEventListener('mouseleave', () => isDown = false);
    }

    function handleGesture(sX, eX) {
      const threshold = 60;
      if (sX - eX > threshold) changeFrame(1);
      else if (eX - sX > threshold) changeFrame(-1);
    }

    window.changeFrame = function(dir) {
      const newIndex = currentIndex + dir;
      if (newIndex >= 0 && newIndex < catalogo78Frames.length) {
        currentIndex = newIndex;
        window.scrollTo({ top: 0, behavior: 'smooth' });

        const root = document.getElementById('app-root');
        root.style.animation = 'none';
        root.offsetHeight;
        root.style.animation = null;

        setTimeout(() => renderFrame(currentIndex), 10);
      }
    };

    function renderFrame(index) {
      const data = catalogo78Frames[index];
      const root = el('app-root');

      el('ui-catalog-counter').innerText = `QUADRO ${String(index + 1).padStart(2, '0')} DE ${catalogo78Frames.length}`;

      root.innerHTML = `
        <div class="hero">
          <div class="hero-media" id="swipe-area" title="Deslize para os lados">
            <img src="${data.imagemSrc}" alt="${data.tituloNormal}${data.tituloDestaque}">
            <div class="badge"><span class="dot"></span> ${data.badge}</div>
            <div class="swipe-hint">← Deslize para navegar →</div>
          </div>
          <div class="hero-content">
            <div class="kicker"><span>${data.kicker}</span><div class="line"></div></div>
            <h2 class="hero-title"><span>${data.tituloNormal}</span>${data.tituloDestaque}</h2>
            <p class="hero-desc">${data.lead}</p>
            <button class="btn-action" onclick="setAsBg()">Ativar no Background</button>
          </div>
        </div>

        <div class="accordion-group">
          ${data.versoes.map((v, i) => `
            <details ${i === 0 ? 'open' : ''}>
              <summary>${v.titulo} <span class="icon">▼</span></summary>
              <div class="acc-content">${v.texto}</div>
            </details>
          `).join('')}
        </div>
      `;

      el('btn-prev').disabled = index === 0;
      el('btn-next').disabled = index === catalogo78Frames.length - 1;
      initSwipe();
    }

    // ===== FX LAB =====
    const fxCanvas = () => el('fxCanvas');
    const fxCtx = () => fxCanvas().getContext('2d', { willReadFrequently: true });
    const fxSrc = document.createElement('canvas');
    const fxSrcCtx = fxSrc.getContext('2d', { willReadFrequently: true });

    const fxState = {
      mode: 'texture',
      loaded: false,
      img: null,
      name: 'fx'
    };

    const fxControls = {
      blur: el('fxBlur'),
      intensity: el('fxIntensity'),
      liquify: el('fxLiquify'),
      grain: el('fxGrain'),
      contrast: el('fxContrast'),
      saturation: el('fxSaturation')
    };

    function updateFXLabels() {
      el('fxBlurVal').textContent = fxControls.blur.value;
      el('fxIntensityVal').textContent = fxControls.intensity.value;
      el('fxLiquifyVal').textContent = fxControls.liquify.value;
      el('fxGrainVal').textContent = fxControls.grain.value;
      el('fxContrastVal').textContent = fxControls.contrast.value;
      el('fxSaturationVal').textContent = fxControls.saturation.value;
    }

    function setFXMode(mode) {
      fxState.mode = mode;
      document.querySelectorAll('[data-fx-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.fxMode === mode);
      });
      renderFX();
    }

    window.setFXMode = setFXMode;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function resizeFXCanvasToImage(maxW = 1200) {
      if (!fxState.img || !fxState.img.naturalWidth || !fxState.img.naturalHeight) return;
      const ratio = fxState.img.naturalHeight / fxState.img.naturalWidth;
      const w = Math.min(fxState.img.naturalWidth, maxW);
      const h = Math.max(1, Math.round(w * ratio));
      fxCanvas().width = w;
      fxCanvas().height = h;
      fxSrc.width = w;
      fxSrc.height = h;
    }

    function loadFxImageFromUrl(url, name = 'image') {
      if (!url) return;
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        fxState.img = img;
        fxState.loaded = true;
        fxState.name = name || 'image';
        resizeFXCanvasToImage();
        renderFX();
      };
      img.src = url;
    }

    function loadFxImageFromFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => loadFxImageFromUrl(e.target.result, file.name || 'upload');
      reader.readAsDataURL(file);
    }

    function renderFX() {
      if (!fxState.loaded || !fxState.img) {
        const c = fxCanvas();
        const ctx = fxCtx();
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#edf2fb';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#64708a';
        ctx.font = '700 24px Inter, system-ui, sans-serif';
        ctx.fillText('Carregue um quadro ou uma imagem', 32, 56);
        return;
      }

      const c = fxCanvas();
      const ctx = fxCtx();
      const w = c.width;
      const h = c.height;

      fxSrcCtx.clearRect(0, 0, w, h);
      fxSrcCtx.drawImage(fxState.img, 0, 0, w, h);

      const blur = Number(fxControls.blur.value);
      ctx.clearRect(0, 0, w, h);
      ctx.filter = `blur(${blur}px)`;
      ctx.drawImage(fxSrc, 0, 0, w, h);
      ctx.filter = 'none';

      let imageData = ctx.getImageData(0, 0, w, h);
      const srcData = fxSrcCtx.getImageData(0, 0, w, h).data;
      const out = new Uint8ClampedArray(imageData.data.length);

      const intensity = Number(fxControls.intensity.value) / 100;
      const liquify = Number(fxControls.liquify.value) / 100;
      const grain = Number(fxControls.grain.value) / 100;
      const contrast = Number(fxControls.contrast.value) / 100;
      const saturation = Number(fxControls.saturation.value) / 100;

      const cx = w * 0.5;
      const cy = h * 0.5;
      const maxDist = Math.sqrt(cx * cx + cy * cy) || 1;

      function sampleNearest(x, y) {
        const ix = clamp(Math.round(x), 0, w - 1);
        const iy = clamp(Math.round(y), 0, h - 1);
        const idx = (iy * w + ix) * 4;
        return [srcData[idx], srcData[idx + 1], srcData[idx + 2], srcData[idx + 3]];
      }

      function posterize(v, levels) {
        const step = 255 / (levels - 1);
        return Math.round(v / step) * step;
      }

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          let dx = x;
          let dy = y;

          if (fxState.mode === 'liquid' || liquify > 0) {
            const nx = x / w;
            const ny = y / h;
            const waveX = Math.sin((ny * 10.0) + (nx * 6.0)) * 18 * liquify;
            const waveY = Math.cos((nx * 8.0) - (ny * 5.0)) * 14 * liquify;
            const swirl = ((x - cx) / maxDist) * ((y - cy) / maxDist);
            dx = x + waveX + swirl * 10 * liquify;
            dy = y + waveY - swirl * 8 * liquify;
          }

          const px = sampleNearest(dx, dy);
          let r = px[0], g = px[1], b = px[2], a = px[3];

          if (fxState.mode === 'texture') {
            const grainStrength = 24 * grain * intensity;
            const n = (Math.random() - 0.5) * grainStrength;
            r += n; g += n; b += n;
          }

          if (fxState.mode === 'liquid') {
            const edge = Math.sin((x + y) * 0.03) * 10 * intensity;
            r += edge;
            g += edge * 0.8;
            b += edge * 1.05;
          }

          if (fxState.mode === 'paint') {
            const levels = 7 - Math.floor(intensity * 3);
            const safeLevels = clamp(levels, 3, 9);
            r = posterize(r, safeLevels);
            g = posterize(g, safeLevels);
            b = posterize(b, safeLevels);
          }

          r = (r - 128) * contrast + 128;
          g = (g - 128) * contrast + 128;
          b = (b - 128) * contrast + 128;

          const avg = (r + g + b) / 3;
          r = avg + (r - avg) * saturation;
          g = avg + (g - avg) * saturation;
          b = avg + (b - avg) * saturation;

          out[i] = clamp(r, 0, 255);
          out[i + 1] = clamp(g, 0, 255);
          out[i + 2] = clamp(b, 0, 255);
          out[i + 3] = a;
        }
      }

      imageData.data.set(out);
      ctx.putImageData(imageData, 0, 0);

      ctx.save();
      ctx.globalAlpha = 0.10 * intensity;
      ctx.globalCompositeOperation = 'screen';
      ctx.filter = 'blur(8px)';
      ctx.drawImage(fxSrc, 0, 0, w, h);
      ctx.restore();
    }

    function downloadFX() {
      if (!fxState.loaded) return;
      const link = document.createElement('a');
      link.download = `infodose-fx-${fxState.mode}.png`;
      link.href = fxCanvas().toDataURL('image/png');
      link.click();
    }

    function applyFXToBackground() {
      if (!fxState.loaded) return;
      const url = fxCanvas().toDataURL('image/png');
      applyBg(url, `fx-${fxState.mode}`, true);
    }

    function bindFXControls() {
      Object.values(fxControls).forEach(input => {
        input.addEventListener('input', () => {
          updateFXLabels();
          renderFX();
        });
      });

      const upload = el('fx-upload');
      upload.addEventListener('change', e => loadFxImageFromFile(e.target.files[0]));
    }

    window.loadCurrentFrameToFX = function() {
      const img = catalogo78Frames[currentIndex];
      loadFxImageFromUrl(img.imagemSrc, img.tituloNormal.trim() + img.tituloDestaque);
    };

    window.downloadFX = downloadFX;
    window.applyFXToBackground = applyFXToBackground;
    window.renderFX = renderFX;

    window.addEventListener('DOMContentLoaded', () => {
      saveCurrentFrameToLibrary();
      renderFrame(0);
      applyPreset('vivid');

      const initialBg = catalogo78Frames[0].imagemSrc;
      applyBg(initialBg, catalogo78Frames[0].tituloNormal.trim() + catalogo78Frames[0].tituloDestaque, true);

      updateFXLabels();
      bindFXControls();
      renderFX();
      syncFromStorage();

      window.di_renderBgThumbs = renderLibrary;
      window.di_syncBgFromStorage = syncFromStorage;
      window.di_renderBgPanel = renderLibrary;

      loadCurrentFrameToFX();

      bindEvents();
      startPollingFallback();
    });
  </script>
