  <!-- ===== Small bootstrap: parse metas → globals (must run BEFORE kob-hud.js) ===== -->
  <script>
    (function(){
      function parseMetaJSON(name){
        const m = document.querySelector('meta[name="'+name+'"]');
        if(!m) return null;
        try{ return JSON.parse(m.getAttribute('content')); }
        catch(e){ console.warn('parse meta', name, 'fail', e); return null; }
      }
      window.__KOB_HUD_CONFIG__ = window.__KOB_HUD_CONFIG__ || parseMetaJSON('kob-hud-config') || {};
      window.__KOB_VIEWPORT__  = window.__KOB_VIEWPORT__  || parseMetaJSON('kob-viewport')  || {};
      // small helper for debugging in dev
      if(window.__KOB_HUD_CONFIG__ && window.__KOB_HUD_CONFIG__.arch){
        console.info('KOB HUD config:', window.__KOB_HUD_CONFIG__);
      }
    })();
  </script>
