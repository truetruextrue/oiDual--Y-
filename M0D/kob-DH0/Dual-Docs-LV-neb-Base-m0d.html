  <style>
    :root {
      /* Z-index base */
      --z-base: 0;
      --z-content: 100;
      --z-widget: 500;
      --z-overlay: 1000;
      --z-system: 5000;
      
      /* Orb settings */
      --orb-speed: 7.8s;
      --kob-voice-primary: #78e3ff;
      --kob-voice-secondary: #b978ff;
      --kob-voice-accent: #ffffff;
    }

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg-dark) var(--bg-gradient);  /* Sobreposição do céu estrelado */
  color: var(--text);
  font-family: var(--font-main);
  overflow: auto;
}

    /* Estilos do #root - Background reativo às variáveis de voz */
    #root {
      min-height: 100vh;
      width: 100%;
      background-color: #0b0c10; /* Fundo escuro base */
      background-image: 
        radial-gradient(circle at 10% 50%, color-mix(in srgb, var(--kob-voice-primary) 12%, transparent) 0%, transparent 60%),
        radial-gradient(circle at 90% 50%, color-mix(in srgb, var(--kob-voice-secondary) 12%, transparent) 0%, transparent 60%);
      background-attachment: fixed;
      transition: background-image 0.5s ease;
    }

    /* Container do ORB no botão de arquétipo */
    .orb-microphone-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    /* Mini orb adaptado para caber no botão */
    .tts-orb-mini {
        width: 28px;
        height: 28px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .orb {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        position: relative;
        display: grid;
        place-items: center;
        transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.2, 1);
    }

    .orb-core {
        width: 78%;
        height: 78%;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, var(--kob-voice-accent) 0%, rgba(255,255,255,0.1) 10%, transparent 60%),
                    radial-gradient(circle at 70% 70%, var(--kob-voice-primary) 0%, var(--kob-voice-secondary) 100%);
        box-shadow: 0 0 15px var(--kob-voice-primary);
        animation: orbSpin var(--orb-speed) linear infinite;
    }

    @keyframes orbSpin { 
        to { transform: rotate(360deg); } 
    }

    /* Estado de fala (ativo) */
    .speaking .orb-core {
        animation: orbSpin 2s linear infinite, orbPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes orbPulse { 
        from { transform: scale(1); } 
        to { transform: scale(1.15); } 
    }

    /* Indicador de voz original agora integrado ao orb */
    .voice-indicator {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--kob-voice-primary, #4caf50);
        box-shadow: 0 0 8px var(--kob-voice-primary, #4caf50);
        transition: all 0.3s ease;
        z-index: 10;
    }

    .voice-indicator.muted {
        background: #f44336;
        box-shadow: 0 0 8px #f44336;
    }

    /* Ajuste no botão para acomodar o orb */
    #btn-arch {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        overflow: visible;
    }
  </style>
