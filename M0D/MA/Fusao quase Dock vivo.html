<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#05070a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="500 Receitas para Diabéticos">
  <meta name="application-name" content="500 Receitas para Diabéticos">
  <title>🍰 500 Receitas de Sobremesas para Diabéticos</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05070a;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.12);
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --gold:#c5a059;
      --soft:#0c1016;
      --shadow:0 24px 60px rgba(0,0,0,.45);
      --z-base:0;
      --z-content:100;
      --z-widget:500;
      --z-overlay:1000;
      --z-system:5000;
      --kodux-dock-bg: rgba(10,12,20,.56);
      --kodux-dock-border: rgba(255,255,255,.10);
      --kodux-dock-glow: rgba(120,227,255,.45);
      --kodux-dock-primary: #78e3ff;
      --kodux-dock-text: #fff;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:radial-gradient(circle at top,#111826 0%,#05070a 55%,#030405 100%);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
      overscroll-behavior:none;
    }
    body{position:fixed;inset:0}

    a{color:inherit}
    button,input{font:inherit}

    .grid{
      position:fixed;
      inset:0;
      width:300%;
      height:300%;
      display:grid;
      grid-template-columns:repeat(3,33.3333%);
      grid-template-rows:repeat(3,33.3333%);
      transition:transform .55s cubic-bezier(.25,.85,.35,1);
      will-change:transform;
      z-index:var(--z-content);
    }

    .screen{
      width:100vw;
      height:100vh;
      overflow-y:auto;
      overflow-x:hidden;
      position:relative;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      background:
        radial-gradient(circle at 20% 10%, rgba(197,160,89,.12), transparent 25%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.10));
    }

    .screen::-webkit-scrollbar{width:4px}
    .screen::-webkit-scrollbar-thumb{background:rgba(197,160,89,.55);border-radius:999px}
    .screen::-webkit-scrollbar-track{background:transparent}

    .inner{
      min-height:100%;
      padding:28px 18px 124px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{width:100%;max-width:1100px;margin:0 auto}
    .stack{display:grid;gap:18px}

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(197,160,89,.12);
      border:1px solid rgba(197,160,89,.24);
      color:#f5e5bf;
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
    }

    h1,h2{line-height:.94;letter-spacing:-.04em}
    .title{font-size:clamp(2.6rem,8vw,6.8rem);font-weight:900}
    .subtitle{font-size:clamp(1.9rem,5vw,4rem);font-weight:800}
    .lead{
      font-size:clamp(1rem,2.8vw,1.18rem);
      line-height:1.7;
      color:var(--muted);
      max-width:820px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .grid-2,.grid-3{display:grid;gap:18px}
    @media (min-width:768px){
      .grid-2{grid-template-columns:repeat(2,1fr)}
      .grid-3{grid-template-columns:repeat(3,1fr)}
    }

    .box{
      padding:22px;
      border-radius:22px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
    }
    .box h3{font-size:1.08rem;margin-bottom:10px;color:#fff}
    .box p,.box li{color:rgba(255,255,255,.75);line-height:1.65;font-size:.98rem}

    .list{padding-left:18px;display:grid;gap:8px}
    .price{
      font-size:clamp(2rem,7vw,4.4rem);
      font-weight:900;
      color:#fff;
      letter-spacing:-.05em;
    }
    .price strong{color:var(--gold)}

    .btn{
      appearance:none;
      border:none;
      outline:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:15px 24px;
      border-radius:999px;
      font-weight:800;
      letter-spacing:.06em;
      text-transform:uppercase;
      transition:transform .2s ease, background .2s ease, opacity .2s ease;
      text-align:center;
    }
    .btn:hover{transform:translateY(-1px) scale(1.01)}
    .btn-primary{background:linear-gradient(180deg,#ffffff,#e9e9e9);color:#07090d}
    .btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff}
    .btn-whats{background:#25D366;color:#fff;box-shadow:0 10px 26px rgba(37,211,102,.28)}

    .footer-note{color:rgba(255,255,255,.5);font-size:.82rem;line-height:1.55}
    .tagline{font-size:clamp(1.15rem,3vw,1.5rem);line-height:1.7;color:rgba(255,255,255,.82);max-width:760px}
    .accent{color:var(--gold)}
    .mini{font-size:.88rem;color:rgba(255,255,255,.65);line-height:1.65}
    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
      margin:10px 0;
    }

    /* Cards sanfonados */
    .recipe-shell{display:grid;gap:16px}
    .recipe-card{
      background:rgba(255,255,255,.055);
      border:1px solid rgba(255,255,255,.10);
      border-radius:26px;
      overflow:hidden;
      box-shadow:0 14px 34px rgba(0,0,0,.18);
    }
    .recipe-head{
      padding:20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .recipe-head:hover{background:rgba(197,160,89,.05)}
    .recipe-info h3{
      font-size:clamp(1.2rem,3.5vw,1.9rem);
      line-height:1;
      letter-spacing:-.03em;
      margin-bottom:8px;
    }
    .recipe-info p{color:rgba(255,255,255,.72);line-height:1.6}
    .arrow{
      font-size:1.3rem;
      opacity:.82;
      transition:transform .3s ease;
    }
    .recipe-card.active .arrow{transform:rotate(180deg)}
    .recipe-body{
      display:grid;
      grid-template-rows:0fr;
      transition:grid-template-rows .42s cubic-bezier(.22,.61,.36,1);
    }
    .recipe-card.active .recipe-body{grid-template-rows:1fr}
    .recipe-content{overflow:hidden}
    .recipe-inner{
      padding:0 20px 20px;
      display:grid;
      gap:14px;
    }
    .subblock{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.14);
      border-radius:20px;
      padding:18px;
    }
    .subblock h4{
      font-size:1rem;
      margin-bottom:12px;
      color:#fff;
    }
    .arch{display:flex;flex-wrap:wrap;gap:8px}
    .arch span{
      padding:9px 12px;
      border-radius:999px;
      background:rgba(197,160,89,.10);
      border:1px solid rgba(197,160,89,.16);
      color:#f6e2bb;
      font-size:.84rem;
      font-weight:700;
    }
    .steps{display:grid;gap:10px}
    .step{
      padding:14px 15px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.78);
      line-height:1.6;
    }

    /* Nav 3x3 */
    .nav-matrix{
      position:fixed;
      left:50%;
      bottom:calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.65);
      border:1px solid rgba(255,255,255,.09);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      z-index:calc(var(--z-widget) + 1);
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.28);
      transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
      cursor:pointer;
    }
    .dot.active{
      background:var(--gold);
      transform:scale(1.5);
      box-shadow:0 0 12px rgba(197,160,89,.7);
    }

    .hint{
      position:fixed;
      top:16px;
      right:16px;
      z-index:calc(var(--z-widget) + 2);
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,.28);
      user-select:none;
      pointer-events:none;
    }

    @media (max-width:720px){
      .inner{padding:22px 14px 124px}
      .nav-matrix{gap:8px;padding:9px 12px}
      .dot{width:9px;height:9px}
    }

    /* Dock KODUX */
    #kblxDockShell{
      position:fixed;
      inset:auto 0 16px 0;
      z-index:999998;
      display:flex;
      justify-content:center;
      pointer-events:none;
      padding:0 12px;
    }

    #kblxDock{
      pointer-events:auto;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:12px;
      border-radius:22px;
      background:var(--kodux-dock-bg);
      border:1px solid var(--kodux-dock-border);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      transition:transform .28s ease, opacity .28s ease, max-width .28s ease;
      max-width:min(420px, calc(100vw - 24px));
    }
    #kblxDock.is-collapsed{
      transform:scale(.84);
      opacity:.24;
    }

    .kblx-orb{
      width:54px;
      height:54px;
      border:0;
      border-radius:18px;
      display:grid;
      place-items:center;
      color:var(--kodux-dock-text);
      background:rgba(255,255,255,.07);
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      position:relative;
      overflow:hidden;
      transition:transform .18s ease, background .18s ease, box-shadow .18s ease, opacity .18s ease;
    }
    .kblx-orb::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.14), transparent 45%);
      pointer-events:none;
    }
    .kblx-orb:hover,
    .kblx-orb.is-active{
      background:rgba(120,227,255,.16);
      box-shadow:0 0 0 1px rgba(120,227,255,.18), 0 0 20px var(--kodux-dock-glow);
      transform:translateY(-1px) scale(1.02);
    }
    .kblx-orb.is-hidden{opacity:.38}
    .kblx-orb-icon{
      font-size:1.05rem;
      line-height:1;
      font-weight:800;
      letter-spacing:-.03em;
      z-index:1;
    }
    .kblx-orb-mini{
      position:absolute;
      right:6px;
      bottom:6px;
      font-size:.55rem;
      opacity:.55;
      z-index:1;
    }

    #kblxDockPulse{
      position:fixed;
      inset:auto auto 92px 50%;
      transform:translateX(-50%) scale(0);
      z-index:999999;
      width:84px;
      height:84px;
      border-radius:50%;
      background:rgba(120,227,255,.10);
      border:1px solid rgba(120,227,255,.75);
      backdrop-filter:blur(8px);
      pointer-events:none;
      opacity:0;
      transition:transform .22s ease, opacity .22s ease;
      display:grid;
      place-items:center;
      color:#fff;
      font-size:1.3rem;
    }
    #kblxDockPulse.show{
      transform:translateX(-50%) scale(1);
      opacity:1;
    }

    #kblxDockEditor{
      position:fixed;
      inset:0;
      z-index:999999;
      display:none;
      align-items:center;
      justify-content:center;
      padding:12px;
      background:rgba(5,7,10,.30);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    #kblxDockEditor.is-open{display:flex}

    .kblx-editor-card{
      width:min(92vw, 560px);
      border-radius:26px;
      padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)), rgba(18,22,30,.82);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      box-shadow:0 26px 90px rgba(0,0,0,.55);
      font-family:Arial,Helvetica,sans-serif;
    }
    .kblx-editor-head,
    .kblx-editor-row,
    .kblx-editor-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .kblx-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.06);
      font-size:.74rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .kblx-close{
      width:42px;
      height:42px;
      border:0;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
    }
    .kblx-editor-title{
      margin:14px 0 0;
      font-size:1.25rem;
      font-weight:800;
      letter-spacing:-.02em;
    }
    .kblx-editor-sub{
      margin:8px 0 0;
      color:rgba(255,255,255,.62);
      font-size:.92rem;
      line-height:1.4;
    }
    .kblx-section{margin-top:16px}
    .kblx-label{
      display:block;
      margin-bottom:8px;
      color:rgba(255,255,255,.62);
      font-size:.84rem;
    }
    .kblx-input{
      width:100%;
      min-height:52px;
      padding:14px 15px;
      border:1px solid rgba(255,255,255,.08);
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:.95rem;
    }
    .kblx-preview{
      margin-top:10px;
      padding:11px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.05);
      color:rgba(255,255,255,.66);
      font-size:.82rem;
      line-height:1.35;
      word-break:break-word;
      min-height:42px;
    }
    .kblx-presets{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .kblx-preset,
    .kblx-btn{
      border:0;
      cursor:pointer;
      color:#fff;
    }
    .kblx-preset{
      min-height:42px;
      padding:10px 13px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      font-weight:600;
    }
    .kblx-editor-row{
      flex-wrap:wrap;
      margin-top:16px;
    }
    .kblx-btn{
      flex:1 1 155px;
      min-height:50px;
      border-radius:16px;
      background:rgba(255,255,255,.10);
      font-weight:700;
    }
    .kblx-save{background:rgba(255,255,255,.14)}
    .kblx-clear{background:rgba(255,255,255,.06)}
    .kblx-inject{background:rgba(255,255,255,.08)}
    .kblx-dup{background:rgba(255,255,255,.10)}
    .kblx-del{background:rgba(255,255,255,.05)}
    .kblx-note{
      margin-top:12px;
      color:rgba(255,255,255,.48);
      font-size:.74rem;
      line-height:1.35;
    }
    .kblx-note code,.kblx-label code{
      padding:2px 6px;
      border-radius:8px;
      background:rgba(255,255,255,.06);
      color:#fff;
    }
    @media (max-width:480px){
      .kblx-orb{width:50px;height:50px;border-radius:16px}
      #kblxDock{gap:8px;padding:10px}
    }

    /* Frame opcional */
    #frameShell{
      position:fixed;
      inset:0;
      display:none;
      z-index:999997;
      background:rgba(5,7,10,.36);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      padding:12px;
    }
    #frameShell.is-open{display:block}
    #frameCard{
      width:100%;
      height:100%;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:#000;
      box-shadow:0 30px 90px rgba(0,0,0,.55);
      display:flex;
      flex-direction:column;
    }
    #frameTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      background:rgba(255,255,255,.05);
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:.9rem;
    }
    #frameTop button{
      border:0;
      background:rgba(255,255,255,.08);
      color:#fff;
      width:38px;
      height:38px;
      border-radius:12px;
      cursor:pointer;
    }
    #frame{
      width:100%;
      height:100%;
      border:0;
      background:#000;
    }
  </style>
</head>

<body>

  <div class="hint">SWIPE • SETAS • TOQUE</div>
  <div class="grid" id="grid"></div>
  <div class="nav-matrix" id="navMatrix"></div>

  <div id="frameShell" aria-hidden="true">
    <div id="frameCard">
      <div id="frameTop">
        <div id="frameTitle">Sessão</div>
        <button type="button" id="frameClose">✕</button>
      </div>
      <iframe id="frame" src="about:blank" allow="fullscreen"></iframe>
    </div>
  </div>

  <div id="kblxDockShell" aria-label="KODUX dock">
    <div id="kblxDock" class="is-collapsed">
      <button class="kblx-orb" data-orb-id="home" data-title="Home" data-url="https://kodux78k.github.io/oiDual-idHome/" data-mode="frame" data-preset="frame" aria-label="Home">
        <span class="kblx-orb-icon">◌</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="viv" data-title="Vivivi" data-url="https://kodux78k.github.io/oiDual-Vivivi-1/" data-mode="frame" data-preset="frame" aria-label="Vivivi">
        <span class="kblx-orb-icon">꩜</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="doc" data-title="Doc" data-url="https://kodux78k.github.io/info-Doc/index.html" data-mode="frame" data-preset="frame" aria-label="Doc">
        <span class="kblx-orb-icon">◘</span><span class="kblx-orb-mini"></span>
      </button>

      <button class="kblx-orb" data-orb-id="phi" data-title="Phi" data-url="about:blank" data-mode="orb" data-preset="orb" aria-label="Phi">
        <span class="kblx-orb-icon">Φ</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="card" data-title="Card" data-url="" data-mode="dock" data-preset="dock" aria-label="Card">
        <span class="kblx-orb-icon">⌘</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="core" data-title="Core" data-url="" data-mode="orb" data-preset="orb" aria-label="Core">
        <span class="kblx-orb-icon">⊙</span><span class="kblx-orb-mini"></span>
      </button>

      <button class="kblx-orb" data-orb-id="a" data-title="A" data-url="" data-mode="frame" data-preset="frame" aria-label="A">
        <span class="kblx-orb-icon">A</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="b" data-title="B" data-url="" data-mode="frame" data-preset="frame" aria-label="B">
        <span class="kblx-orb-icon">B</span><span class="kblx-orb-mini"></span>
      </button>
      <button class="kblx-orb" data-orb-id="c" data-title="C" data-url="" data-mode="frame" data-preset="frame" aria-label="C">
        <span class="kblx-orb-icon">C</span><span class="kblx-orb-mini"></span>
      </button>
    </div>
  </div>

  <div id="kblxDockPulse">⊙</div>

  <div id="kblxDockEditor" aria-hidden="true">
    <div class="kblx-editor-card" role="dialog" aria-modal="true">
      <div class="kblx-editor-head">
        <div class="kblx-pill">⌘ KODUX · EDITOR DE ORB</div>
        <button class="kblx-close" id="kblxDockClose" type="button">✕</button>
      </div>

      <h2 class="kblx-editor-title" id="kblxDockTitle">Orb</h2>
      <p class="kblx-editor-sub" id="kblxDockSub">Edite a rota, aplique preset, duplique ou remova a órbita.</p>

      <div class="kblx-section">

    let currentRow = 1;
    let currentCol = 1;
    const ROWS = 3, COLS = 3;
    let isAnimating = false;

    const grid = document.getElementById("grid");
    const nav = document.getElementById("navMatrix");
    const frameShell = document.getElementById("frameShell");
    const frame = document.getElementById("frame");
    const frameTitle = document.getElementById("frameTitle");
    const frameClose = document.getElementById("frameClose");

    function buildGrid() {
      grid.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const screen = document.createElement("div");
          screen.className = "screen";
          screen.dataset.row = r;
          screen.dataset.col = c;
          screen.innerHTML = screensData[r][c].html;
          grid.appendChild(screen);
        }
      }
    }

    function buildNav() {
      nav.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        const r = Math.floor(i / 3);
        const c = i % 3;
        dot.addEventListener("click", () => navigateTo(r, c));
        nav.appendChild(dot);
      }
    }

    function updateView() {
      const tx = -currentCol * (100 / 3);
      const ty = -currentRow * (100 / 3);
      grid.style.transform = `translate(${tx}%, ${ty}%)`;

      document.querySelectorAll(".dot").forEach((dot, i) => {
        dot.classList.toggle("active", Math.floor(i / 3) === currentRow && i % 3 === currentCol);
      });
    }

    window.navigateTo = function(row, col) {
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
      if (row === currentRow && col === currentCol) return;
      if (isAnimating) return;
      isAnimating = true;
      currentRow = row;
      currentCol = col;
      updateView();
      setTimeout(() => { isAnimating = false; }, 560);
    };

    function handleSwipe(dx, dy) {
      const ax = Math.abs(dx), ay = Math.abs(dy);
      const SWIPE_DIST = 45;
      if (ax > ay && ax > SWIPE_DIST) {
        dx < 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      } else if (ay > ax && ay > SWIPE_DIST) {
        dy < 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      }
    }

    const drag = { x: 0, y: 0, t: 0, active: false };
    const SWIPE_TIME = 350;

    document.addEventListener("touchstart", e => {
      drag.x = e.touches[0].clientX;
      drag.y = e.touches[0].clientY;
      drag.t = Date.now();
      drag.active = true;
    }, { passive: true });

    document.addEventListener("touchend", e => {
      if (!drag.active) return;
      const dx = e.changedTouches[0].clientX - drag.x;
      const dy = e.changedTouches[0].clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME) return;
      handleSwipe(dx, dy);
    }, { passive: true });

    document.addEventListener("mousedown", e => {
      drag.x = e.clientX;
      drag.y = e.clientY;
      drag.t = Date.now();
      drag.active = true;
    });

    document.addEventListener("mouseup", e => {
      if (!drag.active) return;
      const dx = e.clientX - drag.x;
      const dy = e.clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME || (Math.abs(dx) < 45 && Math.abs(dy) < 45)) return;
      handleSwipe(dx, dy);
    });

    document.addEventListener("keydown", e => {
      switch (e.key) {
        case "ArrowRight": navigateTo(currentRow, currentCol + 1); break;
        case "ArrowLeft": navigateTo(currentRow, currentCol - 1); break;
        case "ArrowDown": navigateTo(currentRow + 1, currentCol); break;
        case "ArrowUp": navigateTo(currentRow - 1, currentCol); break;
        case "Home": navigateTo(1, 1); break;
      }
    });

    let wheelCooldown = false;
    document.addEventListener("wheel", e => {
      if (wheelCooldown) return;
      wheelCooldown = true;
      setTimeout(() => { wheelCooldown = false; }, 700);

      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.deltaY > 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      } else {
        e.deltaX > 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      }
    }, { passive: true });

    buildGrid();
    buildNav();
    updateView();
  </script>

  <script>
    (() => {
      const PRESETS = {
        orb:   { mode: 'orb',   icon: '◉', injectTarget: 'symbol-bar', panelWidth: '560px', frameWidth: '420px', frameHeight: '70vh' },
        frame: { mode: 'frame', icon: '⟁', injectTarget: 'frame',      panelWidth: '680px', frameWidth: '86vw',  frameHeight: '78vh' },
        dock:  { mode: 'dock',  icon: '⌘', injectTarget: 'symbol-wrap', panelWidth: '420px', frameWidth: '480px', frameHeight: '62vh' }
      };

      const state = {
        currentOrb: null,
        longPressTimer: null,
        lastTapAt: 0,
        dockCollapsed: true
      };

      const $ = (s, r = document) => r.querySelector(s);
      const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

      const dock = $('#kblxDock');
      const pulse = $('#kblxDockPulse');
      const editor = $('#kblxDockEditor');
      const titleEl = $('#kblxDockTitle');
      const subEl = $('#kblxDockSub');
      const inputEl = $('#kblxDockInput');
      const previewEl = $('#kblxDockPreview');
      const closeBtn = $('#kblxDockClose');
      const frameShellEl = $('#frameShell');
      const frameEl = $('#frame');
      const frameTitleEl = $('#frameTitle');
      const frameCloseEl = $('#frameClose');

      function safeStore(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
        try { sessionStorage.setItem(key, JSON.stringify(value)); } catch {}
      }

      function safeRead(key) {
        try {
          const v = localStorage.getItem(key) || sessionStorage.getItem(key);
          return v ? JSON.parse(v) : null;
        } catch {
          return null;
        }
      }

      function getOrbKey(orb) {
        return orb?.dataset?.orbId || orb?.id || null;
      }

      function setDockCollapsed(collapsed) {
        state.dockCollapsed = collapsed;
        dock.classList.toggle('is-collapsed', collapsed);
      }

      function flashPulse(text = '⊙') {
        pulse.textContent = text;
        pulse.classList.add('show');
        clearTimeout(flashPulse._t);
        flashPulse._t = setTimeout(() => pulse.classList.remove('show'), 220);
      }

      function updatePreview(url) {
        previewEl.textContent = url?.trim() ? `Destino: ${url}` : 'Nenhuma rota definida.';
      }

      function paintOrb(orb, iconText) {
        if (!orb) return;
        const icon = orb.querySelector('.kblx-orb-icon');
        if (icon) icon.textContent = iconText;
      }

      function syncOrbLabel(orb) {
        if (!orb) return;
        const saved = safeRead(`kblx_orb_${getOrbKey(orb)}`);
        if (saved) {
          if (saved.url !== undefined) orb.dataset.url = saved.url;
          if (saved.mode) orb.dataset.mode = saved.mode;
          if (saved.preset) orb.dataset.preset = saved.preset;
          if (saved.title) orb.dataset.title = saved.title;
          if (saved.hidden !== undefined) orb.dataset.hidden = String(saved.hidden);
          if (saved.icon) paintOrb(orb, saved.icon);
        }
        orb.toggleAttribute('data-hidden', orb.dataset.hidden === 'true');
      }

      function persistOrb(orb) {
        const key = getOrbKey(orb);
        if (!key) return;
        safeStore(`kblx_orb_${key}`, {
          url: orb.dataset.url || '',
          mode: orb.dataset.mode || '',
          preset: orb.dataset.preset || '',
          title: orb.dataset.title || '',
          hidden: orb.dataset.hidden === 'true',
          icon: orb.querySelector('.kblx-orb-icon')?.textContent || '◉',
          updatedAt: Date.now()
        });
      }

      function openEditor(orb) {
        if (!orb) return;
        state.currentOrb = orb;

        const orbKey = getOrbKey(orb);
        const orbTitle = orb.dataset.title || orbKey || 'Orb';
        const orbUrl = orb.dataset.url || '';
        const orbPreset = orb.dataset.preset || 'frame';

        titleEl.textContent = orbTitle;
        subEl.textContent = `Editando: ${orbKey || 'orb'} · preset ${orbPreset}`;
        inputEl.value = orbUrl;
        updatePreview(orbUrl);

        editor.classList.add('is-open');
        editor.setAttribute('aria-hidden', 'false');
        flashPulse('✎');
      }

      function closeEditor() {
        editor.classList.remove('is-open');
        editor.setAttribute('aria-hidden', 'true');
        state.currentOrb = null;
      }

      function applyPreset(orb, presetKey) {
        const preset = PRESETS[presetKey];
        if (!orb || !preset) return;

        orb.dataset.preset = presetKey;
        orb.dataset.mode = preset.mode;
        orb.dataset.injectTarget = preset.injectTarget;
        orb.dataset.panelWidth = preset.panelWidth;
        orb.dataset.frameWidth = preset.frameWidth;
        orb.dataset.frameHeight = preset.frameHeight;
        paintOrb(orb, preset.icon);
        persistOrb(orb);
      }

      function saveUrl(orb, url) {
        if (!orb) return;
        const clean = String(url || '').trim();
        orb.dataset.url = clean;
        if (!clean) orb.dataset.hidden = 'false';
        persistOrb(orb);
      }

      function duplicateOrb(orb) {
        if (!orb || !orb.parentElement) return null;
        const clone = orb.cloneNode(true);
        const baseId = getOrbKey(orb) || 'orb';
        clone.dataset.orbId = `${baseId}-${Date.now().toString(36)}`;
        clone.dataset.title = `${orb.dataset.title || baseId} Copy`;
        clone.dataset.url = orb.dataset.url || '';
        clone.dataset.mode = orb.dataset.mode || 'frame';
        clone.dataset.preset = orb.dataset.preset || 'frame';
        clone.dataset.hidden = orb.dataset.hidden || 'false';
        paintOrb(clone, orb.querySelector('.kblx-orb-icon')?.textContent || '◉');
        orb.parentElement.insertBefore(clone, orb.nextSibling);
        persistOrb(clone);
        bindOrb(clone);
        return clone;
      }

      function removeOrb(orb) {
        if (!orb) return;
        const key = getOrbKey(orb);
        try { localStorage.removeItem(`kblx_orb_${key}`); } catch {}
        try { sessionStorage.removeItem(`kblx_orb_${key}`); } catch {}
        orb.remove();
      }

      function openSession(orb) {
        if (!orb) return;
        const url = orb.dataset.url || '';
        const mode = orb.dataset.mode || 'frame';

        if (url) {
          frameEl.src = url;
          frameTitleEl.textContent = orb.dataset.title || getOrbKey(orb) || 'Sessão';
          frameShellEl.classList.add('is-open');
          frameShellEl.setAttribute('aria-hidden', 'false');
        }

        window.dispatchEvent(new CustomEvent('kblx:special-frame-open', {
          detail: {
            url,
            mode,
            target: orb.dataset.injectTarget || 'frame',
            width: orb.dataset.frameWidth || '86vw',
            height: orb.dataset.frameHeight || '78vh',
            title: orb.dataset.title || getOrbKey(orb) || 'Orb',
            button: orb
          }
        }));

        flashPulse('↗');
      }

      function toggleDockExpanded() {
        setDockCollapsed(!state.dockCollapsed);
        flashPulse(state.dockCollapsed ? '⊕' : '⊝');
      }

      function bindOrb(orb) {
        if (!orb || orb.dataset.kblxBound === '1') return;
        orb.dataset.kblxBound = '1';

        syncOrbLabel(orb);

        orb.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();

          const now = Date.now();
          if (now - state.lastTapAt < 300) {
            toggleDockExpanded();
            state.lastTapAt = 0;
            return;
          }
          state.lastTapAt = now;

          state.currentOrb = orb;
          $$('.kblx-orb', dock).forEach(x => x.classList.remove('is-active'));
          orb.classList.add('is-active');

          if (!orb.dataset.url) {
            flashPulse('◉');
            return;
          }

          openSession(orb);
        });

        const startPress = () => {
          clearTimeout(state.longPressTimer);
          state.longPressTimer = setTimeout(() => openEditor(orb), 520);
        };

        const cancelPress = () => clearTimeout(state.longPressTimer);

        orb.addEventListener('touchstart', startPress, { passive: true });
        orb.addEventListener('touchend', cancelPress, { passive: true });
        orb.addEventListener('touchmove', cancelPress, { passive: true });
        orb.addEventListener('mousedown', startPress);
        orb.addEventListener('mouseup', cancelPress);
        orb.addEventListener('mouseleave', cancelPress);
        orb.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          openEditor(orb);
        });

        orb.addEventListener('mouseenter', () => {
          if (window.matchMedia('(pointer:fine)').matches) {
            flashPulse(orb.querySelector('.kblx-orb-icon')?.textContent || '◉');
          }
        });
      }

      function bindAllOrbs() {
        $$('.kblx-orb', dock).forEach(bindOrb);
      }

      closeBtn?.addEventListener('click', closeEditor);
      editor?.addEventListener('click', (e) => {
        if (e.target === editor) closeEditor();
      });

      frameCloseEl?.addEventListener('click', () => {
        frameShellEl.classList.remove('is-open');
        frameShellEl.setAttribute('aria-hidden', 'true');
        frameEl.src = 'about:blank';
      });

      frameShellEl?.addEventListener('click', (e) => {
        if (e.target === frameShellEl) {
          frameShellEl.classList.remove('is-open');
          frameShellEl.setAttribute('aria-hidden', 'true');
          frameEl.src = 'about:blank';
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeEditor();
          frameShellEl.classList.remove('is-open');
          frameShellEl.setAttribute('aria-hidden', 'true');
          frameEl.src = 'about:blank';
        }
        if (e.key === 'Home') setDockCollapsed(true);
      });

      document.addEventListener('click', (e) => {
        const presetBtn = e.target.closest('[data-preset]');
        if (presetBtn) {
          const orb = state.currentOrb;
          if (!orb) return;
          applyPreset(orb, presetBtn.dataset.preset);
          titleEl.textContent = `${orb.dataset.title || getOrbKey(orb) || 'Orb'} · ${PRESETS[presetBtn.dataset.preset].mode}`;
          subEl.textContent = `Preset aplicado: ${presetBtn.dataset.preset}`;
          return;
        }

        if (!state.currentOrb) return;

        if (e.target.closest('#kblxSave')) {
          saveUrl(state.currentOrb, inputEl.value);
          updatePreview(inputEl.value);
          return;
        }

        if (e.target.closest('#kblxClear')) {
          state.currentOrb.dataset.url = '';
          state.currentOrb.dataset.mode = '';
          state.currentOrb.dataset.preset = '';
          state.currentOrb.dataset.injectTarget = '';
          state.currentOrb.dataset.frameWidth = '';
          state.currentOrb.dataset.frameHeight = '';
          paintOrb(state.currentOrb, '◉');
          inputEl.value = '';
          updatePreview('');
          persistOrb(state.currentOrb);
          return;
        }

        if (e.target.closest('#kblxInject')) {
          openSession(state.currentOrb);
          return;
        }

        if (e.target.closest('#kblxDuplicate')) {
          const clone = duplicateOrb(state.currentOrb);
          if (clone) openEditor(clone);
          return;
        }

        if (e.target.closest('#kblxDelete')) {
          const orb = state.currentOrb;
          closeEditor();
          removeOrb(orb);
        }
      });

      document.addEventListener('input', (e) => {
        if (!e.target.matches('#kblxDockInput')) return;
        if (!state.currentOrb) return;
        updatePreview(e.target.value);
        saveUrl(state.currentOrb, e.target.value);
      });

      window.KODUX_ORB = {
        openEditor,
        closeEditor,
        openSession,
        applyPreset,
        duplicateOrb,
        removeOrb,
        setCollapsed: setDockCollapsed,
        toggleDock: toggleDockExpanded,
        bindAll: bindAllOrbs
      };

      bindAllOrbs();
      setDockCollapsed(true);

      const mo = new MutationObserver(() => bindAllOrbs());
      mo.observe(dock, { childList:true, subtree:true });

      window.addEventListener('kblx:special-frame-open', (ev) => {
        const detail = ev.detail || {};
        if (detail.url && frameEl) {
          frameEl.src = detail.url;
        }
      });
    })();
  </script>

  <script>
    document.querySelectorAll('.recipe-card .recipe-head').forEach(head => {
      head.addEventListener('click', () => {
        head.parentElement.classList.toggle('active');
      });
    });
  </script>
</body>
</html>
