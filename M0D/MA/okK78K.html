      --line:#e7ded0;
      --text:#1f2430;
      --muted:#5d6677;
      --accent:#c28a3d;
      --accent2:#8c6a2f;
      --soft:#fbfaf7;
      --shadow:0 18px 40px rgba(31,36,48,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(194,138,61,.12), transparent 25%),
        radial-gradient(circle at top right, rgba(140,106,47,.08), transparent 22%),
        linear-gradient(180deg, #fffdf9, var(--bg));
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    a { color: inherit; }
    button { font: inherit; }

    .grid {
      position: fixed;
      inset: 0;
      width: 300%;
      height: 300%;
      display: grid;
      grid-template-columns: repeat(3, 33.3333%);
      grid-template-rows: repeat(3, 33.3333%);
      transition: transform .55s cubic-bezier(.25,.85,.35,1);
      will-change: transform;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.96)),
        radial-gradient(circle at 20% 10%, rgba(194,138,61,.12), transparent 18%);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    .screen::-webkit-scrollbar { width: 5px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen::-webkit-scrollbar-thumb { background: rgba(194,138,61,.55); border-radius: 999px; }

    .inner {
      min-height: 100%;
      padding: 30px 18px 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(194,138,61,.10);
      border: 1px solid rgba(194,138,61,.20);
      color: var(--accent2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    h1, h2 {
      line-height: .94;
      letter-spacing: -.04em;
    }

    .title {
      font-size: clamp(2.4rem, 7vw, 6.8rem);
      font-weight: 900;
      margin-top: 18px;
    }

    .subtitle {
      font-size: clamp(1.9rem, 4.5vw, 3.8rem);
      font-weight: 900;
    }

    .lead {
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      line-height: 1.75;
      color: var(--muted);
      max-width: 820px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .grid-2, .grid-3 {
      display: grid;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
    }

    .box {
      padding: 22px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid #ece4d7;
      box-shadow: 0 10px 24px rgba(31,36,48,.05);
    }

    .box h3 {
      font-size: 1.04rem;
      margin-bottom: 10px;
      color: var(--text);
    }

    .box p, .box li, .mini, .note {
      color: var(--muted);
      line-height: 1.7;
      font-size: .98rem;
    }

    .list {
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

      font-weight: 900;
      color: var(--text);
      letter-spacing: -.05em;

      text-decoration: none;

      align-items: center;
      justify-content: center;

      font-weight: 800;
      letter-spacing: .06em;

      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      text-align: center;
      box-shadow: 0 10px 24px rgba(31,36,48,.08);

    .btn:hover { transform: translateY(-1px) scale(1.01); }
    .btn-primary {
      background: linear-gradient(180deg, #ffffff, #f4efe6);
      color: var(--text);
      border: 1px solid #e7ded0;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #d8d0c3;
      color: var(--text);
      box-shadow: none;
    }
    .btn-whats {
      background: #25D366;
      color: #fff;
      box-shadow: 0 10px 26px rgba(37,211,102,.24);
    }

    .footer-note {
      color: rgba(31,36,48,.58);
      font-size: .82rem;
      line-height: 1.6;
    }

    .nav-matrix {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(194,138,61,.16);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 50;
      box-shadow: 0 14px 30px rgba(31,36,48,.08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(31,36,48,.20);
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
      cursor: pointer;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.5);
      box-shadow: 0 0 12px rgba(194,138,61,.45);
    }

    .hint {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 60;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(31,36,48,.34);
      user-select: none;
      pointer-events: none;
    }

    .tagline {

      line-height: 1.75;
      color: var(--muted);
      max-width: 820px;

    .accent { color: var(--accent); }

  </style>
</head>

          html: `
            <div class="inner">
              <div class="wrap stack">
                <div class="muted-topline">Observação importante</div>
                <h2 class="subtitle">Texto curto para chamada</h2>

                <div class="panel accent-bg" style="padding:26px;">
                  <p class="lead" style="margin:0 auto; color: var(--text);">
                    Coma sem medo e sem erro! Receitas fáceis, práticas e seguras para o dia a dia. Receba antes, pague depois. Apenas R$ 9,90.
                  </p>
                </div>

                <div class="callout">
                  <p class="mini">
                    Este material tem finalidade informativa e culinária. Ele não substitui orientação médica ou nutricional individual.
                  </p>
                </div>
              </div>
            </div>
          `
        }
      ]
    ];

    let currentRow = 1;
    let currentCol = 1;
    const ROWS = 3, COLS = 3;
    let isAnimating = false;

    const grid = document.getElementById("grid");

    function buildGrid() {
      grid.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const screen = document.createElement("div");
          screen.className = "screen";
          screen.dataset.row = r;
          screen.dataset.col = c;
          screen.innerHTML = screensData[r][c].html;
          grid.appendChild(screen);
        }
      }
    }

    function buildNav() {
      const nav = document.getElementById("navMatrix");
      nav.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const dot = document.createElement("div");
        dot.className = "dot";
        const r = Math.floor(i / 3);
        const c = i % 3;
        dot.addEventListener("click", () => navigateTo(r, c));
        nav.appendChild(dot);
      }
    }

    function updateView() {
      const tx = -currentCol * (100 / 3);
      const ty = -currentRow * (100 / 3);
      grid.style.transform = `translate(${tx}%, ${ty}%)`;

      document.querySelectorAll(".dot").forEach((dot, i) => {
        dot.classList.toggle("active", Math.floor(i / 3) === currentRow && i % 3 === currentCol);
      });
    }

    window.navigateTo = function(row, col) {
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
      if (row === currentRow && col === currentCol) return;
      if (isAnimating) return;
      isAnimating = true;
      currentRow = row;
      currentCol = col;
      updateView();
      setTimeout(() => { isAnimating = false; }, 560);
    };

    function handleSwipe(dx, dy) {
      const ax = Math.abs(dx), ay = Math.abs(dy);
      const SWIPE_DIST = 45;
      if (ax > ay && ax > SWIPE_DIST) {
        dx < 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      } else if (ay > ax && ay > SWIPE_DIST) {
        dy < 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      }
    }

    const drag = { x: 0, y: 0, t: 0, active: false };
    const SWIPE_TIME = 350;

    document.addEventListener("touchstart", e => {
      drag.x = e.touches[0].clientX;
      drag.y = e.touches[0].clientY;
      drag.t = Date.now();
      drag.active = true;
    }, { passive: true });

    document.addEventListener("touchend", e => {
      if (!drag.active) return;
      const dx = e.changedTouches[0].clientX - drag.x;
      const dy = e.changedTouches[0].clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME) return;
      handleSwipe(dx, dy);
    }, { passive: true });

    document.addEventListener("mousedown", e => {
      drag.x = e.clientX;
      drag.y = e.clientY;
      drag.t = Date.now();
      drag.active = true;
    });

    document.addEventListener("mouseup", e => {
      if (!drag.active) return;
      const dx = e.clientX - drag.x;
      const dy = e.clientY - drag.y;
      const dt = Date.now() - drag.t;
      drag.active = false;
      if (dt > SWIPE_TIME || (Math.abs(dx) < 45 && Math.abs(dy) < 45)) return;
      handleSwipe(dx, dy);
    });

    document.addEventListener("keydown", e => {
      switch (e.key) {
        case "ArrowRight": navigateTo(currentRow, currentCol + 1); break;
        case "ArrowLeft": navigateTo(currentRow, currentCol - 1); break;
        case "ArrowDown": navigateTo(currentRow + 1, currentCol); break;
        case "ArrowUp": navigateTo(currentRow - 1, currentCol); break;
        case "Home": navigateTo(1, 1); break;
      }
    });

    let wheelCooldown = false;
    document.addEventListener("wheel", e => {
      if (wheelCooldown) return;
      wheelCooldown = true;
      setTimeout(() => { wheelCooldown = false; }, 700);

      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.deltaY > 0 ? navigateTo(currentRow + 1, currentCol) : navigateTo(currentRow - 1, currentCol);
      } else {
        e.deltaX > 0 ? navigateTo(currentRow, currentCol + 1) : navigateTo(currentRow, currentCol - 1);
      }
    }, { passive: true });

    buildGrid();
    buildNav();
    updateView();
  </script>

  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/FSWIN/js/modules/iFSw-fix.js"></script>

</body>
