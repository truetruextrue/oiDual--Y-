    --ink:#e8ecf6;--muted:#a2acc5;--gold:#f7d774;--cyan:#67e6ff;

    --z-base:0;--z-content:100;--z-widget:500;--z-overlay:1000;--z-system:5000;

    --kob-voice-primary:#78e3ff;

  .theme-gold{--grad-a:#ffd54a;--grad-b:#ff8a00;--cyan:#ffd97a;--gold:#ffe08a;--panel:#12100b;--bg:#0a0906;--ink:#fff6db;--muted:#d3c6a2}
  .theme-thermal{--grad-a:#ff7ae6;--grad-b:#ff7a00;--cyan:#ffc29d;--gold:#ffc6f3;--panel:#160e15;--bg:#0b0710;--ink:#ffeefe;--muted:#d4bcd2}

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font:400 16px/1.65 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    overflow-x:hidden;
    overflow-y:auto;
  }

  /* ── #root reativo às variáveis de voz (do kob-mestre-22-v2) ── */
  #root {
    min-height:100vh;
    width:100%;
    background-color:#0b0c10;
    background-image:
      radial-gradient(circle at 10% 50%, color-mix(in srgb, var(--kob-voice-primary) 12%, transparent) 0%, transparent 60%),
      radial-gradient(circle at 90% 50%, color-mix(in srgb, var(--kob-voice-secondary) 12%, transparent) 0%, transparent 60%);
    background-attachment:fixed;
    transition:background-image 0.5s ease;
  }

  /* ── ORB no botão de arquétipo ── */
  .orb-microphone-container{
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .tts-orb-mini{
    width:28px;height:28px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .orb{
    width:100%;height:100%;border-radius:50%;position:relative;
    display:grid;place-items:center;
    transition:transform .3s cubic-bezier(.2,.9,.2,1);
  }
  .orb-core{
    width:78%;height:78%;border-radius:50%;
    background:
      radial-gradient(circle at 30% 30%, var(--kob-voice-accent) 0%, rgba(255,255,255,.1) 10%, transparent 60%),
      radial-gradient(circle at 70% 70%, var(--kob-voice-primary) 0%, var(--kob-voice-secondary) 100%);
    box-shadow:0 0 15px var(--kob-voice-primary);
    animation:orbSpin var(--orb-speed) linear infinite;
  }
  @keyframes orbSpin{to{transform:rotate(360deg)}}
  .speaking .orb-core{animation:orbSpin 2s linear infinite, orbPulse .5s ease-in-out infinite alternate}
  @keyframes orbPulse{from{transform:scale(1)}to{transform:scale(1.15)}}

  .voice-indicator{
    position:absolute;top:-2px;right:-2px;
    width:8px;height:8px;border-radius:50%;
    background:var(--kob-voice-primary,#4caf50);
    box-shadow:0 0 8px var(--kob-voice-primary,#4caf50);
    transition:all .3s ease;z-index:10;
  }
  .voice-indicator.muted{background:#f44336;box-shadow:0 0 8px #f44336}

  #btn-arch{
    position:relative;display:flex;
    align-items:center;justify-content:center;
    padding:0;overflow:visible;
  }

  /* ── TTS Dock idle fade ── */
  .kob-tts-dock{transition:transform .35s ease, opacity .65s ease;box-shadow:none !important}
  .kob-tts-dock.idle{opacity:.12;transform:scale(.92)}
  .kob-tts-dock:hover{opacity:1;transform:scale(1)}

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script id="CSS_INNER_RENDER_V1">
(()=>{'use strict';
const STYLE_ID='INLINE_CSS_RENDER_V1';
function appendCSS(css){
  if(!css||!css.trim())return;
  let s=document.getElementById(STYLE_ID);
  if(!s){s=document.createElement('style');s.id=STYLE_ID;document.head.appendChild(s);}
  s.appendChild(document.createTextNode('\n'+css));
}
window.CSS_INNER={
  applyFromDOM(){
    let css='';
    document.querySelectorAll('style[data-inline],[data-css-inline],pre[data-lang="css"],code.language-css,pre code.css').forEach(el=>{
      const t=(el.textContent||'').trim();if(t)css+='\n'+t;
    });
    appendCSS(css);
  },
  applyFromHTML(html){
    if(!html)return;
    const re=/<style[^>]*>([\s\S]*?)<\/style>/gi;let m,css='';
    while((m=re.exec(html))){css+='\n'+(m[1]||'');}
    appendCSS(css);
  }
};
document.addEventListener('DOMContentLoaded',()=>CSS_INNER.applyFromDOM());
})();
</script>

<script id="CSS_INNER_SAFE_V2">
(()=>{'use strict';
const STYLE_ID='INLINE_CSS_RENDER_SAFE_V2';
function appendSafe(css){
  if(!css||!css.trim())return;
  let s=document.getElementById(STYLE_ID);
  if(!s){s=document.createElement('style');s.id=STYLE_ID;document.head.appendChild(s);}
  s.appendChild(document.createTextNode('\n'+css));
}
window.CSS_INNER_SAFE={
  applyFromDOM(root=document){
    let css='';
    root.querySelectorAll('style[data-inline]').forEach(el=>{
      const t=(el.textContent||'').trim();if(t)css+='\n'+t;
    });
    appendSafe(css);
  },
  applyFromHTML(html){
    if(!html)return;
    const re=/<style[^>]*\bdata-inline\b[^>]*>([\s\S]*?)<\/style>/gi;let m,css='';
    while((m=re.exec(html)))css+='\n'+(m[1]||'');
    appendSafe(css);
  }
};
document.addEventListener('DOMContentLoaded',()=>CSS_INNER_SAFE.applyFromDOM());
})();
</script>

<script id="KATEX_AUTORUN_AFTER_BUILD_V1">
(()=>{'use strict';
function loadOnceCSS(href,id){return new Promise(ok=>{if(document.getElementById(id))return ok();
  const l=document.createElement('link');l.id=id;l.rel='stylesheet';l.href=href;l.onload=ok;document.head.appendChild(l);});}
function loadOnceJS(src,id){return new Promise(ok=>{if(document.getElementById(id))return ok();
  const s=document.createElement('script');s.id=id;s.src=src;s.defer=true;s.onload=ok;document.head.appendChild(s);});}
async function ensureKaTeX(){if(window.renderMathInElement)return;
  const CDN="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist";
  await loadOnceCSS(`${CDN}/katex.min.css`,'katex_css');
  await loadOnceJS(`${CDN}/katex.min.js`,'katex_js');
  await loadOnceJS(`${CDN}/contrib/auto-render.min.js`,'katex_auto_js');
}
async function run(root){
  await ensureKaTeX();
  if(typeof window.KaTeXRender==='function')return window.KaTeXRender(root||document.body);
  if(window.renderMathInElement)window.renderMathInElement(root||document.body,{
    delimiters:[
      {left:"$$",right:"$$",display:true},
      {left:"\\$begin:math:display$",right:"\\$end:math:display$",display:true},
      {left:"$",right:"$",display:false},
      {left:"\\$begin:math:text$",right:"\\$end:math:text$",display:false}
    ],
    throwOnError:false,
    ignoredTags:["script","noscript","style","textarea","code","pre"]
  });
}
['autoBuild','autoBuildNested'].forEach(name=>{
  const f=window[name];
  if(typeof f==='function'&&!f.__kxKaTeXWrapped){
    window[name]=function(text){const out=f(text);run(document.getElementById('root'));return out;}
    window[name].__kxKaTeXWrapped=true;
  }
});
})();
</script>

<script>
(function(){
  const dock = document.querySelector('.kob-tts-dock');
  if (!dock) return;

  let idleTimer;

  function resetIdle(){
    dock.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function(){
      dock.classList.add('idle');
    }, 1780);
  }

  ['pointerdown','pointermove','touchstart','mousemove'].forEach(function(ev){
    dock.addEventListener(ev, resetIdle, { passive: true });
  });

  resetIdle();
})();
</script>

<style> 

/* estado normal */
.kob-tts-dock{
  transition: transform .35s ease, opacity .65s ease;
}

/* quase invisível */
.kob-tts-dock.idle{
  opacity: .12;
  transform: scale(.92);
}

/* quando passa o dedo ou mouse */
.kob-tts-dock:hover{
  opacity: 1;
  transform: scale(1);
}

.kob-tts-dock{

 
  box-shadow:none !important;
}</style>



<script>

const dock = document.querySelector('.kob-tts-dock');

if (dock) {

  let idleTimer;

  function resetIdle(){
    dock.classList.remove('idle');

    clearTimeout(idleTimer);
    idleTimer = setTimeout(()=>{
      dock.classList.add('idle');
    }, 1780); // 1780 ms parado
  }

  /* eventos que despertam o dock */
  ['pointerdown','pointermove','touchstart','mousemove']
  .forEach(ev=>{
    dock.addEventListener(ev, resetIdle, { passive:true });
  });

  resetIdle();

}

</script>
