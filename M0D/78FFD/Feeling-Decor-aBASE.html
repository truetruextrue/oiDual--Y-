<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Feeling Decor | Viviani Costa</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --brand-gold: #c5a059;
      --brand-dark: #05070a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fff;
      color: var(--brand-dark);
      scroll-snap-type: y proximity;
      overflow-x: hidden;
    }

    .font-serif { font-family: 'Playfair Display', serif; }
    .font-tech { font-family: 'Space Mono', monospace; }

    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5vw;
      position: relative;
    }

    .hero-title {
      font-size: clamp(3rem, 12vw, 15rem);
      line-height: 0.85;
      letter-spacing: -0.04em;
    }

    .sub-title {
      font-size: clamp(1.5rem, 4vw, 4rem);
      line-height: 1.1;
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .parallax-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      object-fit: cover;
      filter: brightness(0.8);
    }

    .mandala {
      position: absolute;
      width: 40vw;
      opacity: 0.05;
      animation: rotate 100s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .btn-lux {
      background: black;
      color: white;
      padding: 1.5rem 3rem;
      border-radius: 99px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }

    .btn-lux:hover {
      background: var(--brand-gold);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <nav class="fixed top-0 left-0 w-full z-50 p-8 flex justify-between items-center mix-blend-difference text-white">
    <div class="font-serif text-3xl font-black italic tracking-tighter">Feeling.</div>
    <div class="hidden md:flex gap-12 font-tech text-xs uppercase tracking-widest">
      <a href="#home" class="hover:text-brand-gold">Início</a>
      <a href="#concept" class="hover:text-brand-gold">Conceito</a>
      <a href="#curadoria" class="hover:text-brand-gold">Curadoria</a>
    </div>
  </nav>

  <!-- SEÇÃO 1: HERO -->
  <section id="home" class="overflow-hidden">
    <img src="https://kodux78k.github.io/oiDual-Vivivi-1/media/portifolio/img5.jpg" class="parallax-bg" alt="">
    <div class="text-center text-white z-10 reveal">
      <h1 class="hero-title font-serif font-black">
        Design <br> 
        <span class="italic font-normal">Sensorial.</span>
      </h1>
      <p class="font-tech text-sm mt-8 uppercase tracking-[0.5em]">Frequência • Harmonia • Fluidez</p>
    </div>
    <img src="https://kodux78k.github.io/oiDual-Vivivi-1/media/hero/mandala.png" class="mandala right-[-10vw]" alt="">
  </section>

  
<script>
  const CONFIG = {
    instagram: {
      reel2: "https://www.instagram.com/feeling.decor_/reel/DCbZPpNxk0L/"
    },
    images: {
      img3: "https://kodux78k.github.io/oiDual-Vivivi-1/media/conceito/img3.jpg"
    }
  };

  window.addEventListener('load', () => {
    const link3 = document.getElementById('ig-link-3');
    const img3 = document.getElementById('ig-img-3');

    if (link3) link3.href = CONFIG.instagram.reel2;
    if (img3) img3.src = CONFIG.images.img3;

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  });

  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      const target = document.querySelector(this.getAttribute('href'));
      if (!target) return;
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth' });
    });
  });
</script>  
</body>
</html>
