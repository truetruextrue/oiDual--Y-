<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Infodose · 78Frames Catálogo + Carrossel</title>
  <meta name="color-scheme" content="light">
  <style>
    /* ===== INFODOSE · 78FRAMES — MONOLITO COM CARROSSEL ===== */
    :root {
      --kob-voice-primary: #ff4fa3;
      --kob-voice-secondary: #2ab7ff;
      --kob-voice-accent: #6b7cff;
      --bg-page: #f6f8fc;
      --bg-panel: #ffffff;
      --bg-panel-soft: rgba(255, 255, 255, 0.78);
      --ink: #141824;
      --text: #1f2430;
      --text-soft: #64708a;
      --text-muted: #7c88a0;
      --line: rgba(20, 24, 36, 0.09);
      --line-strong: rgba(42, 183, 255, 0.22);
      --shadow: 0 18px 50px rgba(20, 24, 36, 0.08);
      --shadow-soft: 0 10px 30px rgba(20, 24, 36, 0.06);
      --radius: 24px;
      --radius-sm: 16px;
      --pill: #eef3ff;
      --pill-ink: #2d3550;
      --chip: #f3f6fb;
      --chip-ink: #42506c;
      --max: 1260px;
      --glass: blur(16px) saturate(170%);
      --drawer-width: 360px;
    }

    * { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      isolation: isolate;
    }

    /* camada de background fixa */
    #bg-fake-custom {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.18;
      mix-blend-mode: overlay;
      transition: opacity 0.35s ease, background-image 0.45s ease;
      filter: saturate(1.03) contrast(1.04);
    }
    #bg-fake-custom::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
      mix-blend-mode: screen;
    }

    .wrap, .topbar, #app-root, .drawer, #drawerOverlay {
      position: relative;
      z-index: 1;
    }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 22px 18px 64px; }

    /* TOPBAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      position: sticky; top: 10px; z-index: 30;
      margin-bottom: 18px;
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 20px;
      box-shadow: var(--shadow-soft);
    }
    .pill-logo {
      width: 44px; height: 44px; flex: none; border-radius: 999px;
      background: linear-gradient(180deg, #fefefe, #f1f5ff);
      border: 1px solid rgba(20,24,36,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.8);
      position: relative; overflow: hidden;
    }
    .pill-logo:before, .pill-logo:after {
      content: ""; position: absolute; inset: 7px; border-radius: 999px; transform: rotate(-45deg);
    }
    .pill-logo:before {
      background: linear-gradient(135deg, var(--kob-voice-primary), #ffb1d1 50%, #fff 50%, var(--kob-voice-secondary));
      clip-path: polygon(0 0, 56% 0, 100% 44%, 100% 100%, 44% 100%, 0 56%);
    }
    .pill-logo:after {
      inset: 14px; background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.2));
      mix-blend-mode: screen;
    }
    .brand h1 { margin: 0; font-size: 13px; letter-spacing: .34em; text-transform: uppercase; color: #111827; font-weight: 800; }
    .brand p { margin: 3px 0 0; font-size: 12px; color: var(--text-soft); letter-spacing: .08em; }
    .nav-group { display: flex; gap: 10px; align-items: center; }
    .nav-count {
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 18px;
      font-size: 13px; font-weight: 800; letter-spacing: .05em; box-shadow: var(--shadow-soft);
    }
    .drawer-toggle {
      width: 48px; height: 48px; border-radius: 50%; background: var(--bg-panel-soft);
      backdrop-filter: var(--glass); border: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; box-shadow: var(--shadow-soft);
    }

    /* DRAWER */
    #drawerOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.15); backdrop-filter: blur(4px);
      z-index: 100; opacity: 0; visibility: hidden; transition: 0.25s;
    }
    #drawerOverlay.active { opacity: 1; visibility: visible; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--drawer-width); max-width: 90vw;
      background: rgba(255,255,255,.92); backdrop-filter: blur(20px);
      z-index: 101; transform: translateX(100%); transition: transform 0.3s;
      display: flex; flex-direction: column; border-left: 1px solid var(--line);
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header { padding: 24px 22px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
    .drawer-close { background: none; border: none; font-size: 28px; cursor: pointer; }
    .drawer-body { padding: 20px 22px; overflow-y: auto; flex: 1; }

    /* PAINEL BACKGROUND */
    .cockpit-item { margin-bottom: 28px; }
    .cockpit-label { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; }
    .bg-toolbox { display: grid; gap: 14px; }
    .bg-toolbox-head { display: flex; align-items: center; justify-content: space-between; background: var(--bg-page); padding: 8px 12px; border-radius: 40px; border: 1px solid var(--line); }
    .btn-icon { background: #fff; border: 1px solid var(--line); border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .bg-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-block { background: var(--bg-panel); border: 1px solid var(--line); border-radius: 40px; padding: 12px 10px; font-weight: 800; font-size: 12px; cursor: pointer; }
    .bg-control { display: grid; gap: 8px; }
    .bg-control label { font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; }
    .cockpit-input, select { background: #fff; border: 1px solid var(--line); border-radius: 40px; padding: 12px 16px; }
    .bg-presets { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .preset-btn { border: 1px solid var(--line); border-radius: 40px; background: #fff; padding: 10px; font-weight: 800; font-size: 11px; cursor: pointer; }
    .bg-frames { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 8px; max-height: 260px; overflow: auto; }
    .bg-frame-thumb {
      position: relative; height: 80px; border-radius: 14px; background-size: cover; background-position: center;
      border: 2px solid transparent; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,.06);
    }
    .bg-frame-thumb.active { border-color: var(--kob-voice-primary); }
    .bg-frame-thumb .tag { position: absolute; left: 6px; right: 6px; bottom: 6px; font-size: 9px; font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }

    /* CARROSSEL */
    .carousel-container { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: var(--radius); }
    .carousel-slides { display: flex; height: 100%; transition: transform 0.3s ease; cursor: grab; }
    .carousel-slides:active { cursor: grabbing; }
    .carousel-slide { flex: 0 0 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.7); backdrop-filter: blur(8px);
      border: 1px solid var(--line); border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      z-index: 5; font-size: 24px; color: var(--ink); transition: 0.2s;
    }
    .carousel-btn:hover { background: #fff; }
    .carousel-btn.prev { left: 16px; }
    .carousel-btn.next { right: 16px; }
    .carousel-dots {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 5;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.5);
      border: 1px solid rgba(0,0,0,.1); transition: 0.2s;
    }
    .dot.active { background: var(--kob-voice-primary); transform: scale(1.3); }

    /* HERO e CONTEÚDO */
    #app-root { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hero { display: grid; grid-template-columns: 1.04fr .96fr; gap: 20px; margin-top: 18px; }
    .hero-card {
      background: var(--bg-panel-soft); backdrop-filter: var(--glass);
      border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .hero-media { min-height: 720px; background: #f3f6fb; position: relative; }
    .hero-media .badge {
      position: absolute; left: 18px; top: 18px; z-index: 10; display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 999px; background: rgba(255,255,255,.8);
      border: 1px solid var(--line); font-size: 12px; font-weight: 800; backdrop-filter: var(--glass);
    }
    .badge .dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg, var(--kob-voice-primary), var(--kob-voice-secondary)); }
    .hero-copy { padding: 36px; display: flex; flex-direction: column; gap: 24px; }
    .kicker { display: flex; align-items: center; gap: 10px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .22em; font-weight: 800; font-size: 12px; }
    .title { margin: 8px 0 0; font-size: clamp(38px,4vw,72px); line-height: .96; letter-spacing: -.05em; color: #151a26; }
    .title .grad { background: linear-gradient(90deg, var(--kob-voice-primary), #ffb15c 35%, var(--kob-voice-secondary) 68%, var(--kob-voice-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lead { margin: 0; font-size: 18px; line-height: 1.7; color: var(--text-soft); }
    .mini-pills { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: var(--chip); border: 1px solid var(--line); color: var(--chip-ink); font-size: 13px; font-weight: 700; }

    .section { margin-top: 20px; background: var(--bg-panel-soft); backdrop-filter: var(--glass); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-soft); overflow: hidden; }
    .section-head { padding: 24px; border-bottom: 1px solid var(--line); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 18px; }
    .panel { background: var(--bg-panel); border: 1px solid var(--line); border-radius: 22px; overflow: hidden; }
    .panel-h { padding: 24px 24px 0; }
    .panel-body { padding: 24px; }
    .summary { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: linear-gradient(180deg, #fff, #fbfcff); }
    .tag { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; font-size: 12px; margin-bottom: 12px; color: var(--kob-voice-primary); }
    .accent-quote { margin-top: 16px; border-left: 3px solid rgba(255,79,163,.48); padding: 16px; background: linear-gradient(90deg, rgba(255,79,163,.06), rgba(42,183,255,.05), transparent); border-radius: 12px; font-style: italic; }

    .accordion { display: grid; gap: 12px; padding: 18px; }
    details.acc { background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
    details.acc summary { list-style: none; cursor: pointer; padding: 20px 24px; display: flex; justify-content: space-between; font-weight: 800; text-transform: uppercase; }
    .acc-body { padding: 0 24px 24px; line-height: 1.8; }
    .stack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
    .stack { background: rgba(255,255,255,.8); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    .stack-head { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
    .stack-body { padding: 20px 24px; display: grid; gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: #fff; }
    .card-k { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-weight: 800; }
    .orb { width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(135deg, var(--kob-voice-primary), var(--kob-voice-secondary)); }

    .catalog-nav { display: flex; gap: 16px; margin-top: 24px; }
    .nav-btn { flex: 1; padding: 18px; border-radius: 60px; background: var(--bg-panel-soft); backdrop-filter: var(--glass); border: 1px solid var(--line); font-weight: 800; cursor: pointer; transition: all 0.3s; }
    .nav-btn:hover:not(:disabled) { border-color: var(--kob-voice-primary); color: var(--kob-voice-accent); transform: translateY(-2px); }
    .footer-quote { margin-top: 18px; padding: 24px; text-align: center; border-radius: 24px; background: linear-gradient(180deg, #fff, #f8fbff); border: 1px solid rgba(42,183,255,.18); }

    @media (max-width: 1020px) { .hero, .grid-2, .stack-grid { grid-template-columns: 1fr; } .hero-media { min-height: 520px; } }
  </style>
</head>

        panel1: { titulo: "Neuroestética", desc: "Beleza que se reorganiza.", items: [{ tag: "Plasticidade", texto: "Cada olhar reconfigura a percepção." }], quote: "“A imagem nunca é a mesma.”" },
        panel2: { titulo: "Flow State", desc: "Estado alterado de atenção.", items: [{ tag: "Dopamina", texto: "Liberação sustentada por novidade." }], quote: "“Perder-se para se encontrar.”" },
        versoes: [{ titulo: "Leitura", hint: "mapa", open: true, texto: "<b>Atlas:</b> Cartografia do inconsciente coletivo." }],
        ambienteCards: [{ icon: "tech", texto: "Diálogo entre arte e neurociência." }],
        resumoCards: [{ icon: "transformação", texto: "Modulador de estados mentais." }]
      }
    ];

    let currentIndex = 0;
    window.currentIndex = currentIndex;
    let currentCarouselIndex = 0;
    let carouselTimer = null;

    // ========== CARROSSEL (arraste) ==========
    function initCarousel(container, images) {
      if (!container) return;
      const slides = container.querySelector('.carousel-slides');
      const dots = container.querySelectorAll('.dot');
      const prevBtn = container.querySelector('.carousel-btn.prev');
      const nextBtn = container.querySelector('.carousel-btn.next');
      let startX = 0, currentTranslate = 0, prevTranslate = 0, isDragging = false;
      
      const updateSlide = (index) => {
        if (!slides) return;
        currentCarouselIndex = index;
        slides.style.transform = `translateX(-${index * 100}%)`;
        container.querySelectorAll('.dot').forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });
        // Atualiza imagem ativa para background
        if (window.currentFrameImages) {
          window.currentActiveImage = images[index];
        }
      };

      const nextSlide = () => { const newIdx = (currentCarouselIndex + 1) % images.length; updateSlide(newIdx); };
      const prevSlide = () => { const newIdx = (currentCarouselIndex - 1 + images.length) % images.length; updateSlide(newIdx); };

      if (prevBtn) prevBtn.onclick = (e) => { e.stopPropagation(); prevSlide(); };
      if (nextBtn) nextBtn.onclick = (e) => { e.stopPropagation(); nextSlide(); };

      // Touch / Mouse drag
      const handleStart = (clientX) => {
        isDragging = true;
        startX = clientX;
        slides.style.transition = 'none';
        prevTranslate = -currentCarouselIndex * container.offsetWidth;
      };
      const handleMove = (clientX) => {
        if (!isDragging) return;
        const delta = clientX - startX;
        currentTranslate = prevTranslate + delta;
        slides.style.transform = `translateX(${currentTranslate}px)`;
      };
      const handleEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        slides.style.transition = 'transform 0.3s ease';
        const movedBy = currentTranslate - prevTranslate;
        const threshold = container.offsetWidth * 0.2;
        if (movedBy < -threshold && currentCarouselIndex < images.length-1) updateSlide(currentCarouselIndex+1);
        else if (movedBy > threshold && currentCarouselIndex > 0) updateSlide(currentCarouselIndex-1);
        else updateSlide(currentCarouselIndex);
      };

      container.addEventListener('mousedown', (e) => { e.preventDefault(); handleStart(e.clientX); });
      container.addEventListener('mousemove', (e) => { e.preventDefault(); handleMove(e.clientX); });
      container.addEventListener('mouseup', handleEnd);
      container.addEventListener('mouseleave', handleEnd);
      container.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX), {passive: true});
      container.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX), {passive: true});
      container.addEventListener('touchend', handleEnd);

      updateSlide(0);
      window.currentActiveImage = images[0];
    }

    // ========== RENDER PRINCIPAL ==========
    window.renderFrame = function(index) {
      const data = window.catalogo78Frames[index];
      window.currentFrameImages = data.imagens;
      const root = document.getElementById('app-root');
      document.getElementById('ui-catalog-counter').innerText = `QUADRO ${String(index+1).padStart(2,'0')} DE ${window.catalogo78Frames.length}`;

      const chipsHTML = data.chips.map(chip => `<div class="chip"><b>${chip}</b></div>`).join('');
      const versoesHTML = (data.versoes || []).map(v => `
        <details class="acc" ${v.open ? 'open' : ''}>
          <summary><span>${v.titulo}</span><span class="hint">${v.hint}</span></summary>
          <div class="acc-body">${v.texto}</div>
        </details>`).join('');
      
      const imagensCarrossel = data.imagens.map((img, i) => `
        <div class="carousel-slide"><img src="${img}" alt="slide ${i}"></div>
      `).join('');
      const dotsHTML = data.imagens.map((_, i) => `<span class="dot ${i===0?'active':''}"></span>`).join('');

      root.innerHTML = `
        <section class="hero">
          <article class="hero-card hero-media">
            <div class="carousel-container" id="carousel-${data.id}">
              <div class="carousel-slides">${imagensCarrossel}</div>
              <button class="carousel-btn prev">←</button>
              <button class="carousel-btn next">→</button>
              <div class="carousel-dots">${dotsHTML}</div>
            </div>
            <div class="badge"><span class="dot"></span> ${data.badge}</div>
          </article>
          <article class="hero-card hero-copy">
            <div><div class="kicker"><span>${data.kicker}</span><span class="line"></span></div>
            <h2 class="title"><span class="grad">${data.tituloNormal}</span> ${data.tituloDestaque}</h2>
            <p class="lead">${data.lead}</p></div>
            <div class="mini-pills">${chipsHTML}</div>
          </article>
        </section>
        <section class="section"><div class="section-head"><h2>Camadas de Interpretação</h2></div>
          <div class="grid-2">
            <div class="panel"><div class="panel-h"><h3>${data.panel1.titulo}</h3></div><div class="panel-body">${data.panel1.items.map(i=>`<div class="summary"><div class="tag"><span class="mark"></span>${i.tag}</div><p>${i.texto}</p></div>`).join('')}<div class="accent-quote">${data.panel1.quote}</div></div></div>
            <div class="panel"><div class="panel-h"><h3>${data.panel2.titulo}</h3></div><div class="panel-body">${data.panel2.items.map(i=>`<div class="summary"><div class="tag"><span class="mark"></span>${i.tag}</div><p>${i.texto}</p></div>`).join('')}<div class="accent-quote">${data.panel2.quote}</div></div></div>
          </div>
        </section>
        <section class="section"><div class="section-head"><h2>Profundidade da Obra</h2></div><div class="accordion">${versoesHTML}</div></section>
        <section class="stack-grid">
          <article class="stack"><div class="stack-head"><h3>Como integrar</h3></div><div class="stack-body">${(data.ambienteCards||[]).map(c=>`<div class="card"><div class="card-k"><span class="orb"></span>${c.icon}</div><p>${c.texto}</p></div>`).join('')}</div></article>
          <article class="stack"><div class="stack-head"><h3>Resumo da Modulação</h3></div><div class="stack-body">${(data.resumoCards||[]).map(c=>`<div class="card"><div class="card-k"><span class="orb"></span>${c.icon}</div><p>${c.texto}</p></div>`).join('')}</div></article>
        </section>`;

      const carouselContainer = document.getElementById(`carousel-${data.id}`);
      if (carouselContainer) initCarousel(carouselContainer, data.imagens);

      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === window.catalogo78Frames.length - 1;
      window.currentIndex = index;
    };

    window.changeFrame = function(dir) {
      const newIdx = currentIndex + dir;
      if (newIdx >= 0 && newIdx < window.catalogo78Frames.length) {
        currentIndex = newIdx;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderFrame(currentIndex);
      }
    };

    window.toggleDrawer = function() {
      document.getElementById('drawerOverlay').classList.toggle('active');
      document.getElementById('drawerPanel').classList.toggle('active');
    };

    // ========== ENGINE BACKGROUND ==========
    (function(){
      const LS = { opacity: 'di_bg_opacity', blend: 'di_bg_blend', auto: 'di_bg_auto', active: 'di_bg_active', images: 'di_bgImages' };
      const state = { url: '', label: 'Nenhum', opacity: 18, blend: 'overlay', auto: false };
      function el(id){ return document.getElementById(id); }
      function safeJSONParse(raw, fb){ try { return raw ? JSON.parse(raw) : fb; } catch { return fb; } }
      function getStoredImages(){ return safeJSONParse(localStorage.getItem(LS.images), []); }
      function setStoredImages(list){ localStorage.setItem(LS.images, JSON.stringify(list||[])); }
      function ensureLayer(){ let l = el('bg-fake-custom'); if(!l){ l=document.createElement('div'); l.id='bg-fake-custom'; document.body.prepend(l); } return l; }
      
      function applyToLayer(){
        const layer = ensureLayer();
        layer.style.opacity = state.opacity/100;
        layer.style.mixBlendMode = state.blend;
        layer.style.backgroundImage = state.url ? `url("${state.url}")` : 'none';
        const status = el('bgStatusText'); if(status) status.textContent = state.label || (state.url ? 'Ativo' : 'Nenhum');
        el('bgOpacityLabel').textContent = `${state.opacity}%`;
        el('btnAutoBgSync').textContent = `Auto BG: ${state.auto ? 'ON' : 'OFF'}`;
        localStorage.setItem(LS.opacity, state.opacity);
        localStorage.setItem(LS.blend, state.blend);
        localStorage.setItem(LS.auto, state.auto?'1':'0');
      }

      function setBg(url, label='BG'){
        state.url = url; state.label = label; applyToLayer(); renderThumbs();
        if(url) localStorage.setItem(LS.active, url);
      }

      function getCurrentActiveImage(){
        if (window.currentActiveImage) return window.currentActiveImage;
        const frame = window.catalogo78Frames[window.currentIndex||0];
        return frame ? frame.imagens[0] : '';
      }

      function renderThumbs(){
        const panel = el('bgThumbPanel'); if(!panel) return;
        const frames = window.catalogo78Frames;
        let html = frames.map((f,i)=> `<div class="bg-frame-thumb ${state.url===f.imagens[0]?'active':''}" style="background-image:url('${f.imagens[0]}')" onclick="di_setBg('${f.imagens[0]}','${f.badge}')"><div class="tag">${f.badge}</div></div>`).join('');
        panel.innerHTML = html;
      }

      window.di_setBg = function(url, label){ setBg(url, label); };
      
      function bindUI(){
        el('bgOpacity').addEventListener('input', e=>{ state.opacity=Number(e.target.value); applyToLayer(); });
        el('bgBlend').addEventListener('change', e=>{ state.blend=e.target.value; applyToLayer(); });
        el('btnUseCurrentFrameBg').addEventListener('click', ()=>{ setBg(getCurrentActiveImage(), 'Quadro atual'); });
        el('btnAutoBgSync').addEventListener('click', ()=>{ state.auto=!state.auto; applyToLayer(); });
        document.querySelectorAll('.preset-btn[data-preset]').forEach(b=> b.addEventListener('click', ()=>{
          const p = {soft:{opacity:12,blend:'soft-light'},dream:{opacity:22,blend:'overlay'},intense:{opacity:38,blend:'multiply'}}[b.dataset.preset];
          if(p){ state.opacity=p.opacity; state.blend=p.blend; el('bgOpacity').value=p.opacity; el('bgBlend').value=p.blend; applyToLayer(); }
        }));
        el('bgUploadInput').addEventListener('change', e=>{
          const f=e.target.files[0]; if(!f) return; const r=new FileReader();
          r.onload=ev=>{ setBg(ev.target.result, f.name); }; r.readAsDataURL(f);
        });
      }

      const origRender = window.renderFrame;
      window.renderFrame = function(idx){
        origRender.call(this, idx);
        if(state.auto) setTimeout(()=> setBg(getCurrentActiveImage(), 'Auto'), 20);
      };

      function restore(){
        const op=Number(localStorage.getItem(LS.opacity)); if(!isNaN(op)) state.opacity=op;
        const bl=localStorage.getItem(LS.blend); if(bl) state.blend=bl;
        state.auto=localStorage.getItem(LS.auto)==='1';
        el('bgOpacity').value = state.opacity;
        el('bgBlend').value = state.blend;
        const active = localStorage.getItem(LS.active);
        if(active) setBg(active, 'Restaurado'); else applyToLayer();
        renderThumbs();
      }

      ensureLayer(); bindUI(); restore();
    })();

    window.addEventListener('DOMContentLoaded', ()=> renderFrame(0));
  })();
</script>
</body>
</html>
