<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBLLUX Monolith - Shell Integrado</title>

<style>
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overflow: auto !important;
    }
    
    /* ==========================================================================
       MAIN ADDON & WINDOW SYSTEM (Adaptado para o Index)
       ========================================================================== */
    #stackWrap {
      width: 100%;
      padding: 9px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      margin-top: 40px;
    }

    /* SESSION WINDOW / STACK (Card Sanfonado) */
    .session-window {
      background: rgba(30, 30, 35, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      margin-bottom: 20px; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      height: 78vh;
      min-height: 387px;
      width: 100%;
      cursor: pointer;
    }

    /* Estado com espaço para aparecer o header do iframe */
    .session-window.peeked {
      height: 87px !important;
      min-height: 87px !important;
    }

    .session-window.peeked .win-frame {
      flex: 0 0 26px;
      height: 26px;
      min-height: 26px;
      max-height: 26px;
      overflow: hidden;
    }

    .session-window.peeked .win-hdr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Estado Colapsado (Sanfonado) */
    .session-window.collapsed {
      height: 52px !important;
      min-height: 52px !important;
    }

    .session-window.collapsed .win-frame {
      display: none !important;
    }

    /* Estado Minimizado (Escondido e mandado pro Dock) */
    .session-window.minimized {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9) translateY(50px);
      position: absolute;
    }

    /* Estado Maximizado (Tela cheia) */
    .session-window.maximized {
      position: fixed;
      inset: 0;
      z-index: 92000;
      border-radius: 0;
      margin: 0;
      height: 100vh !important;
      width: 100vw !important;
      border: none;
    }

    /* Cabeçalho da Janela */
    .win-hdr {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      user-select: none;
      box-sizing: border-box;
      min-height: 52px;
    }

    .win-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Controles (Botões) */
    .win-controls {
      display: flex;
      gap: 8px;
    }

    .win-controls button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      font-size: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.2s;
      display: grid;
      place-items: center;
    }

    .win-controls button:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }

    /* Iframe ocupando o corpo da janela */
    .win-frame {
      width: 100%;
      flex: 1;
      border: 0;
      background: transparent;
    }

    /* DOCK (MINIMIZED WINDOWS) */
    #dock {
      position: fixed;
      bottom: 80px;
      left: -20px;
      display: flex;
      gap: 12px;
      padding: 10px 20px;
      border-radius: 40px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 2500;
      transition: 0.3s;
    }

    #dock:empty {
      opacity: 0;
      transform: translate(-50%, 20px);
      pointer-events: none;
    }

    .dock-bubble {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 20px;
      transition: 0.3s;
    }

    .dock-bubble:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 10px 20px rgba(0,242,255,0.2);
    }
  </style>

</head>
<body class="main-addon">

  <!-- Dock para onde as janelas minimizadas vão -->
  <div id="dock"></div>

  <!-- =========================================================
       SUBSTITUIÇÃO DO IFRAME SECO PELO SISTEMA DE JANELAS
       ========================================================= -->
  <div id="stackWrap">
    <div class="session-window" id="session-iframe" data-card-cycle="0" onclick="cycleSessionWindow('session-iframe')">
      
      <!-- Header da janela -->
      <div class="win-hdr">
        <div class="win-title">🌐 DUAL H0 // KOB LV BASE</div>
        
        <!-- Botões de Controle -->
        <div class="win-controls" onclick="event.stopPropagation()">
          <button onclick="toggleCollapse('session-iframe')" title="Colapsar">—</button>
          <button onclick="toggleMaximize('session-iframe')" title="Maximizar">⬜</button>
          <button onclick="minimizeWindow('session-iframe')" title="Minimizar para o Dock">✕</button>
        </div>
      </div>

      <!-- Iframe Incorporado (com sua URL original do index.html) -->
      <iframe
        class="win-frame"
        src="https://kodux78k.github.io/oiDual-H0/DH0-10.html"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
        allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
        loading="lazy">
      </iframe>

    </div>
  </div>

  <!-- Scripts do Motor de Janelas (Pulse / Kaos / Vitalis) -->
 <!-- Scripts do Motor de Janelas Injetados -->
  <script>
    function setSessionWindowState(el, state) {
      el.classList.remove('collapsed', 'peeked');
      if (state === 'collapsed') el.classList.add('collapsed');
      if (state === 'peeked') el.classList.add('peeked');
      el.dataset.windowState = state;
    }

    // Clique no card: normal -> 78px -> colapsado -> 78px -> normal
    function cycleSessionWindow(id) {
      const el = document.getElementById(id);
      if (!el || el.classList.contains('minimized') || el.classList.contains('maximized')) return;

      const step = Number(el.dataset.cardCycle || '0');
      const next = (step + 1) % 4;
      el.dataset.cardCycle = String(next);

      if (next === 0) {
        setSessionWindowState(el, 'normal');
      } else if (next === 1 || next === 3) {
        setSessionWindowState(el, 'peeked');
      } else if (next === 2) {
        setSessionWindowState(el, 'collapsed');
      }
    }

    // Botão de colapsar: mantém a função original
    function toggleCollapse(id) {
      const el = document.getElementById(id);
      if (!el) return;

      if (el.classList.contains('maximized')) {
        el.classList.remove('maximized');
      }

      const willCollapse = !el.classList.contains('collapsed');
      setSessionWindowState(el, willCollapse ? 'collapsed' : 'normal');
      el.dataset.cardCycle = willCollapse ? '2' : '0';
    }

    // Maximizar
    function toggleMaximize(id) {
      const el = document.getElementById(id);
      if (!el) return;

      if (el.classList.contains('collapsed') || el.classList.contains('peeked')) {
        setSessionWindowState(el, 'normal');
        el.dataset.cardCycle = '0';
      }

      el.classList.toggle('maximized');
      if (!el.classList.contains('maximized') && !el.classList.contains('collapsed') && !el.classList.contains('peeked')) {
        el.dataset.cardCycle = '0';
      }
    }

    // Minimizar (Envia pro Dock)
    function minimizeWindow(id) {
      const el = document.getElementById(id);
      if (!el) return;

      el.classList.add('minimized');

      const dock = document.getElementById('dock');
      
      const bubble = document.createElement('div');
      bubble.className = 'dock-bubble';
      bubble.innerText = '🌐';
      bubble.title = "Restaurar Iframe";

      bubble.onclick = () => {
        el.classList.remove('minimized');
        bubble.remove();
      };

      dock.appendChild(bubble);
    }
  </script>

 

</body>
</html>
