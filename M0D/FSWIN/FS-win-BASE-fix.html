<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBLLUX Monolith - Shell Integrado</title>

<!-- Links originais do BaseFSFm -->
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFS.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFSm.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFSF.css">

<style>
/* ==========================================================================
   MAIN ADDON & WINDOW SYSTEM
   ========================================================================== */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: auto !important;
  background-color: #0f0f13; /* Fundo escuro para destacar o glassmorphism */
  color: #fff;
  font-family: 'Orbitron', system-ui, sans-serif;
}

.main-addon {
  padding: 20px;
  height: 100%;
  box-sizing: border-box;
}

/* -------------------------------------------------------------------------- */
/* SESSION WINDOW / STACK (Card Sanfonado)                                    */
/* -------------------------------------------------------------------------- */
.main-addon .session-window {
  background: rgba(30, 30, 35, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  margin-bottom: 20px; margin-top:78px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); /* Transição fluida (Serena) */
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  height: 600px; /* Altura padrão para ver o iframe */
}

/* Estado Colapsado (Sanfonado) */
.main-addon .session-window.collapsed {
  height: 52px !important;
}

/* Estado Minimizado (Escondido e mandado pro Dock) */
.main-addon .session-window.minimized {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.9) translateY(50px);
  position: absolute;
}

/* Estado Maximizado (Tela cheia) */
.main-addon .session-window.maximized {
  position: fixed;
  inset: 0;
  z-index: 2000;
  border-radius: 0;
  margin: 0;
  height: 100vh !important;
  border: none;
}

/* Cabeçalho da Janela */
.main-addon .win-hdr {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  user-select: none;
}

.main-addon .win-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Controles (Botões) */
.main-addon .win-controls {
  display: flex;
  gap: 8px;
}

.main-addon .win-controls button {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 0;
  cursor: pointer;
  font-size: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.2s;
  display: grid;
  place-items: center;
}

.main-addon .win-controls button:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.1);
}

/* Iframe ocupando o corpo da janela (Artemis) */
.main-addon .win-frame {
  width: 100%;
  flex: 1; /* Ocupa todo o espaço restante */
  border: 0;
  background: transparent;
}

/* -------------------------------------------------------------------------- */
/* DOCK (MINIMIZED WINDOWS)                                                    */
/* -------------------------------------------------------------------------- */
.main-addon #dock {
  position: fixed;
  bottom: 20px;
  left: -33px;

  display: flex;
  gap: 12px;
  padding: 10px 20px;
  border-radius: 40px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 2500;
  transition: 0.3s;
}

.main-addon #dock:empty {
  opacity: 0;
  transform: translate(-50%, 20px);
  pointer-events: none;
}

.main-addon .dock-bubble {


  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 20px;
  transition: 0.3s;
}

.main-addon .dock-bubble:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.2);
  box-shadow: 0 10px 20px rgba(0,242,255,0.2);


}

</style>
</head>
<body class="main-addon">

  <!-- Dock para onde as janelas minimizadas vão -->
  <div id="dock"></div>

  <!-- Container principal das janelas -->
  <div id="stackWrap">

    <!-- Card Sanfonado (Janela do Sistema) encapsulando o Iframe -->
    <div class="session-window" id="session-iframe">
      
      <!-- Header da janela (Clique para colapsar/expandir a sanfona) -->
      <div class="win-hdr" onclick="toggleCollapse('session-iframe')">
        <div class="win-title">🌐 KOB LV BASE (Iframe)</div>
        
        <!-- Botões de Controle -->
        <div class="win-controls" onclick="event.stopPropagation()">
          <button onclick="toggleCollapse('session-iframe')" title="Colapsar">—</button>
          <button onclick="toggleMaximize('session-iframe')" title="Maximizar">⬜</button>
          <button onclick="minimizeWindow('session-iframe')" title="Minimizar para o Dock">✕</button>
        </div>
      </div>

      <!-- O Seu Iframe atuando como o 'corpo' da janela -->
      <iframe
        class="win-frame"
        src="https://kodux78k.github.io/oiDual--Y-/M0D/LV/000-kob-LV-BASE.html"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
        allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
        loading="lazy">
      </iframe>

    </div>

  </div>

  <!-- Scripts do Motor de Janelas (Pulse / Kaos / Vitalis) -->
  <script>
    // Colapsar (Sanfonar)
    function toggleCollapse(id) {
      const el = document.getElementById(id);
      // Remove maximizado se estiver colapsando
      if (el.classList.contains('maximized')) {
        el.classList.remove('maximized');
      }
      el.classList.toggle('collapsed');
    }

    // Maximizar
    function toggleMaximize(id) {
      const el = document.getElementById(id);
      // Remove colapsado se estiver maximizando
      if (el.classList.contains('collapsed')) {
        el.classList.remove('collapsed');
      }
      el.classList.toggle('maximized');
    }

    // Minimizar (Envia pro Dock)
    function minimizeWindow(id) {
      const el = document.getElementById(id);
      el.classList.add('minimized');

      const dock = document.getElementById('dock');
      
      // Cria a bolha no dock
      const bubble = document.createElement('div');
      bubble.className = 'dock-bubble';
      bubble.innerText = '🌐';
      bubble.title = "Restaurar Iframe";

      // Lógica para restaurar
      bubble.onclick = () => {
        el.classList.remove('minimized');
        bubble.remove(); // Tira a bolha do dock quando restaurado
      };

      dock.appendChild(bubble);
    }
  </script>

 

</body>
</html>
