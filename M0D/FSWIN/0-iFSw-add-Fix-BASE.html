<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOBLLUX Monolith - Shell Integrado</title>

  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/FSWIN/css/iFSw.css">

  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);

      --topbar-h: 58px;
      --win-radius: 20px;
      --win-gap: 20px;
      --peek-h: 87px;
      --collapsed-h: 52px;
      --dock-offset-x: -12px;
      --dock-bottom-gap: 80px;
    }

    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, #2a2a35 0%, #0f0f15 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
      -webkit-overflow-scrolling: touch;
    }

    body.ui-safe-vertical {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: 0;
      padding-right: 0;
    }

    body.ui-immersive {
      padding: 0;
    }

    #kxtsk-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .os-topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(8, 10, 14, .72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0;
      z-index: 93000;
      position: sticky;
      top: 0;
    }

    .os-brand {
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1.5px;
    }

    .os-brand small {
      font-size: 10px;
      color: rgba(255,255,255,.65);
      display: block;
      letter-spacing: .9px;
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
    }

    .soft-btn, .launcher-btn {
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      background: rgba(255,255,255,.08);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .launcher-btn {
      background: rgba(0,242,255,.12);
      border: 1px solid rgba(0,242,255,.3);
    }

    .soft-btn:hover, .launcher-btn:hover {
      background: rgba(255,255,255,.16);
      transform: translateY(-1px);
    }

    #stackWrap {
      width: 100%;
      max-width: 800px;
      margin: 40px auto 0;
      padding: 0;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: var(--win-gap);
    }

    .session-window {
      background: rgba(30, 30, 35, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--win-radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      height: 78vh;
      min-height: 387px;
      width: 100%;
      cursor: pointer;
      position: relative;
    }

    .session-window.peeked {
      height: var(--peek-h) !important;
      min-height: var(--peek-h) !important;
    }

    .session-window.peeked .win-frame {
      flex: 0 0 26px;
      height: 26px;
      min-height: 26px;
      max-height: 26px;
      overflow: hidden;
    }

    .session-window.peeked .win-hdr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .session-window.collapsed {
      height: var(--collapsed-h) !important;
      min-height: var(--collapsed-h) !important;
    }

    .session-window.collapsed .win-frame {
      display: none !important;
    }

    .session-window.minimized {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9) translateY(50px);
      position: absolute;
    }

    .session-window.maximized {
      position: fixed;
      top: calc(var(--topbar-h) + var(--safe-top));
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 92000;
      border-radius: 0;
      margin: 0;
      width: 100vw !important;
      height: calc(100dvh - var(--topbar-h) - var(--safe-top) - var(--safe-bottom)) !important;
      max-width: none !important;
      border: none;
      box-sizing: border-box;
    }

    .session-window.maximized.peeked {
      height: var(--peek-h) !important;
      min-height: var(--peek-h) !important;
      bottom: auto;
    }

    .session-window.maximized.collapsed {
      height: var(--collapsed-h) !important;
      min-height: var(--collapsed-h) !important;
      bottom: auto;
    }

    .win-hdr {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      user-select: none;
      box-sizing: border-box;
      min-height: 52px;
      position: relative;
      z-index: 2;
    }

    .win-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .win-controls {
      display: flex;
      gap: 8px;
    }

    .win-controls button {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      font-size: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.2s;
      display: grid;
      place-items: center;
    }

    .win-controls button:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }

    .win-frame {
      width: 100%;
      flex: 1;
      border: 0;
      background: transparent;
    }

    #dock {
      position: fixed;
      left: var(--dock-offset-x);
      bottom: calc(var(--dock-bottom-gap) + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 24px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 2500;
      transition: 0.3s;
    }

    #dock:empty {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }

    .dock-bubble {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 18px;
      transition: 0.3s;
      transform-origin: center left;
      user-select: none;
    }

    .dock-bubble:hover {
      transform: translateX(6px) scale(1.08);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 10px 20px rgba(0,242,255,0.2);
    }
  </style>
</head>

<body class="ui-safe-vertical">
  <div id="kxtsk-shell">
    <div class="os-topbar">
      <div class="os-brand">
        KxTsK
        <small>Unified Patch Loader</small>
      </div>

      <div class="top-actions">
        <button class="launcher-btn" id="openKobBtn">+ Abrir KOB</button>
        <button class="soft-btn" id="openLogsBtn">Logs</button>
      </div>
    </div>

    <div id="dock"></div>

    <div id="stackWrap">
      <div class="session-window" id="session-iframe">
        <div class="win-hdr" onclick="handleHeaderClick(event, 'session-iframe')">
          <div class="win-title">🌐 DUAL H0 // KOB LV BASE</div>

          <div class="win-controls" onclick="event.stopPropagation()">
            <button onclick="toggleCollapse('session-iframe')" title="Colapsar">—</button>
            <button onclick="toggleMaximize('session-iframe')" title="Maximizar">⬜</button>
            <button onclick="minimizeWindow('session-iframe')" title="Minimizar para o Dock">🔘</button>
            <button onclick="closeWindow('session-iframe')" title="Fechar">✕</button>
          </div>
        </div>

        <iframe
          class="win-frame"
          src="https://kodux78k.github.io/oiDual-H0/DH0-10.html"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
          allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/FSWIN/js/modules/iFSw.js"></script>

  <script>
    (() => {
      const stackWrap = document.getElementById('stackWrap');
      const dock = document.getElementById('dock');
      const openKobBtn = document.getElementById('openKobBtn');
      const openLogsBtn = document.getElementById('openLogsBtn');

      let windowCounter = 1;
      const clickTimers = {};

      const DEFAULT_SRC = 'https://kodux78k.github.io/oiDual-H0/DH0-10.html';
      const DEFAULT_ICON = '🌐';
      const DEFAULT_TITLE = 'DUAL H0 // KOB LV BASE';

      function getWin(id) {
        return document.getElementById(id);
      }

      function hasMaximizedWindow() {
        return !!document.querySelector('.session-window.maximized:not(.minimized)');
      }

      function hasPeekedWindow() {
        return !!document.querySelector('.session-window.peeked:not(.minimized)');
      }

      function syncShellMode() {
        const maximized = hasMaximizedWindow();
        const peeked = hasPeekedWindow();

        document.body.classList.toggle('ui-immersive', !maximized && !peeked);
        document.body.classList.toggle('ui-safe-vertical', maximized || peeked);
      }

      function updateMaximizedStacks() {
        const maxWins = Array.from(document.querySelectorAll('.session-window.maximized'));
        let currentTop = 0;

        maxWins.sort((a, b) => (parseInt(a.style.zIndex) || 1) - (parseInt(b.style.zIndex) || 1));

        maxWins.forEach(win => {
          if (win.classList.contains('collapsed') || win.classList.contains('peeked')) {
            win.style.top = `calc(${currentTop}px + var(--topbar-h) + var(--safe-top))`;
            if (win.classList.contains('collapsed')) currentTop += 52;
            else if (win.classList.contains('peeked')) currentTop += 87;
          } else {
            win.style.top = `calc(var(--topbar-h) + var(--safe-top))`;
            currentTop = 0;
          }
        });

        document.querySelectorAll('.session-window:not(.maximized)').forEach(win => {
          win.style.top = '';
        });
      }

      function handleHeaderClick(e, winId) {
        if (e.target.closest('.win-controls')) return;

        if (!clickTimers[winId]) {
          clickTimers[winId] = setTimeout(() => {
            delete clickTimers[winId];
            togglePeek(winId);
          }, 250);
        } else {
          clearTimeout(clickTimers[winId]);
          delete clickTimers[winId];
          toggleMaximize(winId);
        }
      }

      function togglePeek(winId) {
        const win = getWin(winId);
        if (!win) return;

        win.classList.toggle('peeked');
        win.classList.remove('collapsed');
        updateMaximizedStacks();
        syncShellMode();
      }

      function toggleCollapse(winId) {
        const win = getWin(winId);
        if (!win) return;

        win.classList.toggle('collapsed');
        win.classList.remove('peeked');
        updateMaximizedStacks();
        syncShellMode();
      }

      function toggleMaximize(winId) {
        const win = getWin(winId);
        if (!win) return;

        win.classList.toggle('maximized');
        win.classList.remove('minimized');

        if (win.classList.contains('maximized')) {
          document.querySelectorAll('.session-window').forEach(w => w.style.zIndex = '1');
          win.style.zIndex = '92000';
        } else {
          win.style.zIndex = '1';
          win.classList.remove('peeked', 'collapsed');
        }

        updateMaximizedStacks();
        syncShellMode();
      }

      function minimizeWindow(winId) {
        const win = getWin(winId);
        if (!win) return;

        win.classList.add('minimized');
        win.classList.remove('maximized', 'collapsed', 'peeked');
        updateMaximizedStacks();

        const bubble = document.createElement('div');
        bubble.className = 'dock-bubble';
        bubble.textContent = '📄';
        bubble.title = 'Restaurar janela';
        bubble.id = `dock-${winId}`;

        bubble.onclick = () => {
          win.classList.remove('minimized');
          bubble.remove();
          updateMaximizedStacks();
          win.scrollIntoView({ behavior: 'smooth', block: 'center' });
          syncShellMode();
        };

        dock.appendChild(bubble);
        syncShellMode();
      }

      function closeWindow(winId) {
        const win = getWin(winId);
        if (!win) return;

        const bubble = document.getElementById(`dock-${winId}`);
        if (bubble) bubble.remove();

        win.remove();
        updateMaximizedStacks();
        syncShellMode();
      }

      function createSessionWindow({
        title = DEFAULT_TITLE,
        icon = DEFAULT_ICON,
        src = DEFAULT_SRC
      } = {}) {
        const id = `session-${Date.now()}-${windowCounter++}`;

        const section = document.createElement('div');
        section.className = 'session-window';
        section.id = id;

        section.innerHTML = `
          <div class="win-hdr" onclick="handleHeaderClick(event, '${id}')">
            <div class="win-title">${icon} ${title}</div>

            <div class="win-controls" onclick="event.stopPropagation()">
              <button onclick="toggleCollapse('${id}')" title="Colapsar">—</button>
              <button onclick="toggleMaximize('${id}')" title="Maximizar">⬜</button>
              <button onclick="minimizeWindow('${id}')" title="Minimizar para o Dock">🔘</button>
              <button onclick="closeWindow('${id}')" title="Fechar">✕</button>
            </div>
          </div>

          <iframe
            class="win-frame"
            src="${src}"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
            allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
            loading="lazy">
          </iframe>
        `;

        stackWrap.appendChild(section);
        section.scrollIntoView({ behavior: 'smooth', block: 'center' });
        syncShellMode();
        return id;
      }

      function boot() {
        syncShellMode();
        updateMaximizedStacks();
      }

      openKobBtn.addEventListener('click', () => {
        createSessionWindow({
          title: DEFAULT_TITLE,
          icon: DEFAULT_ICON,
          src: DEFAULT_SRC
        });
      });

      openLogsBtn.addEventListener('click', () => {
        console.log('Logs acionado');
      });

      window.handleHeaderClick = handleHeaderClick;
      window.togglePeek = togglePeek;
      window.toggleCollapse = toggleCollapse;
      window.toggleMaximize = toggleMaximize;
      window.minimizeWindow = minimizeWindow;
      window.closeWindow = closeWindow;
      window.createSessionWindow = createSessionWindow;
      window.syncShellMode = syncShellMode;
      window.updateMaximizedStacks = updateMaximizedStacks;

      window.addEventListener('resize', syncShellMode);
      window.addEventListener('orientationchange', syncShellMode);

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
