<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBLLUX Monolith - Shell Integrado</title>

<!-- Links originais do BaseFSFm -->
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFS.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFSm.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/mainFSF.css">
<link rel="stylesheet" href="https://kodux78k.github.io/oi-Dual/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;900&family=Orbitron:wght@400;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   OS & SHELL CORE
   ========================================================================== */
:root {
  --z-base: 0;
  --z-content: 100;
  --z-widget: 500;
  --z-overlay: 1000;
  --z-system: 5000;
  --panel-bg: rgba(15, 15, 20, 0.4);
  --glass-blur: blur(25px);
}

body, html {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden !important;
  background-color: #050508;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
}

/* Background Ambient */
.ambient-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 80%);
}

.main-addon {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 15px;
  box-sizing: border-box;
  position: relative;
}

/* -------------------------------------------------------------------------- */
/* STACK WINDOW SYSTEM                                                        */
/* -------------------------------------------------------------------------- */
#stackWrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  overflow-y: auto;
  padding-right: 5px;
  mask-image: linear-gradient(to bottom, black 95%, transparent);
}

.session-window {
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  height: 600px;
  position: relative;

margin-top:78px;

}

.session-window.collapsed { height: 3px !important; }
.session-window.minimized { opacity: 0; transform: scale(0.9) translateY(40px); pointer-events: none; position: absolute; }
.session-window.maximized { position: fixed; inset: 0; z-index: var(--z-overlay); border-radius: 0; margin: 0; height: 100vh !important; }

.win-hdr {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.win-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--kob-voice-primary, #00f2ff);
  display: flex;
  align-items: center;
  gap: 10px;
}

.win-controls { display: flex; gap: 10px; }
.win-controls button {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 0;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  color: white;
  transition: 0.2s;
  font-size: 12px;
}
.win-controls button:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }

.win-frame { width: 100%; flex: 1; border: 0; background: transparent; }

/* -------------------------------------------------------------------------- */
/* INTEGRATED SYMBOL BAR (The Unified Tool)                                   */
/* -------------------------------------------------------------------------- */
.symbol-bar {
  position: fixed !important;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: var(--z-system);
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 15px;
  border-radius: 40px;
  background: linear-gradient(180deg, rgba(20,20,30,0.8), rgba(10,10,15,0.9));
  backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,242,255,0.1);
  transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
  user-select: none;
}

.symbol-bar.idle { opacity: 0.2; transform: translateY(-50%) scale(0.9); filter: grayscale(0.5); }
.symbol-bar:hover { opacity: 1; transform: translateY(-50%) scale(1); filter: grayscale(0); }

.symbol-button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 18px;
  transition: all 0.2s;
  position: relative;
}

.symbol-button:hover {
  background: var(--kob-voice-primary, #00f2ff);
  color: #000;
  box-shadow: 0 0 15px var(--kob-voice-primary, #00f2ff);
  transform: scale(1.1);
}

.symbol-button.main-toggle { font-weight: 900; background: rgba(0,242,255,0.1); border-color: #00f2ff; }

/* Orb Container no Botão */
.orb-microphone-container { pointer-events: none; }
.tts-orb-mini { width: 30px; height: 30px; }

.hud-info {
  position: absolute;
  right: 70px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  color: var(--kob-voice-primary, #00f2ff);
  background: rgba(0,0,0,0.6);
  padding: 4px 10px;
  border-radius: 4px;
}
.symbol-bar:hover .hud-info { opacity: 1; transform: translateY(-50%) translateX(-10px); }

/* -------------------------------------------------------------------------- */
/* DOCK SYSTEM                                                                */
/* -------------------------------------------------------------------------- */
#dock {
  position: fixed;
  bottom: 45px;
  left: 3px;
 
  display: flex;
  gap: 15px;
  padding: 12px 25px;
  border-radius: 50px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: var(--z-system);
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#dock:empty { opacity: 0; transform: translate(-50%, 40px); }

.dock-bubble {
  width: 50px;
  height: 50px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  display: grid;
  place-items: center;
  font-size: 22px;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.1);
}
.dock-bubble:hover {
  transform: translateY(-10px) scale(1.1);
  background: rgba(0,242,255,0.2);
  border-color: #00f2ff;
}
</style>
</head>
<body class="main-addon" data-voiceArch="kobllux">

  <div class="ambient-bg"></div>

  <!-- Barra de Ferramentas Unificada (Symbol Bar) --
  <div class="symbol-bar" id="symbolBar">
    <div class="hud-info" id="hudStatus">KOBLLUX · READY</div>
    
    <button class="symbol-button main-toggle" id="toggleBtn" title="Menu">≡</button>
    
    <div class="separator" style="height:1px; background:rgba(255,255,255,0.1); margin: 5px 0;"></div>

    <button class="symbol-button" id="btn-arch" title="Trocar Arquétipo (Voz)">
      <div class="orb-microphone-container">
        <div class="tts-orb-mini">
          <div class="orb" id="main-orb" style="width:100%; height:100%;"><div class="orb-core"></div></div>
        </div>
      </div>
    </button>

    <button class="symbol-button" id="btn-play" title="Play/Pause Voice">▶</button>
    
    <div class="separator" style="height:1px; background:rgba(255,255,255,0.1); margin: 5px 0;"></div>

    <button class="symbol-button" data-url="https://kodux78k.github.io/oiDual-idHome/" title="Home">◌</button>
    <button class="symbol-button" data-url="https://kodux78k.github.io/oiDual-Vivivi-1/" title="Vivivi">꩜</button>
    <button class="symbol-button" data-url="https://kodux78k.github.io/info-Doc/index.html" title="Docs">◘</button>
  </div>  -->

  <!-- Área de Janelas -->
  <div id="stackWrap">
    <div class="session-window" id="session-iframe">
      <div class="win-hdr" onclick="toggleCollapse()">
        <div class="win-title">
          <span style="font-size: 16px;">🌐</span> 
          <span>Kernel Shell · <span id="hdr-arch-label">KOBLLUX</span></span>
        </div>
        <div class="win-controls" onclick="event.stopPropagation()">
          <button onclick="toggleCollapse()" title="Minimizar">─</button>
          <button onclick="toggleMaximize()" title="Maximizar">⧉</button>
          <button onclick="minimizeToDock()" title="Fechar p/ Dock" style="color:#ff5f56">✕</button>
        </div>
      </div>
      <iframe class="win-frame" id="mainFrame" src="https://kodux78k.github.io/oiDual--Y-/M0D/LV/000-kob-LV-BASE.html" 
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups" 
              allow="autoplay; clipboard-write; encrypted-media"></iframe>
    </div>
  </div>

  <div id="dock"></div>

  <!-- Scripts de Terceiros -->
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/kob-p6d6.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    /* ==========================================================================
       JANELAS & DOCK (funções unificadas)
       ========================================================================== */
    const win = document.getElementById('session-iframe');
    const dockDiv = document.getElementById('dock');

    function toggleCollapse() {
      if (win.classList.contains('maximized')) win.classList.remove('maximized');
      win.classList.toggle('collapsed');
    }

    function toggleMaximize() {
      if (win.classList.contains('collapsed')) win.classList.remove('collapsed');
      win.classList.toggle('maximized');
    }

    function minimizeToDock() {
      win.classList.add('minimized');
      const bubble = document.createElement('div');
      bubble.className = 'dock-bubble';
      bubble.innerHTML = '🌐';
      bubble.title = "Restaurar Shell";
      bubble.onclick = () => {
        win.classList.remove('minimized');
        bubble.remove();
      };
      dockDiv.appendChild(bubble);
    }

    /* ==========================================================================
       ARQUÉTIPOS E PONTE COM O IFRAME
       ========================================================================== */
    (function () {
      const ARCHS = ['kobllux','kodux','atlas','nova','vitalis','pulse','artemis','serena','kaos','genus','lumine','solus','rhea','aion','uno','dual','trinity','infodose','horus'];
      let archIndex = 0;

      // Função principal que atualiza o tema e envia ao iframe
      function updateGlobalArch(name) {
        document.body.dataset.voiceArch = name;
        
        // Atualiza HUDs locais
        const hud = document.getElementById('hudStatus');
        const hdrLabel = document.getElementById('hdr-arch-label');
        if (hud) hud.textContent = 'KOBLLUX · ' + name.toUpperCase();
        if (hdrLabel) hdrLabel.textContent = name.toUpperCase();

        // Envia mensagem para o iframe
        const iframe = document.getElementById('mainFrame');
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({ type: 'KOB_ARCH_CHANGE', arch: name }, '*');
        }

        // Feedback visual na barra
        const bar = document.getElementById('symbolBar');
        bar.animate([
          { boxShadow: '0 0 0px transparent' },
          { boxShadow: '0 0 30px var(--kob-voice-primary)' },
          { boxShadow: '0 0 0px transparent' }
        ], { duration: 500 });
      }

      // Botão de arquétipo
      const archBtn = document.getElementById('btn-arch');
      if (archBtn) {
        archBtn.addEventListener('click', () => {
          archIndex = (archIndex + 1) % ARCHS.length;
          updateGlobalArch(ARCHS[archIndex]);
        });
      }

      // Botões com data-url
      document.querySelectorAll('.symbol-button[data-url]').forEach(btn => {
        btn.addEventListener('click', () => {
          const url = btn.dataset.url;
          if (url) window.open(url, '_blank');
        });
      });

      // Idle da symbol bar
      const bar = document.getElementById('symbolBar');
      let idleTimer;
      function resetIdle() {
        bar.classList.remove('idle');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => bar.classList.add('idle'), 3000);
      }
      ['mousemove', 'pointerdown', 'keydown', 'touchstart'].forEach(ev => {
        document.addEventListener(ev, resetIdle, { passive: true });
      });
      resetIdle();

      // Inicialização
      window.addEventListener('DOMContentLoaded', () => {
        updateGlobalArch(ARCHS[0]);
      });
    })();

    /* ==========================================================================
       PONTE DE COMUNICAÇÃO (injeção no iframe)
       ========================================================================== */
    (function() {
      const iframe = document.getElementById('mainFrame');
      if (!iframe) return;

      function injectListener() {
        try {
          if (iframe.contentWindow && iframe.contentDocument) {
            if (iframe.contentWindow.__kobArchBridgeInstalled) return;
            iframe.contentWindow.__kobArchBridgeInstalled = true;

            const script = iframe.contentDocument.createElement('script');
            script.textContent = `
              (function() {
                window.addEventListener('message', function(event) {
                  const data = event.data;
                  if (data && data.type === 'KOB_ARCH_CHANGE') {
                    const arch = data.arch;
                    document.body.dataset.voiceArch = arch;
                    const hud = document.getElementById('hudStatus');
                    if (hud) hud.textContent = 'SHELL · ' + arch.toUpperCase();
                    document.body.animate([
                      { boxShadow: 'inset 0 0 0px transparent' },
                      { boxShadow: 'inset 0 0 20px color-mix(in srgb, var(--kob-voice-primary, cyan) 30%, transparent)' },
                      { boxShadow: 'inset 0 0 0px transparent' }
                    ], { duration: 600 });
                  }
                });
              })();
            `;
            iframe.contentDocument.head.appendChild(script);
            console.log('[KOBLLUX] Bridge injetada no iframe');
          }
        } catch(e) {
          console.warn('[KOBLLUX] Erro ao injetar listener:', e);
        }
      }

      iframe.addEventListener('load', injectListener);
      if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
        injectListener();
      }
    })();
  </script>

  <!-- (Opcional) Scripts auxiliares para efeitos visuais e drag da symbol bar -->
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/0x03_expandir_V_D7.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/0x07_selar_B_D3.js"></script>

</body>
