
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dual.Infodose · Ecossistema Integrado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Estilos Externos -->
    <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/oiDoDia2.css">
    <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/KxTsK-unified.css">
    <link rel="stylesheet" href="https://kodux78k.github.io/oi-Dual/css/main.css">
    <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/diHome/css/mainK.css"> 
    <link rel="stylesheet" href="https://kodux78k.github.io/oiDual-VwR-di/css/main.css">
 
    <style>
        /* --- AETHER: FÍSICA CINEMATOGRÁFICA --- */
        body { 
            overflow-x: hidden; 
            overflow-y: auto; 
            padding: 0; 
            background: #050816;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .card-origem {
            transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            overflow: hidden;
            will-change: transform, padding, height;
            background: rgba(10, 12, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            margin: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .hero-top { cursor: pointer; padding: 15px 15px 5px 15px; }

        /* Elementos que colapsam */
        .hero-slider, .input-row, .btn-row, .time-sub {
            transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            transform-origin: top;
            opacity: 1;
            max-height: 500px;
        }

        /* Estado Colapsado */
        .card-origem.is-collapsed {
            padding-bottom: 5px;
            background: rgba(10, 12, 25, 0.6);
        }

        .card-origem.is-collapsed .hero-slider,
        .card-origem.is-collapsed .input-row,
        .card-origem.is-collapsed .btn-row,
        .card-origem.is-collapsed .time-sub {
            opacity: 0;
            max-height: 0;
            margin: 0 !important;
            padding: 0 !important;
            pointer-events: none;
            transform: translateY(-10px) scale(0.98);
        }

        /* Atmosfera Visual */
        .orb-bg {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.25;
            pointer-events: none;
        }
        #orb-top { top: -25%; right: -15%; background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%); }
        #orb-bottom { bottom: -25%; left: -15%; background: radial-gradient(circle, #667eea 0%, #764ba2 100%); }
        
        #particles-js {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .frase {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.4;
            margin: 12px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            display: none; /* Mantido oculto conforme seu código anterior */
        }

        /* Organização do Hero Meta (Tempo e Mood) */
        .hero-meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px 15px 15px;
        }

        .time-chip {
            background: rgba(79, 172, 254, 0.15);
            color: #4facfe;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid rgba(79, 172, 254, 0.2);
        }

        .label-mood {
            font-size: 0.75rem;
            opacity: 0.6;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .app-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="orb-top" class="orb-bg"></div>
    <div id="orb-bottom" class="orb-bg"></div>
    <div id="particles-js"></div>

    <div class="frase"><strong>Sempre</strong> único<strong>. Sempre</strong> seu<strong>.</strong></div>

    <div class="app">
        <!-- HEADER -->
        <header class="app-header">
            <div class="brand-pill">Dual · Infodose</div>
            <div class="header-actions">
                <button class="console-toggle" id="consoleToggle">◎</button>
                <button class="mode-pill" type="button">
                    <span class="dot"></span>
                    <span>Modo 3·6·9</span>
                </button>
            </div>
        </header>

        <!-- CARD ORIGEM UNIFICADO -->
        <section class="card-origem" id="cardOrigem">
            
            <!-- HERO INTEGRADO -->
            <div class="hero-card hero-embedded" id="heroTouchArea">
                <div class="hero-top">
                    <div class="hero-main">
                        <div class="hero-greeting" id="heroGreeting">Sincronizando...</div>
                        <div class="hero-subtitle" id="heroSubtitle">Preparando tua experiência...</div>
                    </div>
                </div>

                <div class="hero-meta-row">
                    <span class="time-chip" id="timeNow">--:--</span>
                    <span id="moodLabel" class="label-mood">Equilíbrio Ativo</span>
                </div>

                <!-- Slider simplificado e organizado -->
                <div class="hero-slider" style="padding: 0 15px 15px 15px;">
                    <input id="timeRange" type="range" min="6" max="23" value="9" class="hero-range" style="width:100%">
                </div>
            </div>

            <!-- ÁREA DE TEMPO E INTERAÇÃO -->
            <div id="timeSub" class="time-sub"></div>

            <div class="input-row">
                <label for="intentInput">Intenção / vibração</label>
                <input id="intentInput" placeholder="O que pretendes ativar?" />
            </div>

            <div class="btn-row">
                <button class="btn" id="btnDocs">
                    <span class="emoji">📂</span>
                    <span>Docs & Apps</span>
                </button>
                <button class="btn" id="btnAddApp">
                    <span class="emoji">＋</span>
                    <span>Novo app</span>
                </button>
            </div>
        </section>

        <!-- LISTA DE APPS -->
        <section class="apps-wrapper">
            <div class="apps-header-row">
                <div class="apps-title">Meus apps / stacks</div>
                <div class="apps-count" id="appsCount">0 apps</div>
            </div>
            <div id="appsList"></div>
        </section>

        <section class="iframe-deck" id="iframeDeck"></section>
        <div id="logBox" style="display:none"></div>
    </div>

    <!-- PAINEL CONSOLE -->
    <div class="console-panel" id="consolePanel" aria-hidden="true">
        <div class="console-panel-inner">
            <div class="console-header">
                <div class="console-title">Dual Console · Sistema</div>
                <button class="console-close" id="consoleClose">✕</button>
            </div>
            <div class="console-body">
                <div class="console-section">
                    <h3>Gestão de Visualização</h3>
                    <div class="console-actions-row">
                        <button class="console-btn" id="toggleOrigemBtn">Colapsar Card</button>
                        <button class="console-btn" id="openGroupBtn">Abrir Grupo</button>
                    </div>
                </div>
                <div class="console-section">
                    <h3>Memória Local</h3>
                    <pre class="console-ls-dump" id="consoleLsDump"></pre>
                </div>
            </div>
        </div>
    </div>

    <!-- MÓDULOS DE SISTEMA -->
    <script src="https://kodux78k.github.io/oiDual--Y-/js/inline-1.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/bgPanel.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-2.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-3.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-4.js"></script> 
    <script src="https://kodux78k.github.io/oiDual--Y-/js/di_core.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/js/di_mood.js"></script>
    <script src="https://kodux78k.github.io/oiDual-VwR-di/js/modules/inline-di.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('cardOrigem');
            const heroArea = document.getElementById('heroTouchArea');
            const greeting = document.getElementById('heroGreeting');
            const subtitle = document.getElementById('heroSubtitle');
            const timeNowEl = document.getElementById('timeNow');
            const toggleOrigemBtn = document.getElementById('toggleOrigemBtn');
            
            // Unificação de Mensagens e Identidade
            const syncIdentity = () => {
                const userName = localStorage.getItem('di_userName') || 'Dual';
                const infodoseName = localStorage.getItem('di_infodoseName') || 'Infodose';
                
                const now = new Date();
                const hour = now.getHours();
                const min = now.getMinutes().toString().padStart(2, '0');
                
                let welcome = "Boa noite";
                if (hour >= 5 && hour < 12) welcome = "Bom dia";
                else if (hour >= 12 && hour < 18) welcome = "Boa tarde";
                
                if (greeting) greeting.textContent = `${welcome}, ${userName}`;
                if (subtitle) subtitle.textContent = `Tua ${infodoseName} está pronta.`;
                if (timeNowEl) timeNowEl.textContent = `${hour}:${min}`;
            };
            
            syncIdentity();
            setInterval(syncIdentity, 30000); // Atualiza a cada 30s

            // Lógica de Colapso
            const KEY_COLLAPSE = 'di_card_collapsed';
            const toggleCollapse = (forceState = null) => {
                const isNow = forceState !== null ? forceState : !card.classList.contains('is-collapsed');
                card.classList.toggle('is-collapsed', isNow);
                localStorage.setItem(KEY_COLLAPSE, isNow ? '1' : '0');
                if (navigator.vibrate) navigator.vibrate(8);
            };

            const savedState = localStorage.getItem(KEY_COLLAPSE);
            if (savedState === '1') toggleCollapse(true);
            else if (savedState === null) {
                const h = new Date().getHours();
                if (h >= 21 || h < 6) toggleCollapse(true);
            }

            heroArea.addEventListener('click', () => toggleCollapse());
            toggleOrigemBtn?.addEventListener('click', () => toggleCollapse());

            // Console
            const consoleToggle = document.getElementById('consoleToggle');
            const consolePanel = document.getElementById('consolePanel');
            const consoleClose = document.getElementById('consoleClose');

            consoleToggle?.addEventListener('click', () => {
                consolePanel.setAttribute('aria-hidden', 'false');
                consolePanel.classList.add('active');
            });
            consoleClose?.addEventListener('click', () => {
                consolePanel.setAttribute('aria-hidden', 'true');
                consolePanel.classList.remove('active');
            });
        });
    </script>
</body>
</html>
