<!DOCTYPE html>
<html lang="pt-br" data-theme="nebula">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baú Lite • LocalStorage Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css">
  <style>
    :root{
      --grad-a:#ff52e5;
      --grad-b:#00c5e5;
      --bg: linear-gradient(135deg,var(--grad-a),var(--grad-b));
      --fg:#fff;
      --mut:#cfd8dc;
      --glass:rgba(0,0,0,.45);
      --r:22px;
      --shadow:0 12px 34px rgba(0,0,0,.4);
      --bd:1px solid rgba(255,255,255,.15);
      --ok:#39FFB6;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Montserrat',system-ui,sans-serif;
      background:var(--bg);
      color:var(--fg);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:22px;
    }

    .app{
      width:100%;
      max-width:860px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .card{
      background:var(--glass);
      backdrop-filter:blur(18px);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:14px 16px;
      position:relative;
      overflow:visible;
      min-height:120px;
    }

    .open-ls-btn{
      position:absolute;
      top:12px;
      right:-12px;
      width:44px;
      height:44px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      z-index:10;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      color:#fff;
      cursor:pointer;
      transition:.2s;
    }

    .open-ls-btn:hover{
      background:rgba(255,255,255,.22);
      transform:translateY(-1px);
    }

    .small{
      font-size:.8rem;
      color:var(--mut);
      margin-top:8px;
    }

    .loader{
      width:22px;
      height:22px;
      border:3px solid rgba(255,255,255,.2);
      border-top:3px solid #fff;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:8px auto;
    }

    @keyframes spin{
      100%{transform:rotate(360deg)}
    }

    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(8px);
      padding:14px;
    }

    .modal.open{display:flex}

    .panel{
      width:min(980px,95vw);
      max-height:86vh;
      overflow:auto;
      background:rgba(15,17,32,.92);
      border:var(--bd);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px;
    }

    .hdr{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      border-bottom:var(--bd);
      padding-bottom:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .hdr .ttl{
      font-weight:900;
      letter-spacing:.06em;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .meta{
      color:var(--mut);
      font-size:12px;
      margin:6px 0 10px;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .item{
      background:rgba(255,255,255,.05);
      border:var(--bd);
      border-radius:14px;
      padding:10px;
      display:grid;
      gap:8px;
    }

    .item .head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }

    .key{
      font-weight:800;
      max-width:56vw;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .type{
      font-size:11px;
      color:var(--mut);
    }

    .val{
      font:12px/1.4 ui-monospace,monospace;
      background:#0b0f1a;
      border:var(--bd);
      border-radius:10px;
      padding:8px;
      max-height:140px;
      overflow:auto;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .switch{
      inline-size:46px;
      block-size:28px;
      border-radius:999px;
      border:var(--bd);
      background:rgba(255,255,255,.15);
      position:relative;
      cursor:pointer;
      flex:0 0 auto;
    }

    .switch::after{
      content:"";
      position:absolute;
      inset:4px auto 4px 4px;
      width:20px;
      border-radius:999px;
      background:#fff;
      transition:all .18s;
    }

    .switch.on{
      background:rgba(25,226,123,.28);
    }

    .switch.on::after{
      left:22px;
    }

    details.presets{
      border:var(--bd);
      border-radius:14px;
      padding:8px;
      background:rgba(255,255,255,.04);
      margin-bottom:10px;
    }

    .presets-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:10px;
      margin-top:8px;
    }

    .preset{
      border:var(--bd);
      border-radius:12px;
      background:rgba(255,255,255,.04);
      padding:10px;
      display:grid;
      gap:6px;
    }

    .img-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:10px;
    }

    .img-card{
      border:var(--bd);
      background:rgba(255,255,255,.04);
      border-radius:10px;
      padding:8px;
    }

    .img-card img{
      width:100%;
      height:auto;
      display:block;
      border-radius:8px;
    }

    button{
      background:rgba(255,255,255,.1);
      border:0;
      color:#fff;
      padding:8px 12px;
      border-radius:12px;
      font-size:.9rem;
      cursor:pointer;
      transition:.2s;
      display:inline-flex;
      gap:6px;
      align-items:center;
    }

    button:hover{background:rgba(255,255,255,.2)}
    .btn-ghost{background:transparent;border:1px dashed rgba(255,255,255,.25)}

    textarea,input,select{
      width:100%;
      margin:6px 0;
      padding:10px;
      border-radius:10px;
      border:none;
      font-family:inherit;
      outline:none;
    }

    @media (max-width:560px){
      .key{max-width:46vw}
      .open-ls-btn{
        top:10px;
        right:-10px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <a id="dl" style="display:none"></a>

  <div id="lsModal" class="modal" aria-hidden="true">
    <div class="panel">
      <div class="hdr">
        <div class="ttl">LocalStorage • Baú Lite</div>
        <div class="actions">
          <button id="lsRescan"><i class="lucide-refresh-cw"></i> Re-scan</button>
          <button id="lsExport"><i class="lucide-upload"></i> Exportar</button>
          <label for="lsImportFile" style="display:inline-block">
            <button type="button"><i class="lucide-download"></i> Importar</button>
          </label>
          <input id="lsImportFile" type="file" accept="application/json" hidden>
          <button id="lsClearDisabled" class="btn-ghost"><i class="lucide-eraser"></i> Limpar desativados</button>
          <button id="lsClose"><i class="lucide-x"></i> Fechar</button>
        </div>
      </div>

      <details class="presets" open>
        <summary><strong>Presets (ON/OFF global)</strong></summary>
        <div class="presets-grid" id="presetsGrid"></div>
      </details>

      <div class="meta"><span id="lsCount">—</span> • <span id="lsSize">—</span></div>
      <div class="list" id="lsList"></div>

      <details class="presets" style="margin-top:10px" open>
        <summary><strong>Pré-visualização de Imagens</strong></summary>
        <div class="img-grid" id="imgGrid"></div>
      </details>
    </div>
  </div>

  <script>
    'use strict';

    const LS = {
      HTML:'lastHTML',
      COLL:'nebula_collapsed',
      USER_SYMBOL:'userSymbol',
      SKS:'openrouter_keys',
      SK_ACTIVE:'openrouter_active'
    };

    const $ = (s, r=document) => r.querySelector(s);

    function saveFile(name, str){
      const blob = new Blob([str], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = $('#dl');
      a.href = url;
      a.download = name;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 800);
    }

    function prettyBytes(n){
      if(!Number.isFinite(n) || n <= 0) return '0 B';
      const u = ['B','KB','MB','GB'];
      let i = 0;
      while(n >= 1024 && i < u.length - 1){
        n /= 1024;
        i++;
      }
      return n.toFixed(2) + ' ' + u[i];
    }

    function isJson(v){
      try{ JSON.parse(v); return true; }catch{ return false; }
    }

    function inferType(v){
      if(v == null || v === '') return 'empty';
      if(isJson(v)){
        const p = JSON.parse(v);
        if(Array.isArray(p)) return 'json[array]';
        if(p && typeof p === 'object') return 'json[object]';
        return 'json[' + (typeof p) + ']';
      }
      if(/^data:image\//i.test(v) || /\.(png|jpe?g|gif|webp|svg)(\?|$)/i.test(v)) return 'image';
      if(/^(true|false|1|0)$/i.test(v)) return 'boolean-like';
      if(/^https?:\/\//i.test(v)) return 'url';
      if(/^data:/i.test(v)) return 'data-url';
      return 'string';
    }

    function renderApp(){
      const app = $('#app');
      app.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <button id="btnOpenLS" class="open-ls-btn" title="Abrir painel" aria-label="Abrir painel">
          <i class="lucide-box"></i>
        </button>
        <div class="small">Baú Lite pronto.</div>
      `;

      app.appendChild(card);

      $('#btnOpenLS').onclick = openLS;
    }

    /* Seeds */
    (function seeds(){
      if(localStorage.getItem('__baulite_seeded__')) return;

      localStorage.setItem('infodose:userName','KODUX');
      localStorage.setItem('infodose:assistantName','Dual Glow');
      localStorage.setItem('uno:theme','nebula');
      localStorage.setItem('gallery:img1','https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=640');
      localStorage.setItem('feature:ritual:enabled','true');
      localStorage.setItem(LS.HTML,'<div class="demo"><h1>Hello Nebula</h1><p>Baú Lite</p></div>');

      const demoSKs = ['sk-demo-AAA111','sk-demo-BBB222','sk-demo-CCC333'];
      localStorage.setItem(LS.SKS, JSON.stringify(demoSKs));
      localStorage.setItem(LS.SK_ACTIVE, demoSKs[0]);

      const demoSig = `<svg xmlns='http://www.w3.org/2000/svg' width='26' height='26' viewBox='0 0 26 26'><circle cx='13' cy='13' r='12' fill='none' stroke='#ff52e5' stroke-width='2'/><path d='M4 16 L13 4 L22 16 L13 22 Z' fill='none' stroke='#00c5e5' stroke-width='2'/></svg>`;
      localStorage.setItem(LS.USER_SYMBOL, demoSig);

      localStorage.setItem('__baulite_seeded__','1');
    })();

    /* Modal / LS */
    const DISABLED_KEY = 'infodose:presets.disabled';
    const PRESETS = [
      { key:'infodose:userName', label:'Usuário' },
      { key:'infodose:assistantName', label:'Assistente' },
      { key:'dual.keys.openrouter', label:'Chave OpenRouter (legacy)' },
      { key:'dual.openrouter.model', label:'Modelo OpenRouter' },
      { key:'uno:theme', label:'Tema' },
      { key:'uno:bg', label:'Fundo Custom' },
      { key:'infodose:cssCustom', label:'CSS Custom' },
      { key:'infodose:voices', label:'Vozes Arquetípicas' }
    ];

    function disabledSet(){
      try{ return new Set(JSON.parse(localStorage.getItem(DISABLED_KEY) || '[]')); }
      catch{ return new Set(); }
    }

    function saveDisabled(set){
      localStorage.setItem(DISABLED_KEY, JSON.stringify(Array.from(set)));
    }

    function toggleDisabled(k){
      const s = disabledSet();
      s.has(k) ? s.delete(k) : s.add(k);
      saveDisabled(s);
      renderPresets();
      renderLS();
    }

    function lsEntries(){
      const out = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        const v = localStorage.getItem(k) || '';
        out.push({ key:k, val:v });
      }
      return out.sort((a,b) => a.key.localeCompare(b.key));
    }

    function lsSizeBytes(){
      let sum = 0;
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        const v = localStorage.getItem(k) || '';
        sum += k.length + v.length;
      }
      return sum;
    }

    function renderPresets(){
      const grid = $('#presetsGrid');
      if(!grid) return;
      grid.innerHTML = '';

      const dis = disabledSet();

      PRESETS.forEach(p => {
        const val = localStorage.getItem(p.key);
        const on = !dis.has(p.key);

        const wrap = document.createElement('div');
        wrap.className = 'preset';

        const head = document.createElement('div');
        head.className = 'row';
        head.style.padding = '0';
        head.style.border = '0';

        const name = document.createElement('div');
        name.innerHTML = `<strong>${p.label}</strong><div class="type">${p.key}</div>`;

        const sw = document.createElement('div');
        sw.className = 'switch' + (on ? ' on' : '');
        sw.title = on ? 'Desativar (não apaga)' : 'Ativar';
        sw.onclick = () => toggleDisabled(p.key);

        head.append(name, sw);

        const meta = document.createElement('div');
        meta.className = 'val';
        meta.textContent = val
          ? (inferType(val).startsWith('json') ? JSON.stringify(JSON.parse(val), null, 2) : val)
          : '—';

        wrap.append(head, meta);
        grid.append(wrap);
      });
    }

    function addImagePreview(key, src){
      const g = $('#imgGrid');
      const card = document.createElement('div');
      card.className = 'img-card';

      const cap = document.createElement('div');
      cap.className = 'small';
      cap.textContent = key;

      const im = new Image();
      im.src = src;
      im.loading = 'lazy';

      card.append(cap, im);
      g.append(card);
    }

    function renderLS(){
      const list = $('#lsList');
      if(!list) return;

      list.innerHTML = '';
      $('#imgGrid').innerHTML = '';

      const entries = lsEntries();
      $('#lsCount').textContent = entries.length + ' chave(s)';
      $('#lsSize').textContent = prettyBytes(lsSizeBytes());

      const dis = disabledSet();

      entries.forEach(({key, val}) => {
        if(key === DISABLED_KEY) return;

        const it = document.createElement('div');
        it.className = 'item';

        const head = document.createElement('div');
        head.className = 'head';

        const left = document.createElement('div');
        left.innerHTML = `
          <div class="key">${key}${dis.has(key) ? ' <span class="type">(desativado)</span>' : ''}</div>
          <div class="type">${inferType(val)} • ${prettyBytes((val || '').length)}</div>
        `;

        const ctr = document.createElement('div');
        ctr.style.display = 'flex';
        ctr.style.gap = '8px';
        ctr.style.flexWrap = 'wrap';
        ctr.style.alignItems = 'center';

        const sw = document.createElement('div');
        sw.className = 'switch' + (!dis.has(key) ? ' on' : '');
        sw.title = !dis.has(key) ? 'Desativar' : 'Ativar';
        sw.onclick = () => toggleDisabled(key);

        const bEdit = document.createElement('button');
        bEdit.innerHTML = '<i class="lucide-edit"></i> Editar';
        bEdit.onclick = () => {
          const next = prompt(`Editar valor de\n${key}`, val ?? '');
          if(next == null) return;
          localStorage.setItem(key, String(next));
          renderAll();
        };

        const bDel = document.createElement('button');
        bDel.innerHTML = '<i class="lucide-trash-2"></i> Apagar';
        bDel.onclick = () => {
          if(confirm('Apagar ' + key + '?')){
            localStorage.removeItem(key);
            renderAll();
          }
        };

        ctr.append(sw, bEdit, bDel);

        if(inferType(val) === 'image'){
          const bImg = document.createElement('button');
          bImg.innerHTML = '<i class="lucide-image"></i> Ver imagem';
          bImg.onclick = () => addImagePreview(key, val);
          ctr.append(bImg);
        }

        head.append(left, ctr);

        const v = document.createElement('div');
        v.className = 'val';
        v.textContent = inferType(val).startsWith('json')
          ? JSON.stringify(JSON.parse(val), null, 2)
          : (val ?? '—');

        it.append(head, v);
        list.append(it);
      });
    }

    function exportLS(){
      const dump = {};
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(k === DISABLED_KEY) continue;
        dump[k] = localStorage.getItem(k);
      }
      saveFile('localstorage_export.json', JSON.stringify(dump, null, 2));
    }

    function importLS(file){
      const r = new FileReader();
      r.onload = () => {
        try{
          const data = JSON.parse(r.result || '{}');
          Object.entries(data).forEach(([k,v]) => localStorage.setItem(k, String(v)));
          alert('Importado com sucesso.');
          renderAll();
        }catch(e){
          alert('JSON inválido.');
        }
      };
      r.readAsText(file);
    }

    function clearDisabled(){
      localStorage.setItem(DISABLED_KEY, '[]');
      renderAll();
    }

    function openLS(){
      const m = $('#lsModal');
      m.classList.add('open');
      m.setAttribute('aria-hidden', 'false');
      renderAll();
    }

    function closeLS(){
      const m = $('#lsModal');
      m.classList.remove('open');
      m.setAttribute('aria-hidden', 'true');
    }

    function renderAll(){
      renderPresets();
      renderLS();
    }

    document.addEventListener('click', (ev) => {
      if(ev.target.id === 'lsClose') closeLS();
    });

    window.addEventListener('click', e => {
      if(e.target.id === 'lsModal') closeLS();
    });

    window.addEventListener('storage', renderAll);

    document.addEventListener('DOMContentLoaded', () => {
      $('#lsRescan')?.addEventListener('click', renderAll);
      $('#lsExport')?.addEventListener('click', exportLS);
      $('#lsImportFile')?.addEventListener('change', ev => {
        const f = ev.target.files?.[0];
        if(f) importLS(f);
        ev.target.value = '';
      });
      $('#lsClearDisabled')?.addEventListener('click', clearDisabled);

      renderApp();
    });
  </script>
</body>
</html>
