<script>

(function () {
  'use strict';

  if (window.__bauLiteLoaded) return;
  window.__bauLiteLoaded = true;

  const BTN_SIZE = 54;
  const TOP = 12;
  const RIGHT = -12;
  const Z = 2147483647;

  const LS = {
    HTML: 'lastHTML',
    USER_SYMBOL: 'userSymbol',
    SKS: 'openrouter_keys',
    SK_ACTIVE: 'openrouter_active'
  };

  const DISABLED_KEY = 'infodose:presets.disabled';

  const PRESETS = [
    { key: 'infodose:userName', label: 'Usuário' },
    { key: 'infodose:assistantName', label: 'Assistente' },
    { key: 'dual.keys.openrouter', label: 'Chave OpenRouter (legacy)' },
    { key: 'dual.openrouter.model', label: 'Modelo OpenRouter' },
    { key: 'uno:theme', label: 'Tema' },
    { key: 'uno:bg', label: 'Fundo Custom' },
    { key: 'infodose:cssCustom', label: 'CSS Custom' },
    { key: 'infodose:voices', label: 'Vozes Arquetípicas' }
  ];

  const $ = (s, r = document) => r.querySelector(s);

  function saveFile(name, str) {
    const blob = new Blob([str], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 800);
  }

  function prettyBytes(n) {
    if (!Number.isFinite(n) || n <= 0) return '0 B';
    const u = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    while (n >= 1024 && i < u.length - 1) {
      n /= 1024;
      i++;
    }
    return n.toFixed(2) + ' ' + u[i];
  }

  function isJson(v) {
    try { JSON.parse(v); return true; } catch { return false; }
  }

  function inferType(v) {
    if (v == null || v === '') return 'empty';
    if (isJson(v)) {
      const p = JSON.parse(v);
      if (Array.isArray(p)) return 'json[array]';
      if (p && typeof p === 'object') return 'json[object]';
      return 'json[' + (typeof p) + ']';
    }
    if (/^data:image\//i.test(v) || /\.(png|jpe?g|gif|webp|svg)(\?|$)/i.test(v)) return 'image';
    if (/^(true|false|1|0)$/i.test(v)) return 'boolean-like';
    if (/^https?:\/\//i.test(v)) return 'url';
    if (/^data:/i.test(v)) return 'data-url';
    return 'string';
  }

  function disabledSet() {
    try { return new Set(JSON.parse(localStorage.getItem(DISABLED_KEY) || '[]')); }
    catch { return new Set(); }
  }

  function saveDisabled(set) {
    localStorage.setItem(DISABLED_KEY, JSON.stringify(Array.from(set)));
  }

  function getSKs() {
    try { return JSON.parse(localStorage.getItem(LS.SKS) || '[]'); }
    catch { return []; }
  }

  function setSKs(arr) {
    localStorage.setItem(LS.SKS, JSON.stringify(arr));
  }

  function getActiveSK() {
    return localStorage.getItem(LS.SK_ACTIVE) || '';
  }

  function setActiveSK(v) {
    localStorage.setItem(LS.SK_ACTIVE, v || '');
  }

  function maskKey(k) {
    return (k && k.length > 10) ? k.slice(0, 6) + '...' + k.slice(-4) : (k || '');
  }

  function lsEntries() {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || '';
      out.push({ key: k, val: v });
    }
    return out.sort((a, b) => a.key.localeCompare(b.key));
  }

  function lsSizeBytes() {
    let sum = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || '';
      sum += k.length + v.length;
    }
    return sum;
  }

  function toggleDisabled(k) {
    const s = disabledSet();
    s.has(k) ? s.delete(k) : s.add(k);
    saveDisabled(s);
    renderAll();
    window.dispatchEvent(new CustomEvent('ls:disabled-changed', { detail: { key: k, disabled: s.has(k) } }));
  }

  function addImagePreview(key, src) {
    const g = $('#bau-img-grid');
    if (!g) return;
    const card = document.createElement('div');
    card.className = 'bau-img-card';
    const cap = document.createElement('div');
    cap.className = 'bau-small';
    cap.textContent = key;
    const im = new Image();
    im.src = src;
    im.loading = 'lazy';
    card.append(cap, im);
    g.append(card);
  }

  function digitalRoot(n) {
    const s = String(n).replace(/[^0-9]/g, '');
    if (!s) return 0;
    let sum = [...s].reduce((a, b) => a + Number(b), 0);
    while (sum > 9) sum = [...String(sum)].reduce((a, b) => a + Number(b), 0);
    return sum;
  }

  function polygon(cx, cy, r, sides, rot = 0) {
    const pts = [];
    for (let i = 0; i < sides; i++) {
      const a = (Math.PI * 2 * i / sides) + rot;
      pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }
    return pts.map(p => p.join(',')).join(' ');
  }

  function buildSymbolSVG(lat, lon) {
    const lr = digitalRoot(lat), rr = digitalRoot(lon);
    const s1 = Math.max(3, lr + 2), s2 = Math.max(3, rr + 2);
    const rot = ((lr * rr) % 360) * Math.PI / 180;
    return `<svg xmlns="http://www.w3.org/2000/svg" width="260" height="180" viewBox="0 0 260 180">
      <defs>
        <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#ff52e5"/>
          <stop offset="100%" stop-color="#00c5e5"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" rx="14" fill="rgba(255,255,255,0.05)"/>
      <g transform="translate(130,95)">
        <polygon points="${polygon(0,0,52,s1,0)}" fill="none" stroke="url(#g1)" stroke-width="2"/>
        <polygon points="${polygon(0,0,36,s2,rot)}" fill="none" stroke="#39FFB6" stroke-width="1.6"/>
        <circle cx="0" cy="0" r="4" fill="#fff"/>
      </g>
      <text x="12" y="20" fill="#fff" font-size="12" font-family="monospace">LAT ${Number(lat).toFixed(5)} → Σ ${lr}</text>
      <text x="12" y="36" fill="#fff" font-size="12" font-family="monospace">LON ${Number(lon).toFixed(5)} → Σ ${rr}</text>
    </svg>`;
  }

  function sigilFromCoords(lat, lon) {
    const seed = (String(lat) + String(lon)).replace(/[^0-9]/g, '');
    const W = 260, H = 180;
    let x = 20, y = 30;
    let d = `M${x} ${y}`;
    [...seed].forEach(ch => {
      x += ((ch % 3) - 1) * 20;
      y += ((ch % 3) - 1) * 16;
      x = Math.max(10, Math.min(W - 10, x));
      y = Math.max(10, Math.min(H - 10, y));
      d += ` L${x} ${y}`;
    });
    return `<svg xmlns="http://www.w3.org/2000/svg" width="260" height="180" viewBox="0 0 260 180">
      <rect width="100%" height="100%" rx="14" fill="rgba(255,255,255,0.05)"/>

    </svg>`;
  }

  function symParse() {
    const el = $('#bau-sym-in');
    if (!el) return null;
    const v = el.value.split(',');
    if (v.length < 2) return null;
    const lat = parseFloat(v[0]), lon = parseFloat(v[1]);
    if (isNaN(lat) || isNaN(lon)) return null;
    return { lat, lon };
  }

  function renderPresets() {
    const grid = $('#bau-presets-grid');
    if (!grid) return;
    grid.innerHTML = '';

    const dis = disabledSet();

    PRESETS.forEach(p => {
      const val = localStorage.getItem(p.key);
      const on = !dis.has(p.key);

      const wrap = document.createElement('div');
      wrap.className = 'bau-preset';

      const head = document.createElement('div');
      head.className = 'bau-preset-head';

      const name = document.createElement('div');
      name.innerHTML = `<div class="bau-preset-title">${p.label}</div><div class="bau-type">${p.key}</div>`;

      const sw = document.createElement('div');
      sw.className = 'bau-switch' + (on ? ' on' : '');
      sw.title = on ? 'Desativar (não apaga)' : 'Ativar';
      sw.onclick = () => toggleDisabled(p.key);

      head.append(name, sw);

      const meta = document.createElement('div');
      meta.className = 'bau-val';
      meta.textContent = val
        ? (inferType(val).startsWith('json') ? JSON.stringify(JSON.parse(val), null, 2) : val)
        : '—';

      wrap.append(head, meta);
      grid.append(wrap);
    });
  }

  function renderLS() {
    const list = $('#bau-list');
    if (!list) return;

    list.innerHTML = '';
    $('#bau-img-grid').innerHTML = '';

    const entries = lsEntries();
    $('#bau-count').textContent = entries.length + ' chave(s)';
    $('#bau-size').textContent = prettyBytes(lsSizeBytes());

    const dis = disabledSet();

    entries.forEach(({ key, val }) => {
      if (key === DISABLED_KEY) return;

      const it = document.createElement('div');
      it.className = 'bau-item';

      const head = document.createElement('div');
      head.className = 'bau-item-head';

      const left = document.createElement('div');
      left.innerHTML = `
        <div class="bau-key">${key}${dis.has(key) ? ' <span class="bau-flag">(desativado)</span>' : ''}</div>
        <div class="bau-type">${inferType(val)} • ${prettyBytes((val || '').length)}</div>
      `;

      const ctr = document.createElement('div');
      ctr.className = 'bau-actions-inline';

      const sw = document.createElement('div');
      sw.className = 'bau-switch' + (!dis.has(key) ? ' on' : '');
      sw.title = !dis.has(key) ? 'Desativar' : 'Ativar';
      sw.onclick = () => toggleDisabled(key);

      const bEdit = document.createElement('button');
      bEdit.className = 'bau-btn';
      bEdit.innerHTML = '<i class="lucide-edit"></i> Editar';
      bEdit.onclick = () => {
        const next = prompt(`Editar valor de\n${key}`, val ?? '');
        if (next == null) return;
        localStorage.setItem(key, String(next));
        renderAll();
      };

      const bDel = document.createElement('button');
      bDel.className = 'bau-btn danger';
      bDel.innerHTML = '<i class="lucide-trash-2"></i> Apagar';
      bDel.onclick = () => {
        if (confirm('Apagar ' + key + '?')) {
          localStorage.removeItem(key);
          renderAll();
        }
      };

      ctr.append(sw, bEdit, bDel);

      if (inferType(val) === 'image') {
        const bImg = document.createElement('button');
        bImg.className = 'bau-btn';
        bImg.innerHTML = '<i class="lucide-image"></i> Ver imagem';
        bImg.onclick = () => addImagePreview(key, val);
        ctr.appendChild(bImg);
      }

      head.append(left, ctr);

      const v = document.createElement('div');
      v.className = 'bau-val bau-val-box';
      v.textContent = inferType(val).startsWith('json')
        ? JSON.stringify(JSON.parse(val), null, 2)
        : (val ?? '—');

      it.append(head, v);
      list.appendChild(it);
    });
  }

  function renderAll() {
    renderPresets();
    renderLS();
    renderHTMLPanel();
    renderHeadBadge();
  }

  function openLS() {
    const m = $('#bau-modal');
    m.classList.add('open');
    m.setAttribute('aria-hidden', 'false');
    renderAll();
  }

  function closeLS() {
    const m = $('#bau-modal');
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
  }

  function renderModal() {
    if ($('#bau-modal')) return;
    renderModalOnce();
  }

  function exportLS() {
    const dump = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k === DISABLED_KEY) continue;
      dump[k] = localStorage.getItem(k);
    }
    saveFile('localstorage_export.json', JSON.stringify(dump, null, 2));
  }

  function importLS(file) {
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result || '{}');
        Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, String(v)));
        alert('Importado com sucesso.');
        renderAll();
      } catch {
        alert('JSON inválido.');
      }
    };
    r.readAsText(file);
  }

  function clearDisabled() {
    localStorage.setItem(DISABLED_KEY, '[]');
    renderAll();
  }

  function saveHTML() {
    const editor = $('#bau-html-editor');
    if (editor) localStorage.setItem(LS.HTML, editor.value);
  }

  function analyzeHTML() {
    const editor = $('#bau-html-editor');
    const info = $('#bau-html-info');
    if (!editor || !info) return;
    const html = editor.value;
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const tags = doc.getElementsByTagName('*').length;
    const divs = doc.querySelectorAll('div').length;
    const size = (new Blob([html]).size / 1024).toFixed(2) + ' KB';
    info.textContent = `Tags: ${tags}, <div>: ${divs}, ${size}`;
  }

  function uiAddSK() {
    const v = prompt('Cole sua SK (OpenRouter):');
    if (!v) return;
    const arr = getSKs();
    arr.push(v);
    setSKs(arr);
    if (!getActiveSK()) setActiveSK(v);
    renderAll();
  }

  function exportSKs() {
    saveFile('keys.json', JSON.stringify(getSKs(), null, 2));
  }

  function importSKs() {
    const s = prompt('Cole JSON de chaves (array de strings)');
    if (!s) return;
    try {
      const arr = JSON.parse(s);
      if (Array.isArray(arr)) {
        setSKs(arr);
        if (arr.length && !getActiveSK()) setActiveSK(arr[0]);
        renderAll();
      } else {
        alert('JSON inválido');
      }
    } catch {
      alert('JSON inválido');
    }
  }

  function copyActiveSK() {
    const k = getActiveSK();
    if (!k) return alert('Sem SK ativa');
    navigator.clipboard?.writeText(k);
  }

  function removeActiveSK() {
    const k = getActiveSK();
    if (!k) return alert('Sem SK ativa');
    const arr = getSKs().filter(x => x !== k);
    setSKs(arr);
    setActiveSK(arr[0] || '');
    renderAll();
  }

  function symGen() {
    const c = symParse();
    if (!c) return alert('Digite lat, lon');
    const svg = buildSymbolSVG(c.lat, c.lon);
    $('#bau-sym-out').innerHTML = svg;
    $('#bau-sym-out').dataset.svg = svg;
  }

  function sigilGen() {
    const c = symParse();
    if (!c) return alert('Sem coordenadas');
    const svg = sigilFromCoords(c.lat, c.lon);
    $('#bau-sym-out').innerHTML = svg;
    $('#bau-sym-out').dataset.svg = svg;
  }

  function symSetAvatar() {
    const svg = $('#bau-sym-out').dataset.svg || $('#bau-sym-out').innerHTML;
    if (!svg) return;
    localStorage.setItem(LS.USER_SYMBOL, svg);
    renderAll();
  }

  function symExportSVG() {
    const svg = $('#bau-sym-out').dataset.svg;
    if (!svg) return alert('Gere um símbolo/sigilo');
    saveFile('symbol.svg', svg);
  }

  function locate() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => {
          $('#bau-coords').textContent = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
        },
        () => {
          $('#bau-coords').textContent = '(negado)';
        }
      );
    }
  }

  function requestCompass() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(s => {
        if (s === 'granted') bindCompass();
      }).catch(() => {});
    } else {
      bindCompass();
    }
  }

  let compassBound = false;
  function bindCompass() {
    if (compassBound) return;
    compassBound = true;
    window.addEventListener('deviceorientation', e => {
      const heading = e.alpha ? Math.round(e.alpha) : null;
      $('#bau-heading').textContent = heading != null ? (heading + '°') : '—';
    });
  }

  function bootButton() {
    if ($('#bau-fab')) return;
    const btn = document.createElement('button');
    btn.id = 'bau-fab';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Abrir baú');
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"></path>
        <path d="M3 7l9 4 9-4"></path>
      </svg>
    `;
    btn.addEventListener('click', openLS);
    document.body.appendChild(btn);
  }

  function bindEvents() {
    $('#bau-fab')?.addEventListener('click', openLS);
    $('#bau-close')?.addEventListener('click', closeLS);
    $('#bau-refresh')?.addEventListener('click', renderAll);

    $('#bau-modal')?.addEventListener('click', e => {
      if (e.target.id === 'bau-modal') closeLS();
    });

    $('#bau-rescan')?.addEventListener('click', renderAll);
    $('#bau-export')?.addEventListener('click', exportLS);
    $('#bau-clear-disabled')?.addEventListener('click', clearDisabled);

    $('#bau-import-file')?.addEventListener('change', ev => {
      const f = ev.target.files?.[0];
      if (f) importLS(f);
      ev.target.value = '';
    });

    $('#bau-html-save')?.addEventListener('click', saveHTML);
    $('#bau-html-analyze')?.addEventListener('click', analyzeHTML);

    $('#bau-locate')?.addEventListener('click', locate);
    $('#bau-compass')?.addEventListener('click', requestCompass);

    $('#bau-sym-gen')?.addEventListener('click', symGen);
    $('#bau-sigil-gen')?.addEventListener('click', sigilGen);
    $('#bau-sym-avatar')?.addEventListener('click', symSetAvatar);
    $('#bau-sym-export')?.addEventListener('click', symExportSVG);

    $('#bau-sk-new')?.addEventListener('click', uiAddSK);
    $('#bau-sk-export')?.addEventListener('click', exportSKs);
    $('#bau-sk-import')?.addEventListener('click', importSKs);
    $('#bau-sk-copy')?.addEventListener('click', copyActiveSK);
    $('#bau-sk-remove')?.addEventListener('click', removeActiveSK);

    window.addEventListener('storage', renderAll);
    window.addEventListener('ls:disabled-changed', renderAll);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLS();
    });
  }

  function boot() {
    mountStyles();
    renderModalOnce();
    bootButton();
    renderAll();
    bindEvents();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
})();

</script></body></html>
