<script>
(function(){
  'use strict';

  /* ================= CONFIG ================= */
  const BTN_SIZE = 52;
  const OFFSET_TOP = 12;
  const OFFSET_RIGHT = -12;

  /* ================= STYLE INJECTION ================= */
  const style = document.createElement('style');
  style.innerHTML = `
  .bau-fab{
    position:fixed;
    top:${OFFSET_TOP}px;
    right:${OFFSET_RIGHT}px;
    width:${BTN_SIZE}px;
    height:${BTN_SIZE}px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff52e5,#00c5e5);
    border:none;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:999999;
    transition:.25s;
  }
  .bau-fab:hover{ transform:scale(1.08); }
  .bau-fab i{ color:#fff; font-size:22px; }

  .bau-modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(8px);
    z-index:999998;
  }
  .bau-modal.open{ display:flex; }

  .bau-panel{
    width:min(900px,95vw);
    max-height:85vh;
    overflow:auto;
    background:#0f1120;
    color:#fff;
    border-radius:18px;
    padding:16px;
    font-family:system-ui;
  }

  .bau-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

  .bau-list{
    display:grid;
    gap:10px;
  }

  .bau-item{
    background:rgba(255,255,255,.05);
    padding:10px;
    border-radius:10px;
    font-size:12px;
  }

  .bau-key{ font-weight:bold; margin-bottom:4px; }
  .bau-val{ opacity:.8; word-break:break-word; }
  `;
  document.head.appendChild(style);

  /* ================= ICON (lucide fallback) ================= */
  const icon = `<svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
    <path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/>
    <path d="M3 7l9 4 9-4"/>
  </svg>`;

  /* ================= BUTTON ================= */
  const btn = document.createElement('button');
  btn.className = 'bau-fab';
  btn.innerHTML = icon;
  document.body.appendChild(btn);

  /* ================= MODAL ================= */
  const modal = document.createElement('div');
  modal.className = 'bau-modal';
  modal.innerHTML = `
    <div class="bau-panel">
      <div class="bau-head">
        <strong>Baú • LocalStorage</strong>
        <button id="bau-close">✕</button>
      </div>
      <div id="bau-list" class="bau-list"></div>
    </div>
  `;
  document.body.appendChild(modal);

  const list = modal.querySelector('#bau-list');

  /* ================= RENDER ================= */
  function render(){
    list.innerHTML = '';
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      const v = localStorage.getItem(k);

      const item = document.createElement('div');
      item.className = 'bau-item';
      item.innerHTML = `
        <div class="bau-key">${k}</div>
        <div class="bau-val">${(v||'').slice(0,500)}</div>
      `;
      list.appendChild(item);
    }
  }

  /* ================= EVENTS ================= */
  btn.onclick = () => {
    modal.classList.add('open');
    render();
  };

  modal.onclick = (e)=>{
    if(e.target === modal) modal.classList.remove('open');
  };

  modal.querySelector('#bau-close').onclick = ()=>{
    modal.classList.remove('open');
  };

})();
</script>
