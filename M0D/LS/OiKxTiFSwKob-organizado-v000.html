<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Card // Core Controller</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05070a">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- CSS base / unified -->
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/oiDoDia2.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/KxTsK-unified.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kxt-solar.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/iFSw/css/iFSw-fix.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/V-core/css/main-root.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-dox-nanai-v4.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/css/kob-aura.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/css/0x01_pulsar_V_D5-2.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oi-Dual/css/main.css">

  <!-- estilos ajustados (apenas um bloco consolidado) -->
  <style>
    :root {
      --z-base: 0;
      --z-content: 100;
      --z-widget: 500;
      --z-overlay: 1000;
      --z-system: 5000;
    }

    .symbol-bar.floating {
      z-index: 99999 !important;
      position: fixed;
    }

    /* dock tts (dinâmico) */
    .kob-tts-dock {
      transition: transform .35s ease, opacity .65s ease;
      box-shadow: none !important;
    }

    .kob-tts-dock.idle {
      opacity: .18;
      transform: scale(.92);
    }

    .kob-tts-dock:hover {
      opacity: 1;
      transform: scale(1);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body class="field-closed mode-night ui-safe-vertical">

  <!-- ========== ROOT CONTAINER ========== -->
  <div id="root">

    <!-- === SHELL PRINCIPAL (topbar + iframe) === -->
    <div id="kxtsk-shell">
      <div class="os-topbar">
        <div class="os-brand">
          KxTsK
          <small>Unified Patch Loader</small>
        </div>
        <div class="top-actions">
          <button class="launcher-btn" id="openKobBtn">+ Abrir KOB</button>
          <button class="soft-btn" id="openLogsBtn">Logs</button>
        </div>
      </div>

      <!-- dock container (usado pelo KOB dinâmico) -->
      <div id="dock"></div>

      <div id="stackWrap">
        <div class="session-window" id="session-iframe">
          <div class="win-hdr" onclick="handleHeaderClick(event, 'session-iframe')">
            <div class="win-title">🌐 DUAL H0 // KOB LV BASE</div>
            <div class="win-controls" onclick="event.stopPropagation()">
              <button onclick="toggleCollapse('session-iframe')" title="Colapsar">—</button>
              <button onclick="toggleMaximize('session-iframe')" title="Maximizar">⬜</button>
              <button onclick="minimizeWindow('session-iframe')" title="Minimizar para o Dock">🔘</button>
              <button onclick="closeWindow('session-iframe')" title="Fechar">✕</button>
            </div>
          </div>

          <iframe
            class="win-frame"
            style="z-index:1;"
            src="https://kodux78k.github.io/oiDual-H0/DH0-10.html"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
            allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
      </div>
    </div>

    <!-- === AMBIENTE VISUAL (fundos, luzes) === -->
    <div class="ambient-light">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div id="snap-zone"></div>
    <div class="toaster-wrap" id="toasterWrap"></div>

    <!-- === SVG SYMBOLS (ícones reutilizáveis) === -->
    <svg style="display:none">
      <filter id="distort">
        <feTurbulence baseFrequency="0.01" numOctaves="3" result="turb"></feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb" scale="30"></feDisplacementMap>
      </filter>

      <symbol id="icon-orb" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="7"></circle>
        <circle cx="12" cy="12" r="8"></circle>
      </symbol>
      <symbol id="icon-cards" viewBox="0 0 24 24">
        <rect x="2" y="2" width="16" height="16" rx="2"></rect>
        <path d="M22 6v14a2 2 0 0 1-2 2H6"></path>
      </symbol>
      <symbol id="icon-gem" viewBox="0 0 24 24">
        <path d="M6 3h12l4 6-10 12L2 9z"></path>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </symbol>
      <symbol id="icon-voice" viewBox="0 0 24 24">
        <rect x="9" y="1" width="6" height="12" rx="3"></rect>
        <path d="M5 10a7 7 0 0 0 14 0"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </symbol>
    </svg>

    <!-- === SKY / BACKGROUND LAYER === -->
    <div class="sky-layer"><div class="sun-background"></div></div>
    <div id="bg-fake-custom"></div>
    <div id="nv-toast"></div>
    <div id="modeIndicator">CARREGANDO nO.Sºlar...</div>

    <!-- === LOGO & HEADER ELEMENTS === -->
    

    <div class="header-orb" id="orbToggle" title="Acessar Cockpit do Usuário" onclick="toggleDrawer('drawerProfile')">
      <svg><use href="#icon-orb"></use></svg>
    </div>
    <div id="usernameDisplay"></div>

    <!-- === DRAWER (painel cockpit) === -->
    <div id="drawerOverlay" class="drawer-overlay" onclick="toggleDrawer()"></div>

    <div id="drawerProfile" class="drawer" aria-hidden="true">
      <div class="drawer-content">
        <div class="drawer-header">
          <h3>
            <svg style="width:20px;height:20px;margin-right:8px;stroke:var(--secondary)"><use href="#icon-orb"></use></svg>
            Cockpit Solar
          </h3>
          <button class="btn-icon" style="width:38px;height:38px;border-radius:12px;" onclick="toggleDrawer('drawerProfile')">✕</button>
        </div>

        <div class="drawer-body">
          <div class="cockpit-item" style="text-align:center;margin-bottom:15px;">
            <div class="cockpit-label">Ciclo Solar</div>
            <div id="statusSolarMode" style="font-size:1.2rem;font-weight:bold;margin:5px 0;">AUTO</div>
            <div class="control-row">
              <button class="btn-block" id="btnCycleSolar">Manual ☀️/🌙</button>
              <button class="btn-block" id="btnAutoSolar">Auto 🕒</button>
            </div>
          </div>

          <div class="cockpit-grid">
            <div class="cockpit-item">
              <div class="cockpit-label">Identificação</div>
              <input type="text" id="inputUserId" class="cockpit-input" placeholder="Viajante">
            </div>
            <div class="cockpit-item">
              <div class="cockpit-label">Modelo IA</div>
              <input type="text" id="inputModel" class="cockpit-input" placeholder="google/gemini-2.0-flash-exp">
            </div>
            <div class="cockpit-item">
              <div class="cockpit-label">Background</div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span id="bgStatusText" style="font-size:0.8rem;color:var(--text-muted)">Nenhum</span>
                <label class="btn-icon" style="width:30px;height:30px;border-radius:5px;">
                  <input type="file" id="bgUploadInput" accept="image/*" style="display:none">
                  <svg><use href="#icon-cards"></use></svg>
                </label>
              </div>
            </div>
            <div id="bgThumbPanel" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- === KOBLLUX EDITOR PANEL (overlay de edição) === -->
    <div id="kblx-back">
      <div id="kblx-panel">
        <div class="p-chip">⌘ KOBLLUX HUD · EDITOR DE ROTA</div>
        <div class="p-title" id="kblx-ttl">Botão</div>
        <label class="p-lbl" for="kblx-inp">Novo valor para data-url</label>
        <input id="kblx-inp" type="text" placeholder="arquivo.html  ou  https://..." spellcheck="false" autocomplete="off">
        <div class="kblx-row">
          <button class="kblx-btn kblx-save" id="kblx-btn-save">⊙ Salvar no botão</button>
          <button class="kblx-btn kblx-close" id="kblx-btn-close">✕ Fechar</button>
        </div>
      </div>
    </div>

    <!-- === ÁREA PRINCIPAL (iframe + barra de símbolos) === -->
    <div class="wrap">
      <div class="content">
        <iframe id="frame" src="about:blank"></iframe>
        <div id="kob-tts-outline"></div>
      </div>

      <div class="symbol-bar floating" id="symbolBar">
        <div class="toggle-wrap">
          <button class="symbol-button main-toggle" id="toggleBtn" title="Menu / Iniciar">≡</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" id="btn-prev" title="Voltar Bloco">◀</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" id="btn-play" title="Play/Pause">▶</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" id="btn-next" title="Próximo Bloco">▶▶</button>
        </div>

        <button class="symbol-button" id="btn-arch" title="Trocar Arquétipo de Voz">
          <div class="orb-microphone-container">
            <div class="tts-orb-mini">
              <div class="orb" id="main-orb">
                <div class="orb-core"></div>
              </div>
            </div>
          </div>
        </button>

        <div class="symbol-wrap">
          <button class="symbol-button" data-id="phi" data-url="about:blank">Φ</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" data-id="viv" data-url="https://kodux78k.github.io/oiDual-Vivivi-1/">꩜</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" data-id="home" data-url="https://kodux78k.github.io/oiDual-idHome/">◌</button>
        </div>
        <div class="symbol-wrap">
          <button class="symbol-button" data-id="doc" data-url="https://kodux78k.github.io/info-Doc/index.html">◘</button>
        </div>

        <div class="hud-info" id="hudStatus">KOBLLUX · ORB NEXUS</div>
      </div>
    </div>

    <!-- === OVERLAY DE ARQUÉTIPOS (áudio/tts) === -->
    <div id="arch-overlay"></div>

    <audio id="transitionSound" src="https://kodux78k.github.io/oiDual-oiio/suave_portal.mp3" preload="auto"></audio>

    <!-- ========== SCRIPTS (mantidos intactos) ========== -->
    <script src="https://kodux78k.github.io/oi-Dual/js/modules/inline-000.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/js/inline-1.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/bgPanel.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-2.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-3.js"></script>
    <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/inline-4.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/js/di_core.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/js/di_mood.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/M0D/FSWIN/js/modules/iFSw-fix.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/kob-mstr-0.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/js/kob-LVb.js"></script>
    <script type="module" src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/kobdh0-main.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/0x03_expandir_V_D7.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/0x07_selar_B_D3.js"></script>
    <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kob-DH0/js/kob-sw.js"></script>

    <script>
      (function() {
        const dock = document.querySelector('.kob-tts-dock');
        if (dock) {
          let idleTimer = null;
          function resetIdle() {
            dock.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => dock.classList.add('idle'), 1870);
          }
          ['pointerdown', 'pointermove', 'touchstart', 'mousemove'].forEach(ev => {
            document.addEventListener(ev, resetIdle, { passive: true });
          });
          resetIdle();
        }
      })();
    </script>

  </div><!-- #root -->
</body>
</html>
