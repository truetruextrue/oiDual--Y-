<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>HUB DUAL — Compact Family</title>
<meta name="theme-color" content="#0b0b14">

<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/UnoFamily.css"> 
</head>
<body>
  <header class="mast">
    <button class="icon-btn" id="btnBack" title="Voltar" aria-label="Voltar">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="title-block">
      <h1>HUB DUAL</h1>
      <small>UNO · DUAL · TRINITY</small>
    </div>
    <div class="brain-wrap">
      <button class="icon-btn" id="btnBrainDrop" aria-haspopup="true" aria-expanded="false" title="Brain">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 1 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </button>
      <div class="brain-menu" id="brainMenu">
        <h3>Brain</h3>
        <ul class="b-list">
          <li class="b-item" onclick="openBrain(true)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-8"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
            <span>Dual Infodose</span><small>abrir painel</small>
          </li>
          <li class="b-item" onclick="setPerf('Low')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3z"></path><path d="M3 10h12v4H3z"></path><path d="M3 17h6v4H3z"></path></svg>
            <span>Performance</span><small id="perfSmall">Low</small>
          </li>
          <li class="b-item" onclick="ttsTest()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>
            <span>TTS Voices</span><small>teste</small>
          </li>
          <li class="b-item" onclick="clearLogs()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M3 12h18"></path><path d="M3 18h18"></path></svg>
            <span>Logs</span><small>limpar</small>
          </li>
          <li class="b-item" onclick="exportBackup()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path></svg>
            <span>Download</span><small>backup</small>
          </li>
        </ul>
      </div>
    </div>
  </header>

  <main>
    <!-- HOME -->
    <section id="view-home" class="view">
      <div class="cards">
        <button class="card" data-open="apps">
          <div class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="14" width="7" height="7" rx="2"></rect><rect x="3" y="14" width="7" height="7" rx="2"></rect></svg></div>
          <div><div style="font-weight:800">Apps</div><div class="muted">Catálogo (apps.json) + Locais</div></div>
        </button>
        <button class="card" data-open="stack">
          <div class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4.5-9 4.5L3 6.5 12 2z"></path><path d="M3 13l9 4.5 9-4.5"></path></svg></div>
          <div><div style="font-weight:800">Stack</div><div class="muted">Sessões abertas</div></div>
        </button>
        <button class="card" data-open="trinity">
          <div class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>
          <div><div style="font-weight:800">Trinity</div><div class="muted">Viewer integrado</div></div>
        </button>
        <button class="card" data-open="brain">
          <div class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
          <div><div style="font-weight:800">Dual Brain</div><div class="muted">Nome, SK, TTS</div></div>
        </button>
      </div>
    </section>

    <!-- APPS -->
    <section id="view-apps" class="view">
      <div class="card" style="width:100%">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;width:100%">
          <input id="appSearch" class="input" placeholder="Buscar…" style="max-width:320px">
          <select id="appSort" class="input" style="max-width:120px"><option value="az">A–Z</option><option value="za">Z–A</option></select>
          <label class="pill"><input id="openInside" type="checkbox" checked=""> abrir dentro</label>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;width:100%">
          <input id="fileLocal" type="file" accept=".html,.htm,.txt" multiple="" class="input">
          <button id="btnImportLocals" class="btn">+ Locais</button>
          <button id="btnExportLocals" class="btn">Exportar</button>
          <button id="btnClearLocals" class="btn">Limpar</button>
          <div id="appsCount" class="pill" style="margin-left:auto">—</div>
        </div>
      </div>
      <div id="appsWrap" class="apps-list" style="display:grid;grid-template-columns:1fr;gap:8px"></div>
    </section>

    <!-- STACK -->
    <section id="view-stack" class="view">
      <div id="stackWrap" class="grid" style="display:flex;flex-direction:column;gap:10px"></div>
    </section>

    <!-- TRINITY -->
    <section id="view-trinity" class="view">
      <div class="card" style="display:flex;gap:8px;align-items:center">
        <div class="ico">◎</div>
        <div style="flex:1">
          <div style="font-weight:800">Dual-App acoplado</div>
          <div class="muted">Abrir qualquer URL dentro do viewer</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:6px">
            <input id="trinityUrl" class="input" placeholder="./index.html ou /app.html">
            <button id="btnOpenTrinity" class="btn prime">Abrir</button>
          </div>
        </div>
      </div>
      <div class="card" id="trinityLog" style="font:12px/1.25 ui-monospace,Menlo,Consolas">—</div>
    </section>
  </main>

  <div id="dock" class="dock"></div>

  <nav class="tabbar">
    <div class="inner">
      <button class="tab active" data-nav="home" title="Home"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"></path><path d="M9 21V9h6v12"></path></svg><span style="display:none">Home</span></button>
      <button class="tab" data-nav="apps" title="Apps"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="3" width="7" height="7" rx="2"></rect><rect x="14" y="14" width="7" height="7" rx="2"></rect><rect x="3" y="14" width="7" height="7" rx="2"></rect></svg><span style="display:none">Apps</span></button>
      <button class="tab" data-nav="stack" title="Stack"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4.5-9 4.5L3 6.5 12 2z"></path><path d="M3 13l9 4.5 9-4.5"></path></svg><span style="display:none">Stack</span></button>
      <button class="tab" data-nav="trinity" title="Trinity"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg><span style="display:none">Trinity</span></button>
    </div>
  </nav>

  <!-- Brain drawer mantém as funções, mas usará o mesmo JS do seu Hub unificado se colar abaixo. Para esta demo, colocamos utilidades mínimas -->
  <aside id="brain" aria-label="Dual Brain" style="position:fixed;right:0;top:0;bottom:0;width:360px;max-width:92vw;transform:translateX(105%);transition:transform .26s ease;background:var(--surface-strong);border-left:var(--bd);box-shadow:-10px 0 28px rgba(16,19,26,.18);padding:10px;z-index:120;border-top-left-radius:12px;border-bottom-left-radius:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:800;letter-spacing:.04em">AETHER • BRAIN</div><button id="brainClose" class="btn">Fechar</button></div>
    <div class="card" style="display:block"><div class="pill">Usuário</div><div style="display:flex;gap:6px;align-items:center;margin-top:4px"><input id="userName" class="input" placeholder="Seu nome"><button id="saveName" class="btn prime">Salvar</button></div></div>
    <div class="card" style="display:block"><div class="pill">OpenRouter SK</div><div style="display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap"><input id="userSK" class="input" placeholder="sk-or-v1-…"><button id="saveSK" class="btn prime">Salvar</button></div></div>
    <div class="card" style="display:block"><div class="pill">Logs</div><pre id="log" style="min-height:100px;font:12px/1.25 ui-monospace,Menlo,Consolas"></pre><button id="btnExportBrain" class="btn">Exportar Brain</button></div>
  </aside>


<script  src="https://kodux78k.github.io/oiDual--Y-/js/UnoFamily.js"></script>


</body></html>
