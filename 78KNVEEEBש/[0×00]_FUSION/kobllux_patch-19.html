/* ═══════════════════════════════════════════════════
   DRAGON BALL Z · SOUNDCLOUD PLAYER · FUSION OS
   Opcode: 0x0A TRANSMITIR · 432Hz · V.E.E.B. B·D8
   ═══════════════════════════════════════════════════ */

/* ── DBZ Player Container ── */
#dbz-player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 150;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Segoe UI', system-ui, sans-serif;
}
#dbz-player.dbz-active {
  transform: translateY(0);
}

/* ── Collapsed (minimized) bar ── */
#dbz-player.dbz-collapsed .dbz-body {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  overflow: hidden;
}

/* ── Main Wrapper ── */
.dbz-wrapper {
  background: linear-gradient(180deg, #1a0a2e 0%, #0d0d1a 40%, #0a0a12 100%);
  border-top: 2px solid;
  border-image: linear-gradient(90deg, #ff6b00, #ffcc00, #ff6b00, #ff3300, #ff6b00) 1;
  box-shadow:
    0 -4px 30px rgba(255, 107, 0, 0.15),
    0 -1px 60px rgba(255, 204, 0, 0.05),
    inset 0 1px 0 rgba(255, 204, 0, 0.08);
  position: relative;
  overflow: hidden;
}

/* Ki aura background effect */
.dbz-wrapper::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 200px 100px at 15% 50%, rgba(255, 165, 0, 0.06) 0%, transparent 70%),
    radial-gradient(ellipse 200px 100px at 85% 50%, rgba(255, 165, 0, 0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Top Bar (always visible) ── */
.dbz-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  position: relative;
  z-index: 10;
  min-height: 48px;
  cursor: pointer;
  user-select: none;
}

.dbz-topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

/* Dragon Ball icon */
.dbz-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffcc00 0%, #ff8c00 50%, #ff6600 100%);
  box-shadow:
    0 0 12px rgba(255, 165, 0, 0.5),
    0 0 24px rgba(255, 165, 0, 0.2),
    inset 0 -3px 6px rgba(180, 80, 0, 0.4),
    inset 0 2px 4px rgba(255, 255, 200, 0.3);
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: dbzIconFloat 3s ease-in-out infinite;
}

/* Star inside the ball */
.dbz-icon::after {
  content: '★';
  font-size: 14px;
  color: rgba(180, 50, 0, 0.7);
  text-shadow: 0 0 4px rgba(255, 200, 0, 0.5);
}

/* Playing animation on the ball */
#dbz-player.dbz-playing .dbz-icon {
  animation: dbzIconPulse 1.2s ease-in-out infinite;
  box-shadow:
    0 0 16px rgba(255, 165, 0, 0.7),
    0 0 40px rgba(255, 165, 0, 0.3),
    inset 0 -3px 6px rgba(180, 80, 0, 0.4),
    inset 0 2px 4px rgba(255, 255, 200, 0.3);
}

.dbz-track-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.dbz-track-title {
  font-size: 12px;
  font-weight: 700;
  color: #ffcc00;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 8px rgba(255, 204, 0, 0.3);
}

.dbz-track-artist {
  font-size: 9px;
  color: rgba(255, 165, 0, 0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── Audio Visualizer Bars ── */
.dbz-visualizer {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 24px;
  padding: 0 6px;
  flex-shrink: 0;
}

.dbz-vis-bar {
  width: 3px;
  border-radius: 2px;
  background: linear-gradient(to top, #ff6b00, #ffcc00);
  transition: height 0.1s ease;
  min-height: 3px;
}

#dbz-player.dbz-playing .dbz-vis-bar {
  animation: dbzVisBar var(--bar-speed, 0.4s) ease-in-out infinite alternate;
}

/* ── Control Buttons ── */
.dbz-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.dbz-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid rgba(255, 165, 0, 0.2);
  background: rgba(255, 107, 0, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(255, 204, 0, 0.7);
  font-size: 14px;
  padding: 0;
}

.dbz-btn:hover {
  background: rgba(255, 107, 0, 0.2);
  border-color: rgba(255, 165, 0, 0.5);
  box-shadow: 0 0 12px rgba(255, 165, 0, 0.2);
  color: #ffcc00;
}

.dbz-btn-close:hover {
  background: rgba(255, 50, 50, 0.2);
  border-color: rgba(255, 50, 50, 0.5);
  color: #ff5555;
}

.dbz-btn svg,
.dbz-btn i {
  width: 14px;
  height: 14px;
}

/* ── Body (collapsible content) ── */
.dbz-body {
  max-height: 280px;
  opacity: 1;
  transition: max-height 0.45s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s, padding 0.3s;
  position: relative;
  z-index: 5;
  padding: 0 16px 12px;
  overflow: hidden;
}

/* ── SoundCloud iframe styling ── */
.dbz-sc-frame {
  width: 100%;
  height: 166px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255, 165, 0, 0.1);
  background: rgba(0, 0, 0, 0.4);
  margin-bottom: 10px;
}

.dbz-sc-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ── Ki Energy Wave (decorative) ── */
.dbz-energy-wave {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255, 165, 0, 0.4),
    rgba(255, 204, 0, 0.8),
    rgba(255, 165, 0, 0.4),
    transparent
  );
  z-index: 20;
  opacity: 0;
  transition: opacity 0.3s;
}

#dbz-player.dbz-playing .dbz-energy-wave {
  opacity: 1;
  animation: dbzEnergyFlow 2s linear infinite;
}

/* ── Power Level Display ── */
.dbz-power-level {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0;
}

.dbz-power-label {
  font-size: 8px;
  color: rgba(255, 165, 0, 0.35);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
}

.dbz-power-bar-bg {
  flex: 1;
  height: 3px;
  background: rgba(255, 165, 0, 0.08);
  border-radius: 2px;
  overflow: hidden;
}

.dbz-power-bar-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #ff6b00, #ffcc00, #ff6b00);
  border-radius: 2px;
  transition: width 0.5s ease;
  box-shadow: 0 0 6px rgba(255, 165, 0, 0.4);
}

#dbz-player.dbz-playing .dbz-power-bar-fill {
  animation: dbzPowerPulse 3s ease-in-out infinite;
}

.dbz-power-value {
  font-size: 9px;
  font-weight: 800;
  color: #ffcc00;
  font-family: 'SF Mono', monospace;
  text-shadow: 0 0 6px rgba(255, 204, 0, 0.3);
  min-width: 48px;
  text-align: right;
}

/* ── Scouter scan lines ── */
.dbz-scouter-lines {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
  opacity: 0.03;
}

.dbz-scouter-lines::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255, 204, 0, 0.4) 2px,
    rgba(255, 204, 0, 0.4) 3px
  );
}

/* ════ ANIMATIONS ════ */

@keyframes dbzIconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

@keyframes dbzIconPulse {
  0%, 100% {
    transform: scale(1);
    box-shadow:
      0 0 16px rgba(255, 165, 0, 0.7),
      0 0 40px rgba(255, 165, 0, 0.3),
      inset 0 -3px 6px rgba(180, 80, 0, 0.4),
      inset 0 2px 4px rgba(255, 255, 200, 0.3);
  }
  50% {
    transform: scale(1.1);
    box-shadow:
      0 0 24px rgba(255, 165, 0, 0.9),
      0 0 60px rgba(255, 165, 0, 0.4),
      inset 0 -3px 6px rgba(180, 80, 0, 0.4),
      inset 0 2px 4px rgba(255, 255, 200, 0.3);
  }
}

@keyframes dbzVisBar {
  0% { height: 3px; }
  100% { height: var(--bar-max, 20px); }
}

@keyframes dbzEnergyFlow {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes dbzPowerPulse {
  0%, 100% { width: 60%; }
  25% { width: 85%; }
  50% { width: 72%; }
  75% { width: 95%; }
}

/* ── Super Saiyan Aura (playing state) ── */
#dbz-player.dbz-playing .dbz-wrapper::after {
  content: '';
  position: absolute;
  top: -2px;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255, 204, 0, 0.6) 20%,
    rgba(255, 165, 0, 0.9) 50%,
    rgba(255, 204, 0, 0.6) 80%,
    transparent 100%
  );
  animation: dbzAuraShimmer 2s ease-in-out infinite;
  z-index: 20;
}

@keyframes dbzAuraShimmer {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .dbz-topbar { padding: 6px 10px; }
  .dbz-track-title { font-size: 10px; }
  .dbz-body { padding: 0 10px 8px; }
  .dbz-btn { width: 28px; height: 28px; }
  .dbz-icon { width: 30px; height: 30px; }
  .dbz-icon::after { font-size: 11px; }
  .dbz-visualizer { height: 18px; }
}

/* Move nav-indicator up when player is open */
#dbz-player.dbz-active ~ #nav-indicator,
body.dbz-player-open #nav-indicator {
  bottom: 80px;
  transition: bottom 0.5s ease;
}

</style>
