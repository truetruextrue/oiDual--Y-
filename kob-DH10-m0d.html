<!DOCTYPE html>
<html lang="pt-BR"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KOBLLUX — Smart HUD TTS</title>
  
<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-DH10.css"> 

</head>
<body>

<div class="main-wrapper">
  <!-- Conteúdo Principal -->
  <iframe id="content-frame" src="about:blank"></iframe>

  <!-- HUD Inteligente -->
  <div class="symbol-bar floating" id="symbolBar">
    <div class="toggle-wrap">
      <button class="symbol-button main-toggle" id="toggleBtn" title="Menu / Iniciar">≡</button>
    </div>

    <!-- Controles de Navegação de Leitura -->
    <div class="symbol-wrap"><button class="symbol-button" id="btn-prev" title="Voltar Bloco">◀</button></div>
    <div class="symbol-wrap"><button class="symbol-button" id="btn-play" title="Play/Pause">▶</button></div>
    <div class="symbol-wrap"><button class="symbol-button" id="btn-next" title="Próximo Bloco">▶▶</button></div>

    <!-- Troca de Arquétipo -->
    <div class="symbol-wrap">
      <button class="symbol-button" id="btn-arch" title="Trocar Arquétipo de Voz">
        🎙
        <div class="voice-indicator"></div>
      </button>
    </div>

    <!-- Atalhos Externos (Símbolos do Dual) -->
    <div class="symbol-wrap"><button class="symbol-button" data-url="https://kodux78k.github.io/oiDual-idHome/">◌</button></div>
    <div class="symbol-wrap"><button class="symbol-button" data-url="https://kodux78k.github.io/oiDual-Vivivi-1/">꩜</button></div>

    <div class="hud-info" id="hudStatus">KOBLLUX</div>
  </div>

  <div id="kob-tts-outline"></div>
</div>




<script src="https://kodux78k.github.io/oiDual--Y-/js/kob-DH10.js"></script>



<script src="https://kodux78k.github.io/oiDual--Y-/js/kob-glue.js"></script>


</body></html>
